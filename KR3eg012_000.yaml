front:
  text: 周序民國十有五年秋忠客芝城軍次得識湘鄉王松如先生氣宇軒昂片言雅合時先生長寧鄉鹽政兼任八軍二十五團少校軍需及同級軍醫先生綜核計畫條理井然全部官兵與地方人民患病請診戶為之穿應接從容曾不少息且多奏奇效咸奉之若神明繼而邀遊江漢懸壺燕都當地達官顯宦以及窮鄉婦孺聞先生名麕集求診凡沉疴痼疾無不著手成春至二十一年北平猩紅熱流行猖獗諸醫束手而先生全活甚衆積案成帙蓋其讀書博用功深處方不拘成法故能得心應手載譽而歸本年先生任湖南國醫專校溫病教授因感溫病專書向無善本特搜羅古今醫籍闡發奧蘊且抒心得窮源竟委綜合成書顏曰溫病正宗忠雖不知醫然深悉先生醫學之精治病之奇則其書足為世重可知茲因付梓故述其大凡云爾民國二十四年十一月寧鄉周守忠恕安氏謹序自序孔子為政必先正名者名不正則言不順事不成也醫學操人生殺之權豈可不正其名乎吾國醫學所以異夫歐西者我重氣化而彼重形質彼炫科學而我求哲理也惟其重氣化而求哲理故不盡可以言傳而必須以意會其可言傳者固易知易能而須意會者則難知難能果欲見垣一方則非別具會心不可溫病之名不正由來久矣苟任其龐雜淆混誠恐毫釐之差而有千里之謬松如之為此懼也久矣今春承乏湖南國醫專科學校講席教授溫病學是用不忖譾陋採輯古今溫病學説加以辨正名之曰溫病正宗因校中已採用時人沈嘯谷所改編時逸人之溫病全書為教程故以是稿備學生之參考遂徇其請遽付手民未敢自信尚幸高明有以教之民國二十四年乙亥秋月湘鄉恬憺山人王德宣松如甫序於湖南國醫專科學校
