body:
  text: 上篇學説辨正第一章溫病解釋之正誤後漢張仲景著傷寒雜病論合十六卷自云雖未能盡愈諸病庶可以見病知源則其為廣義傷寒論明矣廣義傷寒云者即難經所謂傷寒有五中風傷寒濕溫熱病溫病是也蓋傷寒乃外感之總名傷寒論統論外感之書也惜其書經三國兵燹殘缺失次江南諸師復祕其要方不傳逮晉王叔和撰次其遺論僅得十卷即今存之傷寒論也又宋王洙於館閣蠹簡中得仲景金匱玉函要略方三卷亦叔和所撰次或曰古之雜病論即此書也然則仲景之書賴叔和以傳而溫病為傷寒之一本無疑義也洎夫有明方中行出著傷寒論條辨削去傷寒序例反謂叔和為仲景之罪人於是仲景之廣義傷寒論一變而為狹義傷寒論矣其所以削去傷寒序例者無非欲於溫病另闢蹊徑耳繼方氏而起者則有吳又可溫疫論之傷寒例正誤清喻嘉言尚論篇之駁正王叔和序例錢天來之傷寒溯源集程應旄傷寒後條辨之王叔和傷寒序例貶偽黃元御傷寒懸解之王叔和傷寒例此外張宛鄰之素問釋義於生氣通天論熱論水熱穴論皆對於叔和攻擊謾罵不遺餘力反目為千古之罪人張隱菴柯韻伯魏荔彤張令韶陳修園等皆傷寒大家也亦從而和之於是傷寒一書注釋不下百餘家各以己意附會或割章分句或前後易置或擅加刪改後之讀者遂如墮五里霧中矣及葉天士之溫熱論與吳鞠通之溫病條辨出遂別溫病於傷寒而立異謂溫邪專從口鼻而入而創溫病治三焦之説以與仲景傷寒論六經見證分道揚鑣不識六氣傷人古之所謂寒暑燥濕風名為五氣天氣也水火金木土名為五行地氣也清陽為天濁陰為地天以陽生陰長地以陽殺陰藏本乎天者親上本乎地者親下天有陰陽地亦有陰陽寒暑燥濕風火天之陰陽也木火土金水火地之陰陽也是謂六元亦曰六氣六氣過甚謂之六淫故傷人也皆襲皮毛或從口鼻無分乎寒與溫也惟寒性凝斂宜溫宜表熱性蒸發宜清宜降治法各異耳溫熱之病雖不若傷寒六經之傳經然亦可憑六經而見證難經有溫病之脈行在諸經之文蓋六經乃百病之提綱何得以溫邪專從口鼻而入強定傷寒先分六經溫病須究三焦乎至邪專從口鼻而入者乃瘟疫也素問刺法論曰五疫之至不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干所謂天牝者即老子所謂玄牝之門玄天也於人為鼻牝地也於人為口見老子河上公注及內經馬元臺注此言人之正氣內存則邪不干犯若避毒之法以毒氣既從口鼻而入當復循其口鼻而出世之取嚏法乃其遺意之一也內經論瘟疫之邪從口鼻而入既明且詳豈待楊士瀛吳又可出而後知之乎蓋瘟疫之邪乃天地之厲氣亦即濁氣也垢穢也細菌也為有形質黏滯之物故不能入皮毛之細孔而專從口鼻之大道也至於鼠疫亦有由皮膚刺傷或死鼠之蚤咬傷而傳染者則皮膚既傷乃疫毒與傷處血液相接之故仍非疫邪之能由皮膚入也乃聽者不察群相附和混溫病於瘟疫別溫病於傷寒殊不知瘟疫病以化疫為主溫熱病以清火為急傷寒論之清降法即所以治溫病也後人立法豈能出其範圍何得不以傷寒論為廣義反與其分庭抗禮哉然而叔和所輯傷寒論之所以不廢者賴有張路玉徐靈胎王朴莊陸九芝之排除衆議備致推崇也張路玉之傷寒緒論云余嘗考晉王叔和集仲景傷寒書未嘗不廢書而三嘆也嗟夫猶賴叔和為仲景之功臣使無叔和之集則傷寒書同於卒病論按宋郭雍傷寒補亡論有問曰傷寒何以謂之卒病雍曰無是説也仲景敘論曰為傷寒雜病論合十六卷而林其目者誤書為卒病後學因之乃謂六七日生死人故謂之卒病此説非也古之傳書怠惰者因於字畫多省偏旁書字或合二字為一故書雜為𠅃木或再省為卒今書卒病則雜病字也漢劉向校中祕書有以趙為肖以齊為立之説皆從省文而至於此與雜病之書卒病無以異今存傷寒論十卷雜病論亡矣之不傳矣何能知有六經證治乎即條辨尚論亦無從而下手也徐靈胎之醫學源流傷寒論論云仲景傷寒論編次者不下數十家因致聚訟紛紜此皆不知仲景作書之旨故也今人必改叔和之次序或以此條在前或以此條在後或以此症因彼症而生或以此經因彼經而變互相詬厲孰知病變萬端傳經無定古人因病而施方無編方以待病其原本次序既已散亡庶幾叔和所定為可信何則叔和序例云今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也是則此書乃叔和所搜集而世人輒加辨駁以為原本不如此抑思苟無叔和安有此書且諸人所編果能合仲景原文否耶此皆閲歷有得持平之論也至王朴莊之傷寒例新注及回瀾説等與陸九芝之世補齋文均宗叔和闢方喻挽狂瀾尊聖經其功尤偉邇來仲景之傷寒雜病論有二原稿出一為羅哲初之所傳長安黃竹齋因見浙江流通圖書館國醫圖書專號中載有張仲景療婦人方及五臟營衛論均注存天一閣鈔本字樣乃往寧波該閣訪之實無其事復便道鄞縣周岐隱處邂逅該邑廣濟施醫局主任桂林羅哲初出示其家藏古本傷寒雜病論鈔本全書十六卷謂受之桂林左盛德左受之張紹祖紹祖即仲景四十六世孫左氏之序稱其師紹祖所言相傳傷寒一書共有一十三稿每成一稿傳抄殆遍城邑茲所藏者為第十二稿叔和所得為第七次稿云一為劉昆湘之所得劉自稱在十年前以母喪求葬地漫遊江西于山谷中遇張姓老人授以古本傷寒雜病論十六捲雲云嗣昆湘以授其族人仲邁仲邁為之校讎疏釋以公諸世湘主席何藝樵又有手抄原文影印本羅所傳者尚未刊行內容如何雖不可知而劉所得者首平脈法次傷寒例又次溫暑熱濕燥各篇又次演六經本病壞病及霍亂痙陰陽易瘥後勞復終之以諸可與不可與等較之叔和所編加多且增溫熱燥諸篇惟傷寒例中無今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也之二十八字夫此二十八字為叔和言余為仲景語唐王燾外臺祕要及陸氏九芝早已言及今無此二十八字則傷寒例非叔和所增益為仲景之原文益信而傷寒論為論廣義傷寒之書亦不待辨而自明矣或曰叔和與仲景相去五六十年仲景至今則一千七百餘年矣五六十年猶不能得其全千餘年後尚能見廬山真面目乎遺稿果有存者胡為不出於方中行等攻擊叔和之時而出於今日乎曰吾國古者絶學往往祕而不宣古本流傳容或有之即令後人作偽而人能宏道安見後人不可昌明聖學乎時人惲鐵樵之溫病明理雖知有廣義傷寒矣而其盡廢諸家溫病之説則又未免抹殺一切要之學者立説苟無悖於經旨則相得益彰亦即仲聖之功臣也第二章溫病真理之探源黃帝之內經仲景之傷寒論吾國醫學典籍中之聖經也然其立言詞簡而旨深非細繹全文潛心體會舉一而反三鮮能窺其堂奧若斷章取義或以詞害意則差之毫釐謬以千里矣素問熱論云人之傷於寒也則為病熱熱雖甚不死此病熱者證候也非病名也謂傷寒即時發熱者也蓋寒邪薄於肌膚陽氣不得發越乃反怫鬱而為病熱標熱而本寒陰精未傷陽氣尚強是以不死至若熱重於溫之熱病則靈樞熱病曰目不明熱不已者死舌本爛熱不已者死髓熱者死熱而痙者死蓋目以熱而不明熱又不已肝氣衰也舌本已爛熱猶不已心邪盛也熱甚則髓枯腎氣竭也熱而痙者風動筋急也所以然者熱甚則火勢燎原而風生風火相乘精血枯竭焉得不死水熱穴論曰帝曰人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也蓋言表寒既化為熱熱則入里裡熱菀結乃成熱病也刺熱論曰病甚者為五十九刺或瀉諸陽之熱或瀉胸中之熱或瀉胃中之熱或瀉四肢之熱或瀉五臟之熱亦言傳變之熱病也金匱真言論曰夫精者身之本也故藏於精者春不病溫平人氣象論曰人一呼脈三動一吸脈三動而躁尺熱曰病溫論疾診尺曰尺膚熱甚脈盛躁者病溫也玉版論要曰病溫虛甚死此則溫病之命名及其診候之法也陰陽應象大論曰冬傷於寒春必病溫熱論曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑傷寒例曰不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也此言伏氣之為病也夫中而即病之傷寒其發熱之因固寒也傷寒不即病而傳變為溫病為暑病其因亦寒也故熱論曰今夫熱病者皆傷寒之類也刺志論曰氣虛身熱此謂反也又曰氣虛身熱得之傷暑蓋氣虛則陽氣不足陽氣不足當身寒反身熱者脈氣當盛脈不盛而身熱證不相符故謂反也寒傷形熱傷氣暑即熱故傷暑則氣虛身熱也傷寒論曰太陽病發熱而渴不惡寒者為溫病然則溫病之異於傷寒乃以發熱而渴又不惡寒者為辨也傷寒論曰若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期此言風溫誤治變為壞病之證狀也傷寒論曰太陽中熱者暍是也其人汗出惡寒身熱而渴也又曰太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也又曰太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚此言中熱中暍者乃中暑之異名而同病者也惟其證候各別故治法不一耳凡上所舉皆溫病學之宜探賾索隱以窮其本原者也世人往往於傷寒溫病混淆不分治熱病而以傷寒發熱論治且誤認熱雖甚不死肆用辛溫麻桂之方治而不應乃不自責其醫學之未精反咎古人立法之不善使先聖悲天憫人之懷竟變為操刃殺人之術不亦誣乎夫惟賾隱難明故探索不易而誤會者滋多誤會者既多於是似是而非之説紛然以起益令人混淆莫辨後之學者將從何而探索之乎是用於衆説混淆之中擇其可為探索之階梯者分論於下俾學者知所取捨焉宋郭白雲之傷寒補亡論取千金活人及龐氏常氏之説合乎仲景者補之故曰補亡朱熹跋語謂其分別部居易見且使古昔聖賢醫道之原委不病其難見者皆驚喜為奇書其闡奧發微可謂至矣金劉河間之傷寒直格論方及傷寒林本心法類萃於治溫熱獨抒心得發前人所未發故後世謂主火之説始自河間李東垣之學説雖以重脾胃見稱然其弟子王好古所輯之此事難知集上合軒岐之經中契越人之典下符叔和之文乃發仲景不傳之祕而為人所難知故以難知為名明戈存橘之傷寒補天石統論外感諸病所包甚廣理例詳明亦能發仲景言外之意而立媧皇補天之功清俞根初之通俗傷寒論乃近時何廉臣所刊行其內容豐富條分縷晰凡辨證論治處方俱切實用苟非三折肱之諳練積畢生之心血曷克臻此外感總名傷寒古之俗稱故其書曰通俗傷寒論上數家言皆屬獨出心裁別開生面各自成家然窠臼雖離經旨仍合且能闡發傷寒雜病論廣義之實際其有功仲景良非淺鮮欲探求溫病學之原委者不能不加之意也此外元王安道之醫經溯洄集雖誤以仲景傷寒論專為即病之傷寒設不兼為不即病之溫病暑病設然能辨別溫病與傷寒井井有條亦可資研究之書也第三章溫病瘟疫之辨析第一節通論熱為火之用火為熱之體故言火則不言熱言熱則不言火一而二二而一也溫者熱之不甚者也六氣言火不言溫舉一以概二也曰溫熱者乃溫病熱病之總稱邪之輕者為溫邪之重者為熱近世概以溫病括之而溫病乃賅熱暑濕燥而言溫病暑病之冬傷於寒而春夏發者及春夏感邪而秋冬發者皆謂之伏氣隨時感受而即發者謂之新感新感其邪輕治之尚易伏氣其邪重治之較難故治溫病之法不獨異於傷寒伏氣與新感亦不可同日而論也瘟疫本名癘疫傳染病也素問刺法論云帝曰余聞五疫之至皆相染易無問大小病狀相似六元正紀大論云厲韻會癘通作厲大至民善暴死皆言癘疫之證狀者也説文癘者惡疾也疫者民皆疾也從疒役省聲釋名疫役也言有鬼行役也刺法論於癘疫之分則以干支推之謂天運化疫地運化癘蓋以疫之與癘不過上下剛柔之異故又以金木水火土統之即所謂五疫者也而按之實際則癘疫均有寒溫之別其流行者溫癘溫疫多而寒癘寒疫少六元正紀大論曰其病溫癘大行遠近咸若又曰其病溫癘皆言溫癘而不及寒癘蓋以溫癘概寒癘也老子曰凶年之後必有溫疫抱朴子曰經溫疫則不畏俱言溫疫而不及寒疫亦以溫疫概寒疫也後人又立雜疫之名以統疫病之雜症也夫溫病與瘟疫病源既殊治法各異古人分辨本極明瞭不可以混同也後人猶恐其相混故改溫疫之溫作瘟吳又可不明此意以古無瘟字反混溫病瘟疫為一病吳又可云傷寒論曰發熱而渴不惡寒者為溫病後人去水加疒為瘟即瘟也要之古無瘟字乃後人之自為變易者不可因易其文以溫瘟為兩病不識溫病者以溫為病名也溫疫溫癘者以疫癘為病名言疫之溫者癘之溫者也惟其古無瘟字乃知瘟疫溫癘之溫非病名何得反混溫病為癘疫哉夫言事物者必通權而達變醫病亦何獨不然春溫夏熱秋涼冬寒感之而病者常也素問曰重陰必陽重陽必陰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽者皆伏氣也則謂之變然猶不傳染仍屬變中之常若夫喉痧白喉霍亂伏陰症痧症痢疾疫痙鼠疫諸傳染病則又變中之非常者也但白喉霍亂痧症痢疾亦有非傳染而病者則亦屬變中之常故論溫病而欲窮其原委則非明乎常變之道不可然自吳又可混溫病瘟疫為一之後附和者衆而常變之理不明治瘟疫之書多混溫病治溫病之書亦雜瘟疫後之學者苟非好學深思之士鮮不為其所惑者松如竊憂之爰將關於溫病瘟疫之書分別評論俾後之讀者知所取捨焉第二節溫病專書之概論四庫全書醫家類敘云醫之門戶分於金元而其門戶所以分自來以為由於易水河間學説之不同究之河間之主火乃闡發傷寒之廣義仍不悖乎仲聖之本旨逮天士溫熱論出溫病學始離傷寒而獨立鞠通加以附會則更離經叛道而溫病學之歧誤益不可究詰後之學者將何所適從然則關於溫病之書籍甄別實不容緩茲將其專書略論於下明張鳳逵之傷暑全書乃專治暑者也其書凡自內經以至宋元明諸家之論暑者靡不採取可謂詳備惟其於傷寒例所云寒毒藏於肌膚至春變為溫病至夏變為暑病之語及內經所云冬傷於寒春夏病溫病暑之説加以詆譭則是尚未明伏氣之故幸葉子雨取而增訂之庶無流弊清戴麟郊之廣瘟疫論乃踵吳又可瘟即溫之誤雖其主要以瘟疫與傷寒為辨使傷寒瘟疫之治不混然其所論瘟疫實為伏氣溫熱之病陸氏九芝愛其論之精惜其名之誤乃於其論中刪去尸氣腐氣等語及大青龍一方與凡所稱時行疫癘者悉改之曰溫邪使無羼混且補世之治傷寒者每誤以溫熱治之治溫熱者又誤以傷寒治之等語以免夾雜傷寒故改其名為廣溫熱論何氏廉臣見其於濕溫燥熱二症言之甚略即用藥選方亦未盡善且未將風溫濕溫春溫冬溫等分清而概稱時行未免含混爰為重訂將原書缺者補之訛者刪之更增入古今歷代名醫之良方而成為伏氣溫熱之全書又易其名為重訂廣溫熱論而後乃為盡善盡美之治伏氣溫熱正法眼藏矣吳坤安之傷寒指掌於溫病論治頗詳邵氏仙根加以評語何氏廉臣復為重訂且易其名為感症寶筏然其立論但知葉天士所謂溫邪上受治主三焦則仍新感溫熱之證治也吳鞠通之溫病條辨乃遵葉天士之學説而變本加厲以三焦劃界溫熱與瘟疫同治且於仲景溫病原文捏造以桂枝湯主之誣聖欺世莫此為甚其書之無價值可以想見今有葉子雨陸士諤二家之評或可杜其流弊王孟英之溫熱經緯以軒岐仲景之文為經葉薛諸家之説為緯且為之注釋其詳博明晰可謂集前人之大成而垂後學之規範其書雖間有瑕疵而得葉子雨為之評訂可謂盡善惜其偏重新感且攙入疫病不以溫病疫病合稱未免後人誤會至其歸硯録指摘吳氏溫病條辨則語多扼要可為師法周杓元之溫證指歸謂仲景傷寒論為專究傷寒之書雖屬謬誤尚能分別寒溫第以疫病混作溫病則無法以圓其説名為指歸實則使人無所依歸李識候之暑症發源論證處方條分縷晰洵為治暑症之金科玉律陸九芝之傷寒陽明病釋以傷寒傳入陽明遂成溫病故取陽明病而釋之頗明晰有條貫此乃發明溫病之一端其於世補齋文辨論溫病甚詳且於諸家謬誤尤多矯正使傷寒溫病瘟疫朗若列眉其功匪淺凌嘉六之溫熱類編秦伯未為之刪訂分溫熱暑濕四大綱何廉臣加以緒論自內經以及諸家凡論溫熱者採輯靡遺裘吉生復為刊之於讀有用書樓醫書選刊惜其羅輯雖豐而發明甚鮮且不及燥病宋佑甫之南病別鑑乃取葉天士溫證論治分條注釋及校刊薛生白濕熱條辨與薛公望傷寒古風末附自著意以傷寒為北病溫熱為南病則未免拘泥然欲知葉薛各家則亦可涉獵及之汝琴舫之治溫闡要意在闡發溫病之要又附治疫之法其書雖無特長尚屬簡明可取柳寶詒之溫熱逢源其於溫熱頗有獨到之處既詳伏氣復闡明仲景之暴感暑熱乃發人所未發如能由此探求庶可左右逢源陳葆善之燥氣總論實探內經之祕而發喻嘉言沈目南吳鞠通諸氏之所不逮凡論治處方尤能獨抒心得洵為燥病學之善本葉子雨之伏氣解乃本素靈陰陽氣化之道而詳解六氣伏邪之理論伏氣之善本也劉吉人之伏邪新書分伏燥伏寒伏風伏濕伏暑等病論證處方俱得諸實驗洵發前人所未發可謂有功千古時人沈漢卿之溫熱經解乃注釋言溫熱之經文並附方藥頗有可取王馥原之溫病指南立説本諸葉吳溫病分三焦之劃界未能合乎真理然其論治處方尚屬平正未可厚非郝炳炎之溫熱病問答辨證主方明白易曉可為溫病學之初階吳錫璜之中西溫熱串解博採兼收中西互證可謂洋洋大觀惟以三焦分篇仍蹈鞠通之陋且羼雜疫病亦屬瑕疵劉仲邁之溫病詮真即其所著傷寒雜病論義疏之卷四亦即所謂古本仲景傷寒論之一也其言頗存古風雖屬溫病之新法門究為廣義傷寒之實際惜其未將傷寒論之第五卷暑熱濕燥合刊而非溫熱學所賅之全書也惲鐵樵之溫病明理其斥天士鞠通之溫邪上受及三焦論治之説固屬不謬至謂叔和寒毒藏於肌膚之説於理不可通及其所著內經綱要據西醫傷寒潛伏期不過二十日之説以駁冬傷於寒春必病溫與凡病傷寒而成溫者諸學理則未免妄議古人蓋其於伏氣與新感之分辨尚未明悉不知西醫傷寒之潛伏期乃指傷寒即病之潛伏者言內經之冬傷於寒春夏方發者乃指傷寒變為溫病暑病者言實風馬牛之不相及也丁醒吾之溫熱經緯補録蓋為補王氏溫熱經緯所未備而作於秋燥剖釋詳明誠足以補王氏之所未及楊如侯之溫病講義為其擔任山西醫學專校溫病教授時所輯以教學者也言頗精當惟攙入疫病不以疫病合稱未免名實不符耳張山雷之濕溫醫案乃輯前人之案而為之評注亦有可取沈嘯谷之溫病全書乃取時逸人之中國時令病學刪去傷寒及關於六經之解釋合序例與總論為一篇將治法分隸各症藥方附列於治法之後並增方解重行改編而成所言皆平正簡明有法有式頗合教材惟夏季之病篇名溫病暑溫究不若熱病暑病之為妥善溫為熱之漸熱為溫之極春氣溫和故曰春溫風溫實可統名溫病夏氣暑熱病暑而不病溫宜曰熱病暑病且暑溫之名乃吳鞠通所杜撰暑溫即暑熱之輕症故不當以暑溫名篇況和煦之氣曰溫亢熱之氣曰暑既暑矣何止於溫暑溫之名實不可通章巨膺之溫熱辨惑乃本其師惲氏鐵樵之旨仍援西醫言傷寒之潛伏期至多不過二三日以闢傷寒例寒毒藏於肌膚之謬此則盲從西説之尚形質而忘祖國之言氣化但其辨證論治頗具條理不無可取宋愛人之春溫伏暑合刊對於春溫伏暑演繹詳明選方亦精且以春溫一症分新邪為風溫伏邪為伏溫立説新穎可謂不落前人窠臼上皆溫病通行之專書此外如邵步青之四時病機雷少逸之時病論雖非溫病之專書亦詳溫病之證治頗有可取至於張畹香之溫暑醫旨張子培之春溫三字訣薑子房之溫病賦錢文驥之溫病條辨症方歌括則皆崇拜鞠通之學説而為初學示法度者也不足觀也矣夫溫病專書類皆起於明末而盛於今日其故何哉蓋因又可誤溫病為瘟疫而天士創溫病之異説於是盲從者日衆而研究溫病者亦遂多矣至天士之説實顧景文所偽託者也其言似是而非真理因之而晦故治溫病之法至今仍無定説茲將顧氏之作偽及其類似者略陳於下顧氏所著溫證論治乃治新感溫熱之法相傳為顧氏隨葉氏遊洞庭山信筆記録舟中之所語華岫云首刊之於續選臨症指南名為溫熱論繼則唐笠三以顧氏一時未加修飾是以辭多佶屈語亦稍亂乃為之刪潤前後移掇刊之於吳醫匯講而易其名為溫證論治章虛谷又易其名為外感溫病證治刊之於醫門棒喝併為注釋而讚揚之王孟英又易其名為外感溫熱篇刊之於溫熱經緯更增注釋宋佑甫刊之於南病別鑑且為之分條略注周學海仍其名為溫熱論刊之於醫學叢書間加評注吳錫璜刊之於中西溫熱串解乃詳注之易其名為溫熱論注解此其注解中之最精詳者孟英之注次之此乃葉派之金針而為陸九芝所鄙棄者也相繼而起者則有薛生白之濕熱條辨乃治濕溫之法首載於佛尼勒所刊之醫師祕笈繼則吳子音刊之於溫熱贅言名之為濕溫症條例不題生白之作而署寄瓢子述章虛谷易其名為薛生白濕熱條辨刊之於醫門棒喝並略釋之王孟英刊之於溫熱經緯又易其名為濕熱病篇更詳注之宋佑甫刊之於南病別鑑又易其名為濕熱論吳錫璜刊之於中西溫熱串講仍名之濕熱病篇更增注之注中之最精詳者也此書孟英疑其非薛作而陸九芝更極闢之謂其自條自辨薛氏決無此不合體例且其語句藥物均與溫證論治大略相同難保非顧景文一流人偽託云此外陳平伯之溫熱病指南乃治風溫之法吳子音刊之於溫熱贅言篇名溫熱病大意不題平伯之名亦署寄瓢子述與薛氏濕熱條辨合為一人之作王孟英刊之於溫熱經緯題為陳平伯外感溫病篇並加按語吳錫璜之中西溫熱串講亦刊之且於王注之外更增按語此書是否陳氏所作孟英亦以為疑由是觀之溫病專書欲求其盡善者實不可得蓋真理既淆立論自亂皮之不存毛將安附嗚呼評論者能不為之痛心也哉第三節瘟疫專書之概論瘟疫急性傳染病也自內經以下無書不載可謂詳且盡矣然瘟疫之來以時代而異以風土為移故古今方藥不同南北治療迥異且變生頃刻禍不旋踵非斬關奪隘之將不克獲除暴安良之功茲將其專書略論於下吳又可之溫疫論實為治瘟疫專書之嚆矢其辨證論治有功千古且發明瘟疫邪自口鼻而入伏於膜原又有九傳之變尤為卓識惟其因遇崇禎辛已大疫流行之時所見者為瘟疫而非溫病乃憑一孔之見而作正名之篇悉將溫病誤為瘟疫又作傷寒例正誤力詆冬傷於寒春夏成溫成暑之理遂令溫病混入瘟疫淆然莫辨則又仲景之罪人也羽翼又可者則有清鄭重光之溫疫論補注孔以立之評注溫疫論洪吉人之補注瘟疫論皆無甚闡發但洪注較勝陳錫三之二分晰義及楊栗山之寒溫條辨所辨雖詳仍援又可瘟溫同病之誤楊書乃竊取陳素中之傷寒辨證而擴充其義者也呂心齋之瘟疫條辨摘要則又摘取陳楊二家而成者也劉松峰之説疫與瘟疫論類編蔡乃庵之傷寒溫疫抉要楊堯章之溫疫論辨義韓凌霄之瘟痧要編洪教燧之溫疫條辨雖皆瘟溫不分而間有增補尚不無發揮者也熊立品之治疫全書李炳之辨疫璅言朱蘭臺之疫證治例皆略有發明可備治疫之參考者也時人余伯陶之疫證集説曹彝卿之防疫芻言徐相宸之急性險疫證治曹炳章之秋瘟證治要略紹興醫學會之濕溫時疫治療法楊志一之四季傳染病時逸人之中國急性傳染病學等書或輯舊説或抒心得或參西學則皆切於實用者也至於鄭奠一之溫疫明辨即戴麟郊廣溫疫論之張冠李戴則名為瘟疫而所論實屬溫熱也其瘟溫統治之書則有清周禹載之溫熱暑疫全書分別溫病瘟疫尚清惜其內容太簡有負全書之名耳至分症論治者則有清余師愚之疫疹一得師愚即閲微草堂筆記所載之桐城醫士也於乾隆癸丑京師大疫用大劑石膏所治應手而痊踵其法者活人無算時人劉民叔之時疫解惑論所用方劑亦推重石膏但石膏雖為治熱疫要藥究亦不專恃石膏民國壬申歲故都爛喉丹痧倭名猩紅熱北平亦呼疫疹流行夭橫無算其重症壞症人所不治者經松如全活者頗多其所用藥輕者日用數兩重者多至八九斤均不專重石膏其臨證驗案他日當刊以問世此則又非余劉之所知也清陳耕道之疫痧草顧玉峰之痧喉經驗闡解金德鑑之爛喉丹痧輯要夏春農之疫喉淺論張筱衫之痧喉正義曹心怡之喉痧正的時人丁甘仁之喉痧症治概要曹炳章之喉痧證治要略皆治爛喉丹痧之專書也清黃維翰之白喉辨證張善吾之時疫白喉捷要李倫青之白喉全生集陳葆善之白喉條辨耐修子之白喉治法忌表抉微張採田之白喉證治通考皆治白喉之專書也夫白喉咽喉腐也喉痧亦咽喉腐也其所以異者白喉多由腎虛火旺里證也咽喉雖腐有汗發熱自下焦而至上焦其勢緩喉痧則純為癘疫之邪由於口鼻傳入表證也咽喉腫腐發熱無汗自上焦而至下焦其勢急一屬陰虛一屬陽邪陰虛即仲景所云少陰病咽痛胸滿心煩豬膚湯主之者也陽邪即仲景所云陽毒之為病面赤斑斑如錦紋咽喉痛升麻鱉甲湯主之者也此又不可以不辨也清王孟英之隨息居霍亂論陸九芝之霍亂論摘要趙海仙之趙氏霍亂論許起之霍亂燃犀説姚訓恭之霍亂新論陳蟄廬之瘟疫霍亂答問連文沖之霍亂審證舉要時人凌禹聲之霍亂平議翟冷仙之霍亂指南皆治霍亂之專書也霍亂之發也暴其退速脈忌微細而類似寒霍亂之伏陰症其發緩而退不易脈恆細或伏先利而後嘔惟不若霍亂之心腹絞痛其發專在夏秋病則遠近一律清田云槎之時行伏陰芻言辨之極明倘誤認伏陰為霍亂則其為害不可勝言矣清郭右陶之痧脹玉衡隨萬寧之羊毛瘟證論徐子默之吊腳痧方論林藥樵之痧症全書高亭午之治痧全編黨因道人之急救異痧奇方費友棠之急救痧證全集費養莊之痧疫指迷時人陳景岐之七十二種痧症救治法皆治痧症痧症即雜疫一名乾霍亂又名痧脹之專書也清孔以立之痢疾論吳本立之痢證匯參吳士瑛之痢疾明辨唐容川之痢症三字訣時人丁子良之治痢捷要新書羅振湘之治痢南針皆治痢疾之專書也近時所謂疫痙亦名痙瘟又名伏瘟於小兒俗呼為驚風即西醫之流行性腦脊髓膜炎也明方中行之痙書時人蔣璧山之伏瘟證治實驗談沈朗清之腦膜炎新書劉裁吾之痙病與腦膜炎全書此書尚末出版序文曾經披露皆治此症之專書也金匱有剛痙柔痙之分猶驚風之有急慢也説文痙疆急也廣韻痙風強病也夫痙之為病脊強而厥即難經所謂督之為病脊強而厥蓋同病而異名者也脊髓上貫於腦乃督脈之所司脈要精微論曰頭者精明之府李時珍曰腦為元神之府金正希曰人之記性皆在腦中王清任曰靈機在腦則腦之為物可知夫心之官則思説文思字從心從囟囟即囟頂門也蓋謂心有所思則神注於腦也韻會曰自囟至心如絲相貫不絶蓋謂腦神經也夫腦陰質也心陽火也以陽火上灼陰質則神光畢照事物洞明此以腦之靈機而為心主之所司者也西説之腦膜炎炎者火也但火極生風風火相乘則筋膜燥脊髓枯神經為之緊張故頭痛脊疼頸項彎曲手指抽攣神識昏迷目赤直視口噤譫語靈樞熱病曰髓熱者死熱而痙者死熱病數驚瘛瘲而狂風痙身反折素問氣厥論曰肺移熱於腎傳為柔痙又骨空論曰督脈為病脊強反折皆此症之見證也葉天士所謂溫邪上受逆傳心包亦此證之一也心包即心主之宮城蓋腦之靈根下在於腎腦之靈機上發自心心通於腦故瀉心火即清腦法也然其症不獨有剛柔之分且有有疫無疫之異施治之法又不可執一無權也清羅芝園之鼠疫約編沈敦和之鼠疫良方彙編劉肇隅之鼠疫備考時人余伯陶之鼠疫抉微李健頤之鼠疫治療全書徐相宸之訂正鼠疫良方皆治鼠疫之專書也他如痘瘡麻疹乃本先天之遺毒蘊藏於骨髓之間痘為陰毒發於五臟麻為陽毒發於六腑雖皆由感觸疫邪而發究非其主因也古者隸於小兒科今則另立專門故不列入第四章溫病學説之折衷岐伯曰今時之人以酒為漿以妄為常醉以入房此嘆世風之不古而不能如古人之虛邪賊風避之有時精神內守病安從來也自岐伯迄今又四五千年矣加以中外交通人煙繁萃兵革時起飢饉薦臻溫病瘟疫有不從而日增者乎痘瘡發現於後漢至唐宋而盛行痧症亦名乾霍亂宋時雖盛行而至有清以來為尤烈爛喉丹痧白喉鼠疫等雖為往昔異名之病然皆自有清而後盛行所以然者蓋上古之時天清地寧民淳俗朴虛邪苛毒無由而生即或有之發現亦鮮故人不覺世愈降民俗愈澆而惡疾險症亦遂愈多也吳又可生於多疫之秋故其言曰業醫者所記所誦連篇纍牘俱是傷寒及其臨證悉見瘟疫求其真傷寒百無一二云云誠非虛語其立説雖為後世溫病瘟疫混淆之濫觴而其發明疫邪自口鼻而入伏於膜原與夫九傳之變則為治疫之金針而不容埋沒喻嘉言之溫症三大例可謂深知伏氣變病之理惟治金鑑一案標其名為傷寒死症奇驗而強詞奪理竟作冬傷於寒又兼冬不藏精之春溫兩感症用麻黃附子細辛湯及附子瀉心湯以炫其奇且云不藏精之人腎中陽氣不鼓精液不得上升故枯燥外見用附子助陽則陰氣上交於陽位如釜底加火則釜中之氣水上騰而潤澤有立至者此種言論荒謬已極既標名傷寒何得又作溫病夫不藏精者精液枯竭所以化火惟恐清涼之不急何得反用辛溫火上加油焉有不燎原者乎其證狀壯熱譫語皮膚枯澀舌卷唇焦足冷即王海藏陰症略例所謂陰極似陽之陰症實非溫病也臨證指南溫證論治景嶽發揮諸書偽託葉天士之所作也天士生平未嘗著述其所流傳於世者泰半由於偽託即溫證論治及臨證指南乃葉派崇奉之靈符一為顧景文之手筆一出於華岫云之採輯他如景嶽發揮為梁溪姚球所撰坊賈因書不售剜補桂名遂致洛陽紙貴曹畸庵醫學讀書志言之甚詳又如陳修園之醫學三字經修園自稱亦曾託名葉天士其作偽情形可概見矣臨證指南及景嶽發揮並詳伏氣不獨新感吳鞠通徒取溫熱論之溫邪上受首先犯肺逆傳心包十二字撇開伏氣以新感立論更固執臨證指南所云仲景傷寒先分六經河間溫熱須究三焦之語劃分三焦界限愈失愈遠既非葉派之全豹復開後學之盲從此溫病家之罪人也陸九芝謂河間治法亦惟六經是言而三焦而字始終不見於六書初不解指南之何以有是語久之而悟指南於西昌之論瘟認作河間之論溫約略記得河間之書人皆説是異於仲景者故即不妨托之河間耳此論固屬確鑿而天士之意或又不然夫河間主火是其專長人所共知且作三消論以三焦論治三消之為病乃燥熱怫鬱精血枯竭亦須清涼無異溫病此天士或由此而悟也然三消論所謂之三焦乃指上中下所病之部位而言此與天士以溫病必始於上焦而終於下焦又似是而非實風馬牛不相及也但天士論溫雖知伏氣而論新感則混同於瘟疫故援又可之説以溫邪上受首先犯肺逆傳心包為綱領其邪之首先犯肺者藥用辛涼是為新感之溫熱即陸氏所謂不過小小感冒如小風熱小風溫也其逆傳心包者藥用犀角金汁人中黃之屬是為瘟疫之重症即陸氏所謂不出數日遽入心包為一場大病以至於死也陸氏之治溫病執定陽明以陽明為成溫之藪凡屬內外之邪必通行此要津如導江河而至於海固屬提綱挈領然只發明在陽明之溫病而於溫病之伏氣新感不分輕重緩急同治雖可為治法之常猶未能通權達變其意在掃除荊棘新闢康莊實則未免矯枉過正王孟英溫病家之卓卓者也其指摘鞠通曰鞠通之排定三焦路徑必欲溫熱病遵其道而行有是理乎夫溫熱究三焦者非謂病自上焦始而漸及於中下也伏氣自內而發則病起於下者有之胃乃藏垢納汙之所濕溫疫毒病起於中者有之暑邪挾濕者亦犯中焦又暑屬火而心為火臟同氣相求邪極易犯雖始上焦亦不能必其在手太陰一經也其辨別伏氣新感曰伏氣溫病自里出表乃先從血分而後達於氣分更有邪伏深沉不能一齊外出者正如抽蕉剝繭層出不窮不比外感溫邪由衛及氣自營而血也此等議論皆至理名言可為師法且其驗案甚夥更堪玩味章虛谷與吳鞠通為同時人皆崇拜葉天士者也章氏於溫熱雖無發明處然亦糾正吳氏溫病條辨之謬較之吳氏尚勝一籌伏邪之病內經論之甚詳而不見其名傷寒論雖有伏氣之病而無新感之稱所以世之論溫病者恆混淆不分清蔣寶素所著醫略稿之伏邪篇闡揚伏溫一病昭然大白惜其乃援吳氏瘟疫論行邪伏邪之説仍屬瘟溫不分未可為法柳寶詒繼之辨別瘟溫之相異新感伏氣之不同既正諸家之謬復發前人所未言實論伏氣溫之最詳備者也他如周禹載尤在涇舒馳遠陳平伯於溫病均有所發明周禹載之溫熱暑疫全書乃發明溫病發於少陽者也其説曰溫病所傷者寒也所病者溫也所伏者少陰也所發者少陽也其所以然者少陰本虛而傷寒春則木旺而水虧火氣燔灼病必有陽而無陰藥必用寒而遠熱黃芩湯其主治也尤在涇之傷寒貫珠集乃發明少陰清法與厥陰清法者也其説曰少陰之熱有從陽經傳入者亦有自受寒邪久而變熱者陽經之寒變則熱歸於氣或入於血陰經之寒變則熱入於血而不歸於氣厥陰之病本自消渴其里有熱乃傳經之邪厥陰受之也舒馳遠之傷寒六經定法乃發明太陰經之火者也其説曰太陰經之著痹行痹二症為火旺陰虧熱結經隧赤熱腫痛手不可近法宜清熱潤燥陳平伯之溫熱病指南乃發明肺胃為溫邪必犯之地者也其説曰風溫為燥熱之邪燥令從金化燥熱歸陽明故肺胃為溫邪必犯之地且風溫為燥熱之病燥則傷陰熱則傷津泄熱和陰又為風溫病一定之治法也以上諸家立言皆有至理然皆各舉一端學者博取而會通之以為溫病之治法則可苟拘泥一家之言則大不可傷寒論之六經見證乃百病之提綱非獨為傷寒病而設劉松峰有瘟疫六經治法朱蘭臺之疫證治例亦分六經治瘟疫尚以六經見證何況溫病乎所謂見證者乃以證候見於何經即從何經而治之也若作傷寒之六經傳經由太陽而陽明終於厥陰解之則謬矣難經曰溫病之脈行在諸經不知何經之動也然則凡論溫病者豈可膠柱鼓瑟哉至於治病之法則內經云治寒以熱治熱以寒又曰從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治主病又曰治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之故消之削之吐之下之補之瀉之久新同法此皆治病之通法治溫熱者亦不能外也陸九芝曰天士於臨證指南既以小風寒抵作傷寒一大法門於溫證論治又以小風熱抵作溫熱一大法門所以傷寒一證至天士而失傳溫熱一證亦至天士而失傳此嘆景文岫云之作偽也孰知不有當日天士之誤則無後世溫病之爭而傷寒溫病均無人闡發矣夫難經傷寒有五之傷寒外感之總稱也傷寒論則六淫之全書也然五種傷寒之中又有傷寒之目故傷寒雖有廣義亦有狹義既有狹義則傷寒與溫病又未可混而不分也今日之所謂溫病學者亦非專言溫病乃概暑濕燥火而言既不悖乎經旨又能發揚光大何嘗不可與傷寒論後先輝映相得益彰乎此書雖為正溫病之名而作亦未始非為傷寒論進一解也下篇正宗輯要第一章通論一素靈一夫精者身之本也故藏於精者春不病溫金匱真言論張隱菴曰神氣血脈皆生於精故精乃生身之本能藏其精則血氣內固邪不外侵故春不病溫吳鞠通曰不藏精三字須活看不專主房勞説一切人事之能搖動其精者皆是即冬日天氣應寒而陽不潛藏如春日之發泄甚至桃李反花之類亦是陸九芝曰金匱真言論云夫精者身之本也故藏於精者春不病溫所謂精者指一身津液由於水穀所化水穀之精氣和調於五臟灑陳於六腑為後天生身之本其下遂以精與汗互言之吾試以經解經此即經言食氣入胃散精於肝淫精於脈輸精於皮毛之數精字也亦即經言飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺水精四布五經並行之數精字也又岐伯論溫病曰人所以汗出者汗生於穀穀生於精邪氣之得汗者邪卻而精勝也又曰汗者精氣也則精即是汗二冬傷於寒春必病溫生氣通天論馬元臺曰冬傷於寒者至春必為溫病蓋冬時嚴寒中之即病者謂之傷寒其有傷於寒而不即病者至春陽氣發生邪從內作故為溫病之證夫曰溫者寒非純寒而有熱熱非純熱而有寒正以前此而冬則為寒後此而夏則為熱則此春時乃為溫病也葉子雨曰冬至一陽漸生人身之陽氣內盛被冬日嚴寒殺厲之氣所折深浹於肌髓之間至春日內伏鬱結之陽氣為外邪觸發伏氣既得發泄遇天氣之陽熱兩熱相干發為溫病三凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑暑當與汗出勿止熱論葉子雨曰古醫經以傷寒為外感之通稱故云凡病傷寒而成溫然天地陰陽之邪隨人身氣化感召冬至後一陽漸生人身所伏之陽熱為嚴寒折遏感春陽之氣而發者為病溫夏至一陰生人身所伏之陰氣感亢熱之氣而發者為病暑蓋春溫夏暑隨氣而化亦隨時而命名也暑當與汗出勿止者暑雖熱邪熱盛則蒸濕濕與熱搏故暑病多汗治暑之法不可禁止其汗也柳寶詒曰經言凡病傷寒是傷寒不必專於冬時即三時感寒亦能郁化為溫也其稱夏至後為病暑則暑即溫之變名尤不可指為另是一邪而此獨分別言之者因伏氣發於夏至以後其治病略有不同蓋溫病忌汗恐其傷陰若時交長夏則汗出必多而邪氣亦隨汗而出又未可以汗多而遽止之也四氣虛身熱得之傷暑刺志論馬元臺曰氣本虛矣而身反熱蓋得之傷暑故也惟熱傷氣故傷暑則身熱也五人一呼脈三動一吸脈三動而躁尺廖平曰尺為皮之誤熱曰病溫平人氣象論馬元臺曰一呼脈當再動而今則三動一吸脈當再動而今則三動則一呼一吸總為一息為六動矣脈訣以為數脈難經亦以為離經脈是六至而躁躁者動之甚也今尺脈躁動當尺有熱尺部者下部也主腎水不足其病為溫六尺廖平曰尺為皮之誤膚熱甚脈盛躁者病溫也其脈盛而滑者病甲乙經病作汗且出也論疾診尺篇馬元臺曰尺之皮膚熱甚其脈盛躁當為溫病也其脈雖盛不至於躁而帶滑者則病當自出矣吳鞠通曰尺膚熱甚火爍精也脈盛躁精被火煎沸也脈盛而滑邪機向外也蓋溫病必傷金水二臟之津液尺之脈屬腎尺之穴屬肺此處肌肉熱故知為病溫也薛生白曰尺膚熱者其身必熱脈甚躁者陽邪有餘故當為溫病若脈雖盛而兼滑者是脈已不躁而正氣將復故不久當愈出漸愈之謂七諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也刺熱論章虛谷曰以其久伏之邪熱從內發故治之必先飲寒水從里逐熱然後刺之從外而泄再衣以寒居處以寒身寒熱除而後止柳寶詒曰治熱以寒一定之理今人於溫病初發見用涼解而即言其遏邪者彼固未明此理也王孟英曰今人不讀內經雖溫熱暑疫諸病一概治同傷寒禁其涼飲厚其衣被閉其戶牖因而致殆者我見實多然飲冷亦須有節過度則有停飲腫滿嘔利等患更有愈後手指足縫出水甚至腳趾脫落即俗所謂脫腳傷寒也葉子雨曰治熱病飲以寒水欲其熱自內達外也必寒衣寒處者皆避溫就涼之意耳然肆飲寒涼流弊滋多孟英此注頗具卓見讀者鑑諸八病溫虛甚死玉版論要篇柳寶詒曰經言藏於精者春不病溫則凡病溫者其陰氣先虛可知使或虛而未至於甚則養陰透邪治之如法猶可挽回若病溫者而至虛甚則熱邪內訌陰精先涸一發燎原不可治矣吳鞠通曰病溫之人精血虛甚則無陰以勝溫熱故死九熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病篇馬元臺曰此言熱病汗後脈躁者死反是則生也熱病已得汗脈宜靜今反躁盛者此乃陰經之脈衰弱已極故有陽脈而無陰脈也其人主於死若得汗之後而脈遂能靜則有陰以配陽必能以有生矣十熱病者脈尚盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病篇馬元臺曰此言熱病脈盛而不得汗者死反是則生也熱病脈躁盛宜得汗今反不得汗者此乃陽經之脈衰弱已極故表虛而不能發汗也其人主於死若脈躁盛而汗出脈靜者必能以有生矣二難經一傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同五十八難丁錦曰傷寒有五者指五病俱統於傷寒一門而分其所苦之不同也風為陽邪寒為陰邪故先列中風次列傷寒寒者皆冬月之正病也濕溫發於濕土之令居多熱病發於盛夏溫病即仲景傷寒經中春溫病也乃見前之五邪從本原來非比之傷寒熱病故各立其法也注家以疫症指此溫病非也二溫病之脈行在諸經不知何經之動也五十八難柳寶詒曰溫病邪伏少陰隨氣而動流行於諸經或乘經氣之虛而發或挾新感之邪氣而發其發也或由三陽而出或由肺胃最重者熱不外出而內陷於手足厥陰或腎氣虛不能托邪而燔結於少陰是溫邪之動路徑多歧隨處可發初不能指定發於何經即不能刻定見何脈象也三熱病之脈陰陽俱浮浮之而滑沉之散澀五十八難丁德用曰陰陽俱浮者謂尺寸俱浮也浮之而滑者輕手按之而滑是心傷熱脈也沉之散澀者沉手按之而散澀是津液虛少也四濕溫之脈陽濡而弱陰小而急五十八難丁德用曰肌肉之上陽脈所行濡弱者是濕氣所勝火也肌肉之下陰脈所行小急者是土濕之不勝木故見小急所以言陽濡而弱陰小而急也三傷寒論一陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冰冽此則四時正氣之序也傷寒例成無己曰春夏為陽春溫夏熱者陽之動始於溫盛於暑故也秋冬為陰秋涼而冬寒者以陰之動始於涼盛於寒故也二冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳傷寒例成無己曰冬三月純陰用事陽乃伏藏水冰地坼寒氣嚴凝當是之時善攝生者出處固密去寒就溫則不傷於寒其涉寒冷觸冒霜雪為病者謂之傷寒也三其傷於四時之氣皆能為病傷寒例成無己曰春風夏暑秋濕冬寒謂之四時之氣陸九芝曰仲景原文首著四時之氣四字則傷寒論之不獨言冬月傷寒而並春夏秋三時之溫熱濕燥論之豈不顯然乃必曰仲景獨知有寒者何哉仲景本知有溫熱既謂仲景但論寒反謂叔和將溫熱攙入論中以為仲景之論亂於叔和真不知其是何肺腑他人不足責黃坤載自稱古今無雙則更可笑矣四以傷寒為毒者以其最成殺厲之氣也傷寒例成無己曰熱為陽陽主生寒為陰陰主殺陰寒為病最為肅殺毒厲之氣王朴莊曰寒本正氣而有殺厲之毒不特使人病於冬且能使人病於春夏故治之不可不急也劉仲邁曰毒之為言害也博雅一曰惡也周禮天官醫師掌醫之政令聚毒藥以供醫事論云以傷寒為毒者喻為害之意云爾又易師卦以此毒天下而民從之與老子亭之毒之之毒在易義當訓治在老子則為優育之意後賢有以本論毒字為語病者真所見未廣耳五中而即病者名曰傷寒傷寒例王朴莊曰此桂枝麻黃二湯證也六不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也傷寒例王朴莊曰龐安常云嚴寒時奔走荷重勞力之人皆辛苦之徒也當陽氣閉藏反擾動之令郁發腠理津液強漬為寒所搏腠理反密寒毒與營衛相渾則病成矣其不即時成病者寒毒藏肌膚間至春夏陽氣發生與毒相搏因春溫氣而變者名溫病因夏暑而變者名熱病因暑濕而變者名濕溫以病本由冬時中寒故通謂之傷寒焉陸九芝曰龐説如此足以為難經傷寒共有五種之證七是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也傷寒例陸九芝曰此言溫病熱病皆非疫病而皆由觸寒所致故皆名傷寒讀此兩語則仲景明明告人以溫熱之病即在傷寒論中矣後人既不知此本仲景語而又疑叔和自為此語轉若仲景所未道因而削之又因而駁之若彼一見外臺祕要按外臺祕要諸論傷寒篇以陰陽大論王叔和華他陳廩丘範汪論小品論千金論經心録論為八家陰陽大論語即傷寒例中文又病源千金所引傷寒例文俱稱經言則傷寒例在隋唐時本作仲景原文亦當啞然自笑矣王秉衡曰傷寒外感之總名也傷寒論統論外感之書也王永嘉曰難經云傷寒有五則五種外感昔人皆謂之傷寒矣傷寒論有治風治溫治暍治濕諸法則非專論一傷寒矣王孟英曰吳鞠通謂宋元以來不明仲景一書專為傷寒而設吳氏直未讀傷寒論也注傷寒者無慮數十家皆以為專論傷寒之書故恆覺支離附會考論中風寒溫暍濕五氣為病古人皆曰傷寒故難經云傷寒有五而仲聖以傷寒名其書也此等大綱不清豈可率爾著書楊照藜曰注傷寒者無慮數十家皆以為專論傷寒之書故恆支離附會不適於用惟重慶堂隨筆指出為統論外感之書覺傷寒論之全體俱現此與堯封之見相同者八凡時行者春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也傷寒例張路玉曰傷寒是感天時肅殺之氣以寒犯寒必先寒水時行是感濕土鬱蒸之氣以濕犯濕必先濕土陽明為營衛之原始病則營衛俱病經絡無分三焦相溷內外不通所以其病即發而暴非比傷寒以次傳經而入也蓋地為汙穢濁惡之總歸平時無所不受適當天時不正之極則平時所受濁惡之氣亦必乘時迅發或冬時過暖肅殺之令不行至春反大寒冷或盛夏濕熱汙穢之氣交蒸忽然熱極生風而人汗孔閉拒毒邪不得發泄而為病病則老幼無分此即時行之氣也王朴莊曰四時失其正氣必即時發病而長幼多相似故曰時行陸九芝曰此言疫病不獨溫病熱病至首言應溫而反大寒則有寒疫在內仲景亦何嘗不知疫乎九其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異傷寒例張路玉曰冬溫者時當大寒而反大溫東風時至則肌腠疏豁忽然大寒而衣袂單薄寒鬱其邪其病即發者為冬溫以其所感非時溫氣故言與傷寒大異若不即發藏於皮膚則入傷血脈至春發為溫病藏於經絡則入傷骨髓至夏發為熱病矣十從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病傷寒例成無己曰此為溫病也內經云冬傷於寒春必病溫十一是以春傷於風夏必飧泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之傷寒例王朴莊曰此引素問以明四時正氣皆能留連致病而語意專為春溫發也風即春令生升之氣飧泄溏糞也痎二日一發瘧岐伯謂由人汗空疏腠理開因得秋氣邪內薄於五臟橫連膜原故蓄作有時而間日一發濕即初秋涼氣時有微雨日凡數陳諺云遠秋十日作秋天者是也蓋風暑濕寒原為正氣故當時有不即病者其夏之飧泄升極必降也秋之痎瘧散極必蓄也冬之咳嗽降極必升也春之溫病蓄極必散也故曰必然之道也十二若脈陰陽俱盛重感於寒者變成溫瘧傷寒例成無己曰脈陰陽俱盛者傷寒之脈也難經云傷寒之脈陰陽俱盛而緊澀經云脈盛身寒得之傷寒則為前病熱未已再感於寒寒熱相搏變為溫瘧王三陽曰陰陽俱盛者傷寒脈也十三日以上寒已傳裡變為熱病矣脈當沉數今復見傷寒脈豈非重感於外寒乎寒熱相搏故曰變為溫瘧十三陽脈浮滑陰脈濡弱者更遇於風變為風溫傷寒例成無己曰此前熱未歇又感於風者也難經云中風之脈陽浮而滑陰濡而弱風來乘熱故變風溫十四陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也傷寒例成無己曰此前熱未已又感溫熱者也陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒以其表裡俱熱故為病最重王朴莊曰此溫毒與金匱陽毒陰毒同洪數者氣之熱實大者血之熱溫熱之氣挾毒戾而入陽明變為溫毒凡一切斑疹皆其類也毒之陷伏者即不治故云為病最重也十五陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫傷寒例王朴莊曰溫疫即濕溫按濕溫即濕溫時疫非難經所謂傷寒有五之濕溫也時行之氣不外寒熱燥濕四者寒變溫瘧熱變溫毒燥變風溫濕變溫疫故總病論敘四種溫病直以溫疫為濕溫濡弱者天氣之濕客於上故陽脈見之弦緊者地氣之濕客於下故陰脈見之溫氣者春夏間先時太過之熱蒸動地濕之氣傷寒病後受之蘊而成身熱多汗不解之證此氣易於傳染能使長幼受多相似故名為疫言溫疫者以別於寒疫也寒疫必兼寒濕溫疫必兼濕熱此其大略也十六太陽病發熱而渴不惡寒者為溫病辨太陽病脈證並治成無己曰發熱而渴不惡寒者陽明也此太陽受邪知為溫病非傷寒也積溫成熱所以發熱而渴不惡寒也龐安常曰溫與熱有輕重之分故仲景云若遇溫氣則為溫病更遇溫熱則為溫毒熱比溫為尤重也若但冬傷於寒至春而發不感異氣名曰溫病此病之稍輕者也溫病未已更遇溫氣變為溫病亦可名曰溫病此病之稍重者也傷寒例以再遇溫氣名曰溫疫又有不因冬月傷寒至春為溫病者此特感春溫之氣可名曰春溫如冬之傷寒秋之傷濕夏之傷暑相同也以此觀之是春之病溫有三種有冬傷於寒至春發為溫病者有溫病未已更遇溫氣而為溫病與重感溫氣相雜而為溫病者有不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病者若此三者皆可名為溫病不必各立名色只要知其病源之所以不同也張云岐曰傷寒汗下不愈而過經其證尚在而不除者亦溫病也經云溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽病汗下後過經不愈診得尺寸俱浮者太陽溫病也如身熱目疼汗下後過經不愈診得尺寸俱長者陽明溫病也如胸脅痛汗下後過經不愈診得尺寸俱弦者少陽溫病也如腹滿嗌乾過經不愈診得尺寸俱沉細者太陰溫病也如口燥舌乾而渴過經不愈診得尺寸俱沉者少陰溫病也如煩滿囊縮過經不愈診得尺寸俱微緩者厥陰溫病也隨其經取之隨其症治之如發斑乃溫毒也柯韻伯曰溫病內外皆熱所以別於中風傷寒之惡寒發熱也此條不是發明內經冬傷於寒春必病溫之義乃概言太陽溫病之症如此若以春溫釋之失仲景之旨矣夫太陽一經四時俱能受病不必於冬人之溫病不必因於傷寒且四時俱能病溫不必於春推而廣之則六經俱有溫病非獨太陽一經也十七若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期辨太陽病脈證並治黃寶臣曰發熱惡寒者太陽證也發熱而渴不惡寒者陽明證也今太陽病始得之不俟寒邪變熱即現陽明之發熱而渴不惡寒者知非太陽傷寒乃太陽溫病也內經云冬不藏精之人春必病溫又云冬傷於寒春必病溫原內陰已虧外陽被郁伏邪醞釀早從熱化至春一遇外邪熱從內應故證現發熱而渴不惡寒也宜用寒涼之品於太陽表藥中微似汗以和之若用辛溫之劑以大發其汗內蘊之熱得辛溫而益盛故發汗已不但身不涼靜而反灼熱則輕病變重而成風溫矣蓋風溫之為病脈陰尺陽寸俱浮自汗出猶為太陽中風之本象至於身重多眠睡則標本合熱而顯出少陰之危象也腎熱上壅於肺而鼻息必鼾腎熱上凌於心而語言難出熱甚則臟腑之津液必傷若被誤下則水泉竭而小便不利甚至少陰之氣將絶不能榮太陽之脈而直視不能約膀胱之氣而失溲若被火灸燒針是以火益火微則熱鬱蒸土而發黃色劇則熱亢攻心而如驚癇熱甚生風而時瘛瘲黃色漸深中帶黑色若火熏之狀夫被下已為一逆矣被火是再逆也一逆尚可延引時日再逆則促其命期矣醫者可不慎哉王孟英曰彼冬溫春溫之先犯手太陰者皆曰風溫乃吸受之風溫也此伏邪內發誤汗致逆者亦曰風溫乃內動之虛風也然風溫在肺只宜清解若誤以辛熱之藥汗之亦有自汗多眠鼻鼾難語之變余治梁宜人一案可質也案見王氏醫案續篇陸九芝曰按當時之所謂誤下者乃巴豆小丸子故陰愈傷以巴豆亦溫熱藥也十八太陽中熱者暍是也其人汗出惡寒身熱而渴也金匱以白虎加人參湯主之辨太陽病脈證並治周禹載曰冬月寒能傷人則名中寒夏月熱亦能傷人則名中熱此是外表之熱故曰中與伏寒發為熱病之熱不同而同用白虎者則以所傷在氣則所主在金所病在熱金病則母子俱病故與伏氣之在少陰發出而由陽明者無異要皆並主一湯不因冬月之伏與夏月之中為二義也亦不因伏氣之渴與今病之渴為稍異也方主人參白虎者石膏功專清肺退金中之火是用為君知母亦能就肺中瀉火滋水之源人參生津液益所傷之氣而為臣甘草粳米補土以滋金為佐也沈堯封曰此是熱病證據素問在天為熱在地為火熱者火之氣也故熱為五氣之一而熱病即傷寒有五之一傷寒論以難經熱字恐與下文溫字相混故特指出曰暍是也感烈日之氣而病即素問寒暑燥濕風之暑病或曰暍是陽邪暑是陰邪土潤溽暑熱兼濕言也似與暍有異曰寒往則暑來與寒對待非專言熱而何古人稱暑暍熱一也若濕熱並至之病難經名曰濕溫不名暑逮至隋唐後皆指濕熱為暑於是真暑之名失而暍之名更不知為何病矣王孟英曰仲聖以夏月外感熱病名曰暍者別於伏氣之熱病而言也説文云暍傷暑也漢書武帝紀云夏大旱民多暍死故暑也熱也暍也皆夏令一氣之名也北齊書後主紀六月遊南苑從官暍死者六十人千金須知云熱死曰暍是唐時尚知暑暍之為熱也內經云在天為熱在地為火其性為暑又云歲火太過炎暑流行蓋暑為日氣其字從日曰炎暑曰酷暑皆指烈日之氣而言也夏至後有小暑大暑冬至後有小寒大寒是暑即熱也寒即冷也故寒字從冰冰為水氣是暑為陽寒為陰陰陽對待乃天地間顯明易知之事並無深微難測之理而從來歧説偏多誤人不淺更有調停其説者強以動靜分之夫動靜惟人豈能使天上之暑氣隨人而判別乎況內經有陰居避暑之文武王有樾蔭暍人之事又有妄合濕熱二氣為暑者則亢旱之年河井皆涸禾苗枯稿濕氣全無可以謂之非暑耶況濕無定位分旺四季風濕寒濕無不可兼惟季夏之土為獨盛故熱濕多於寒濕然暑字從日日為天氣濕字從土土為地氣霄壤不同雖可合而為病究不可謂暑中原有濕也十九太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也金匱以一物瓜蒂湯主之辨太陽病脈證並治黃寶臣曰上條言中暑而不兼濕之證此條言暑合濕邪而為患也太陽中暍者暑傷於形則身熱疼重暑傷於氣則脈微弱以此證與脈揆之知以夏月貪涼過飲冷水傷於水濕水行皮中為表邪所束不得汗泄之所致也沈漢卿曰此論夏月先中暍後傷冷水也熱由太陽入陽明故身熱復傷冷水水行皮中則營衛俱滯營氣被阻則身疼衛氣被阻則身重太陽中暍脈當數大不當微弱而脈微弱何也此以冷水在皮中隨營衛氣行營衛氣被阻不能達於脈致令脈微弱故曰此以夏月傷冷水水行皮中所致也瓜蒂苦寒能吐能下去身面四肢水氣水氣去則熱解故主之陳修園曰此言暑合濕邪為患有形之濕壅其肺氣也金匱治以一物瓜蒂湯後人推廣其義用五苓散茯苓豬苓白朮澤瀉桂大順散甘草乾薑杏仁肉桂小半夏加茯苓湯半夏茯苓生薑十味香薷飲香薷人參陳皮白朮茯苓扁豆黃耆木瓜厚朴甘草白虎加蒼朮湯石膏知母甘草粳米蒼朮皆兼治濕也至夏月陽虛陰伏凡畏熱貪涼皆可以傷冷水例之病在陰經即為陰證豈可一以清涼治暑哉二十太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚辨太陽病脈證並治沈堯封曰此言精氣素虧而中暍者陳修園曰此言中暑之證從經脈表裡俱病處繪出虛證模樣意者寒則傷形責其實熱則傷氣責其虛發熱惡寒至手足厥冷皆陰寒之脈證小有勞三句是虛而有熱之見證汗下火皆為所戒而治法從可知矣徐忠可曰此即潔古所謂靜而得之為中暑為陰證也蓋暍即暑也太陽中暍者太陽脈為一身之外衛凡六氣之感無不由之故暑亦必由太陽入惟太陽故發熱惡寒夏月氣溢經絡於時濕土司令傷暑者必兼濕故身重而疼痛暑熱必傷氣故弦細芤遲虛脈也然暑非中熱之謂暑熱內受陰寒外束即東垣所謂廣廈納涼之類故無汗不渴而身反重痛也成無己曰病有在表有在裡者有表裡俱病者此則表裡俱病者也發熱惡寒身重疼痛者表中暍也脈弦細芤遲者中暑脈虛也小便已灑灑然毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞動其陽而暍即發也口開前板齒燥者里有熱也內經云因於暑汗煩則喘喝口開謂喘喝也以喘喝不止故前板齒乾燥若發汗以去表邪則外虛陽氣故惡寒甚若以溫針助陽則火熱內攻故發熱甚若下之以除裡熱則內虛而膀胱燥故淋甚趙以德曰豫嘗思之此症屬陰陽俱虛脈弦細者陽虛也芤遲者陰虛也所以溫針復損其陰汗之復傷其陽此症惟宜甘藥補正以解其熱爾即靈樞所謂陰陽俱不足補陽則陰竭補陰則陽脫可將以甘藥不可飲以剛劑王宇泰曰中暍中暑中熱名雖不同實一病也若冬傷於寒至夏而變為熱病者此則過時而發自內達表之病俗謂晚發是也又非暴中暑熱新病之可比或曰新中暑病脈虛晚發熱病脈盛二十一師曰伏氣之病以意候之今月之內欲有一作知伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利平脈法張錫駒曰此條言伏氣之病由內而出非若時行卒病由外而至也張隱菴曰此一節言伏氣發病始則從陰出陽既則從陽入陰也伏氣之病者春之風氣夏之暑氣秋之濕氣冬之寒氣感之則潛匿於膜原肌腠之中不形於脈故當以意候之今月之內欲有伏氣者是以意候也如三春風盛九夏暑盛醫者當知今月之內時今太過欲有伏氣感之則潛匿於形身而為伏氣之病矣假令舊有伏氣今時乃發當須脈之若脈微弱者中土內虛風木之邪相剋也故當喉中痛似傷喉者天氣也痛似傷者火氣也此伏邪從陰出陽也非喉痹者言非陰寒內閉之喉痹也病人云實咽中痛者喉主天氣為陽咽主地氣為陰先病喉痛後病喉痛是先病陽後病陰也雖爾今復欲下利者言雖咽痛當復下利所以申明咽主地氣之意伏氣始病則從陰出陽既病則從陽入陰者如此葉子雨曰此節言伏氣之病伏藏於內不即見於病亦不見於脈故當候其何氣之伏藏伏於今月之內當發於今月之中故曰今月之內欲有伏氣是謂以意候之也假令舊有伏者今時乃發既見於病亦必見於脈故當須脈之若脈微弱者此春傷於風風木之邪賊於中土故脈微弱也風邪上受當喉痛似傷此伏氣之病非時行之喉痹也不特喉痛而且咽痛以風氣通於肝地氣通於咽脾主地木剋土也邪氣留連上行極乃下而為洞泄故曰雖爾今復欲下利此上下之交通一氣之相感也仲景論一春之風氣而三時之暑濕寒氣亦可類推矣注家多以脈微細喉痛下利乃少陰應有之脈證不知少陰之脈是微細此云微弱但弱與細有間而微則加於弱細之上非專論微脈也弱乃真陽不足胃氣大虛之候固非少陰之細脈亦斷無實熱之理因其土虛故木邪侮所不勝也侈談伏氣者何伏氣不明若是耶四傷寒補亡論仲景以為冬傷於寒中而即病者名曰傷寒蓋初感即發無蘊積之毒氣雖為傷寒而其病亦輕仲景又曰不即病寒毒藏於肌膚至春變為溫病至夏變為熱病是則既傷於寒又感於溫兩邪相搏合為一病如人遇盜又有同惡濟之者何可支也故傷寒冬不即發遇春而發者比於冬之傷寒為重也又有夏至而發者蓋寒毒淺近在膚腠正氣易勝故難久留是以即發其毒稍深則入於肌肉正氣不能勝必假春溫之氣開疏腠理而後可發是以出為溫病又其毒之盛者經時既久深入骨髓非假大暑消爍則其毒不可動此冬傷於寒至夏為熱病者所以又重於溫也故古人謂冬傷於寒輕者夏至以前發為溫病甚者夏至以後發為暑病也此三者其為傷寒本一也惟有即發不即發之異隨脈變動遂大不同又有冬不傷寒至春感不正之氣而病其病無寒毒之氣為根雖名溫病又比冬傷於寒至春再感溫氣為病輕然春溫冬寒之病乃由自感自致之病也若夫一鄉一邦一家皆同患者是則溫之為疫者然也非冬傷於寒自感自致之病也蓋以春時應暖而反寒夏熱反涼秋涼反熱冬寒反暖氣候不正盛強者感之必輕衰弱者得之必重故名溫疫亦曰天行時行也設在冬寒之日而一方一鄉一家皆同此病者亦時行之寒疫也大抵冬傷於寒經時而後發者有寒毒為根再感四時不正之氣而病則其病安得不重如冬病傷寒春病溫氣與夫時行溫疫之類才感即發中人淺薄不得與寒毒蘊蓄有時而發者同論也傷寒溫疫論五傷寒直格經言寒傷形寒傷皮毛寒傷血然寒主閉藏而腠理閟密陽氣怫鬱不能通暢怫然內作故身熱燥而無汗故經曰人之傷於寒也則為熱病又曰夫熱病皆傷寒之類也內經既直言熱病者言一身為病之熱氣也以至仲景直言傷寒者言外傷之寒邪也以分風寒暑濕之所傷主療不同故只言傷寒而不通言熱病也其寒邪為害至大故一切內外所傷俱為受寒之熱病者通謂之傷寒也一名大病者皆以為害之大也又春曰溫病夏曰熱病秋曰濕病冬曰傷寒傷寒者是隨四時天氣春溫夏熱秋濕冬寒為名以明四時病之微甚及主療消息稍有不等大而言之則一也非為外傷及內病有此異耳或云冬伏寒邪於肌膚骨肉之間至於春變為溫病夏變為熱病秋變為濕病冬變病為正傷寒病者及名冒其寒而內生怫熱熱微而不即病者以至將來陽熱變動或又感之而成熱病非謂伏其寒氣而反變寒為熱也經曰冬傷於寒春必病溫亦其義也亦有一時冒寒而便為熱病者或感四時不正乖戾之氣或隨氣運興衰變動或內外諸邪所傷或因他病變成或因他人傳染皆能成之但以分門隨證治之耳經言此六經傳受乃外傷於寒而為熱病之大略主療之要法也傷寒六經傳受六此事難知集一冬傷於寒春必溫病蓋因房室勞傷與辛苦之人腠理開泄少陰不藏腎水涸竭而得之無水則春木無以發生故為溫病至長夏之時時強木長因絶水之源無以滋化故為大熱病也傷寒之源如此四氣調神論曰逆冬氣則少陰不藏腎氣獨沉廣成子云無勞汝形無搖汝精金匱真言曰夫精者身之本也故藏於精者春不病溫注云冬不按蹺精氣伏藏陽不妄升故春不病溫又經云不妄作勞又云不知持滿又云水冰地坼無擾乎陽又云無泄皮膚使氣亟奪啓玄子云腎水王於冬故行夏令則腎氣傷春木王而水廢故病於春也逆冬則傷腎故少氣以奉春生之令也是以春為溫病夏為熱病長夏為大熱病其變隨乎時而已邪之所感淺者其病輕而易治深者其病重而難治尤深者其病死而不治傷寒之源二冬傷於寒者冬行秋令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病水不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病使民腠理開泄少陰不藏惟房室勞傷辛苦之人得之若此者皆為溫病所以不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時強不長無以滋生化之源故為溫病耳故君子周密於冬少陰得藏於內腠理以閉拒之雖有大風苛毒莫之能害矣何溫病之有哉人肖天地而生也冬時陽氣俱伏於九泉之下人之陽氣俱藏於一腎之中人能不擾乎腎則六陽安靜於內內既得以安外無自而入矣此傷寒之源非天之傷人乃人自傷也傷於寒者皆為病熱為傷寒氣乃熱病之總稱故曰傷寒知寒受熱邪明矣六陰用事於冬陽氣在內周密閉藏可矣反勞動之而泄於外時熱已傷於水矣至春之時木當發生陽已外泄孰為鼓舞腎水內竭孰為滋養此兩者同為生化之源源既已絶水何賴以生乎身之所存者獨有熱也時強木長故為溫病矣冬傷於寒春必溫病七醫經溯洄集有病因有病名有病形辨其因正其名察其形三者俱當始可以言治矣一或未明而曰不誤於人吾未之信也且如傷寒此以病因而為病名者也溫病熱病此以天時與病形而為病名者也由三者皆起於感寒或者通以傷寒稱之夫通稱傷寒者原其因之同耳至於用藥則不可一例而施也何也夫傷寒蓋感於霜降後春分前然不即發鬱熱而發於春夏者也傷寒即發於天令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所以必用也溫病熱病後發於天令暄熱之時怫熱自內而達於外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此仲景桂枝麻黃等湯獨治外者之所以不可用而後人所處水解散麻黃大黃黃芩桂心甘草白芍大黃湯大黃芒硝芥子丹皮桃仁千金湯麻黃桑白皮蘇子杏仁白果黃芩半夏甘草款冬花防風通聖散防風川芎當歸芍藥大黃薄荷麻黃連翹芒硝石膏黃芩桔梗滑石甘草芥穗白朮梔子之類兼治內外者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則知熱病亦如此是則不渴而惡寒者非溫熱病矣然或有不因新中風寒亦見惡風惡寒之證者蓋病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷風惡風傷寒惡寒也但衛虛則惡風營虛則惡寒耳且溫病熱病亦有先見表證而後傳裡者蓋怫熱自內達外熱鬱腠理不得外泄遂復還里而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫病熱病而求浮緊之脈不亦疏乎殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫病熱病或見脈緊者乃重感不正之暴寒與內傷過度之冷食也豈其本然哉又或者不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷為寒夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫熱在內故也其或左手盛或浮者必有重感之風寒否則非溫病熱病自是暴感風寒之病耳凡溫病熱病若無重感表證雖間見而里病為多故少有不渴者斯時也法當治裡熱為主而解表兼之亦有治里而表自解者余每見世人治溫熱病雖誤攻其里亦無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裡而致大害者乃春夏暴寒所中之疫證邪純在表未入於裡故也不可與溫病熱病同論夫惟世以溫病熱病混稱傷寒故每執寒字以求浮緊之脈以用溫熱之藥若此者因名亂實而戕人之生名其可不正乎又方書多言四時傷寒故以春夏之溫病熱病與秋冬之傷寒一類視之而無所別夫秋冬之傷寒真傷寒也春夏之傷寒寒疫也與溫病熱病自是兩途豈可同治籲此弊之來非一日矣歷考方書並無救弊之論每每雷同良可痛哉雖然傷寒與溫病熱病其攻裡之法若果是以寒除熱固不必求異其發表之法斷不可不異也況傷寒之直傷陰經與太陽雖傷不及鬱熱即傳陰經為寒證而當溫者又與溫病熱病大不同其可妄治乎或者知一不知二故謂仲景發表藥今不可用而攻裡之藥乃可用嗚呼其可用不可用之理果何在哉若能辨其因正其名察其形治法其有不當者乎彼時行不正之氣所作乃重感異氣而變者則又當觀其何時何氣參酌傷寒溫熱病之法損益而治之尤不可例以仲景即病傷寒藥通治也傷寒溫病熱病説八丹溪心法附余經曰冬傷於寒春必病溫此言感時氣不即發藏於膚腠之間過期遇觸動而發也且以即病傷寒傷風與伏氣溫熱病三者而言之傷寒則身熱無汗惡寒傷風則身熱有汗惡風二者皆邪自外入故表病里和鼻寒而口不渴溫熱病則邪自內出故身熱或有汗或無汗鼻不寒而口渴也傷寒傷風之邪循經而入以漸而深故治法要分三陽三陰清切表裡寒熱虛實明白方可施治不可一毫而少差也溫熱之邪自內而出不過發攻表中里三者之熱而已何難之有哉溫熱病附論九傷寒補天石一溫病者冬月伏寒之所變也冬月伏陽在內感寒不即病伏藏於肌膚之間至春時溫氣將發又受暴寒故春變為溫病既變之後不得復言為寒矣又傷寒汗下後過經不解亦名溫病並不可發汗蓋過經而發不在表也已經汗下亦不在表也經曰不惡寒而渴者蓋言溫病也不惡寒則病非外來渴則明其熱自內達外因無表證明矣溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽病頭痛身熱汗後過經不愈診得尺寸俱浮者太陽病溫也如身熱目疼汗下後過經不愈診得尺寸俱弦長者陽明病溫也如胸脅痛汗下後過經不愈診得尺寸俱弦者少陽病溫也如腹滿嗌乾過經不愈診得尺寸俱沉者太陰病溫也如舌乾口燥過經不愈診得尺寸俱微沉者少陰病溫也如煩滿囊縮過經不愈診得尺寸俱微緩者厥陰病溫也要在隨其經而取之凡溫病發於三陽者多發於三陰者少若發於陰必有所因也或因飲食內傷而得之或因欲事先傷腎經而得之溫病傷寒第四十八二熱病者冬月伏寒之所變也冬月伏陽在內感寒不即病伏藏於肌膚之間至夏時暑熱將發又受暴寒故夏變為熱病既變之後不得復言為寒矣凡熱病所起所因所感所發證脈治法並與溫病同熱病傷寒第四十九十傷寒六書趙嗣真曰按仲景論謂冬月冒寒伏藏於肌膚而未即病因春溫氣所變則為熱夫變者改易之義也至此則伏寒各隨春夏之氣改變為溫為熱既變之後不得復言其為寒也所以仲景云溫病不惡寒者其理可見矣活人書其於溫病曰陽熱未盛為寒所制豈有伏寒既已變而為溫尚可言寒能制其陽熱耶又於熱病曰陽熱已盛寒不能制亦不當復言其為寒也蓋是春夏陽熱已變其伏寒即非有寒能制其陽熱爾外有寒邪能折陽氣者乃是時行寒疫仲景所謂春分以後秋分節前天有暴寒為時行寒疫是也三月四月其時陽氣尚弱為寒所折病熱則輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微是知時行寒疫與溫熱二病所論陽氣盛衰時月則同至於論暴寒之寒與伏寒已變之寒自是相違名不正則言不順矣仲景又云其病與溫及暑病相似但治有殊耳要在辨其病源寒熱溫三者之殊則用藥之冷熱判然矣傷寒瑣言傷寒變溫熱病論十一傷寒緒論一至春分節後天令溫暖有人壯熱為病者乃溫病也經云冬傷於寒發為溫病又云太陽病發熱而渴不惡寒者為溫病言冬時伏氣隨時溫熱發出但所發之因不同有感非時暴寒而發者有飢飽勞役而發者有房室作力而發者所感之客邪既殊發出之經絡亦異所謂溫病之脈行在諸經不知何經之動也當隨其經證而治之凡溫病之發必大渴煩擾脅滿口苦不惡寒反惡熱脈氣口反盛於人迎明系伏邪自內達表必先少陽經始溫病二大抵治溫病熱病無正發汗之理蓋其邪自內達外無表證明矣若果證顯非時暴寒惡寒頭痛而脈浮緊者亦不可純用表藥溫病三大抵溫病熱病皆是熱鬱之氣故多發於三陽若發於三陰者必難治其脈若沉細或微弱或虛大無力為脈不應病必死然發於三陰者必有所因或因冷食傷脾或因欲事傷腎皆正氣先傷熱毒乘虛而發設用甘溫調補寧不助邪轉熾若行苦寒峻攻真元立致消亡雖長沙河間復起恐難為力矣熱病十二溫熱暑疫全書一喻嘉言尚論篇闡發仲景傷寒論殊暢也醫門法律闡發金匱要略殊貫也雖皆有所粉本然學廣才張心靈筆古以各成其妙者也至尚論溫病云會內經之旨以發仲景不宣之祕且謂仲景略於治溫而法度錯出於治傷寒中因內經云冬傷於寒春必溫病此一大例也冬不藏精春必病溫此一大例也既冬傷於寒又冬不藏精至春月同時病發此一大例也奉此三例以論溫證而詳其治然後與仲景三陽三陰之例先後合符蓋冬傷於寒邪藏肌膚即邪中三陽之謂也冬不藏精邪入陰藏即邪中三陰之謂也嘉言之論如此豫謂溫病無陰陽之分也何也冬有溫氣先開發人之腠理而寒得以襲之所謂邪之所湊其氣必虛惟不藏精之人而後虛也虛則寒傷其經經必少陰者以少陰藏本虛也然所傷原微且冬月大水當令其權方盛微邪不敢抗衡但臥榻之側豈容他人鼾睡惟有阻彼生意暗爍精髓至於春時強木長而水不足以供其資始則當春而溫木旺水虧所郁升發火氣燔灼病溫而已矣其所傷者寒也所病者溫也所伏者少陰也所發者少陽也故病必有陽而無陰藥必用寒而遠熱黃芩湯黃芩芍藥甘草大棗其主治也則嘉言之論溫有陰有陽如傷寒三陰經可用辛熱者豫曰否否不然也春溫病論二冬傷於寒春必病溫是言所感者本寒也王叔和云從立春節後其中無暴大寒又不冰雪有人壯熱為病者此屬春時陽氣發外冬時伏寒變為溫病此亦明言寒也變字大妙嘉言以為非豫獨以為確寒氣內伏郁久而發自成熱矣傷寒寒也暫襲營間不久而為大熱況遲之又久耶為熱乃自然之理但不言變不足以教天下也然何以不言熱而言溫以春行溫令故也如李明之所云冬傷於寒者冬行春令也當冬而溫火勝而水虧矣水既虧則所勝妄行土有餘也所生受病金不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病然由明之所言是冬溫而感之即病者也非伏寒也非變也不然必無冬溫一證也而後可既有冬溫則有是氣已有是證矣由其言以悉冬溫便可垂論不磨若論春溫不免貽昧千古矣經曰逆冬氣則少陰不藏不藏則寒邪得而入之傷於肌膚伏於骨髓始知冬為藏精之時惟逆冬氣遂使少陰之經氣不閉復遭非時之暖致令開泄忽然嚴寒驟返不免受傷故受傷者仍是寒邪也因先被溫令開泄似乎喜寒且所傷不甚故不即病而潛伏於少陰也然所以不病於冬而病於春者正因水在冬為旺時邪伏於經且俯首而不敢抗內郁既久已自成熱至行春令開發腠理陽氣外泄腎水內虧至春三月而木當生髮孰為鼓舞孰為滋養生化之源既絶木何賴以生乎身之所存者溫也時強木長故為溫病豫故以彼論冬時之感溫非是而此論冬月之伏寒最精愚性甚拙何敢好議先賢但以為必如此方與冬溫兩不相阻且與仲景論溫熱必推本自始動曰傷寒之旨無悖云耳春溫病論三門人問曰傷者寒也何以病溫答曰傷寒非病寒乎而何以熱也寒鬱營間不一二日而成大熱況伏藏於內者數十日之久耶夫既邪傷肌肉何以得入少陰經中蓋惟不藏精則少陰先病故邪傷者少陰也春屬木則自內發出無論兼太陽或陽明總無不由少陽何也彼少陽行春令也然既從少陰矣何仲景專云太陽病蓋太陽與少陰相表裡也故以發熱為太陽也曰不惡寒明無表症也則其熱自內出無外邪郁之也然則仲景復言太少合病者見發熱不惡寒或兼有耳聾脅滿證也言三陽合病者以脈大屬陽明而多眠則熱聚於膽也不言法者總以黃芩湯為主治也乃嘉言復謂有發表三五次而外證不除攻裡三五次而里證不除以為在表也又似在裡以為在裡也又似在表此溫疫證感天地人濕氣熱氣尸氣邪入口鼻溷淆三焦者相近與春溫全不相涉也愚故及之以破後學之惑春溫病論四門人復問曰春溫亦間有一二表症者乎曰有之伏氣之病雖感於冬然安保風之傷人不在伏氣將發未發之時乎但兼外感者必先頭痛或惡寒而後熱不已此新邪引出舊邪來也或往來寒熱頭痛而嘔稍愈後渾身壯熱為病者此正氣又虛伏發更重也總之無外證者以黃芩湯為主治兼外感者必加柴胡或以本經藥輕解必無發汗之理故仲景云發汗已身灼熱者名曰風溫謂誤用辛熱之藥既辛散以劫其陰復增熱以助其陽遂使熱更熾脈俱浮有如此之危證也以及誤下誤火嚴加戒諭者舍黃芩湯別無治法也春溫病論五溫病熱病之脈或見浮緊者乃重感不正之暴寒寒邪束於外熱邪結於內故其脈外繃急而內洪盛也或不識脈形但見弦脈便呼為緊而妄治之蓋脈之盛而有力者每每兼弦豈可錯認為緊而誤以為寒乎夫溫熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫鬱在內故也其左手盛或浮者必有重感於風寒否則非溫熱病自是非時暴寒耳溫熱病脈論六溫熱病亦有先見表證而後見里證者蓋怫鬱自內達外熱鬱腠理之時若不用辛涼發散則邪不得外泄遂還里而成可攻之證非如傷寒從表而始也或有不悟此理乃於春夏溫熱病而求浮緊之脈不亦疏乎溫熱病脈論七熱病即伏寒也彼冬傷於寒發於春為溫病發於夏為熱病何彼發於春此發於夏耶蓋感之輕重不同人之強弱亦異而觸發亦異有因飢飽力役者有因房室勞傷者故春時雖行風木之令使氣血不致大虧感觸亦有先後不即發也至夏則陽氣盡泄火令大行正屬濕土寄旺爾時邪烏肯伏故其發源皆自少陰熱病由出之途自陽明溫病由出之途自少陽雖所合之經不一要不離乎陽明少陽者各因時令之氣也且為日既遲為熱愈熾此仲景所以用石膏辛涼胃熱以知母蕩滌腎火用甘草粳米維持中氣也名湯曰白虎者白屬金屬涼風從虎且猛人逢悶熱煩燥無可奈何之際忽然狂風薦至偃草揚波火輪火樹不頓成清涼世界而稱快乎夏熱病論十三歸硯録一故人沈君辛甫端恪公曾孫也嘗病吳鞠通混疫於溫余謂不但此也其條辨首列曰溫病者有風溫有溫熱有溫疫有溫毒有暑溫有濕溫有秋燥有冬溫有溫瘧凡九項似無遺義而不自知其題旨未清也夫冬傷於寒至春而發者曰溫病夏至後發者曰熱病冬春感風熱之邪而病者首先犯肺名曰風溫其病於冬者亦曰冬溫病於春者亦曰春溫即葉氏所論者是也夏至後所發之熱病在內經亦曰暑以其發於暑令也故仲景以夏月感暑成病者名曰暍蓋暑暍者皆熱之謂也今杜撰暑溫名目最屬不通至於疫證更不可與溫熱同治當從吳又可余師愚兩家為正鵠而溫之為毒為瘧乃溫之節目矣概而論之宜乎愈辨愈不清矣二其次條云凡病溫者始於上焦在手太陰嘻豈其未讀內經耶伏氣為病自內而發惟冬春風溫夏暍秋燥皆始於上焦若此等界限不清而強欲劃界以限病未免動手即錯矣夫溫熱究三焦者非謂病必在上焦始而漸及於中下也伏氣自內而發則病起於下者有之胃乃藏垢納汙之所濕溫疫毒病起於中者有之暑邪挾濕者亦犯中焦又暑屬火而心為火臟同氣相求邪極易犯雖始上焦亦不能必其在手太陰一經也三第四條云太陰風溫溫熱溫疫冬溫初起惡風寒者桂枝湯主之夫鞠通既宗葉氏當詳考葉氏論案以立言如指南溫熱門第三案云溫邪上受內入乎肺肺主周身之氣氣窒不化外寒似戰栗其溫邪內郁必從熱化風溫門第五案云風溫入肺氣不肯降形寒內熱乃膹郁之象用藥皆是辛涼輕劑至幼科要略論三時伏氣外感尤為詳備於春溫證因外邪引動伏熱者必先辛涼以解新邪自注用蔥豉湯垂訓昭然何甘違悖意欲紹述仲聖乎則祖上之門楣不可誇為自己之閥閲也在涇先生云溫病伏寒變熱少陰之精已被劫奪雖有新舊合邪不得更用桂枝湯助熱而絶其本也豈吳氏皆未之聞乎四中焦篇第一條自注云肺病逆傳則為心包上焦失治則傳中焦始上焦終下焦噫是鞠通排定路徑必欲溫熱病遵其道而行也有是理乎彼犯肺之邪若不外解原以下傳於胃為順故往往上焦未罷及中焦惟其不能下行為順是以內陷膻中為逆傳章虛谷亦昧此義乃云火來剋金而肺邪反傳於包絡故曰逆夫從所勝來者為微邪胡可反以為逆豈二公皆未讀難經耶其不始於上焦者更無論矣五書名溫病條辨而所列霍亂皆是寒證故餘年少時輒不自揣而有霍亂論之作也沈辛老云鞠通書蘭本葉氏有前人未見及而補之者如秋燥增入正化痙瘛別為兩條談理抑何精細有前人已見及而忘之者如霍亂證自具暑濕門岫云未經摘出而伊遂不知有熱疝氣條當分暴久治香岩先生業已道明而伊又惟知有寒蓋心思之用固各有至不至雖兩間亦缺陷世界而況人乎又曰鞠通所云之疝多系暴證而久者又系宿瘕病故可一以溫下取下若疝雖有歷久不痊然聚則有形散即無形初非真有物焉如瘀積腹中也又云乾霍亂以生芋杵汁下咽即生遠勝鹽湯探吐也暑瘍初起用絲瓜杵汁塗之或荷花瓣貼之皆妙不必水仙根也六中焦八十四條云少陽瘧如傷寒證者小柴胡湯主之此與溫熱何與而乃濫入乎辛老云葉氏知暑濕時瘧與風寒正瘧迥別融會聖言惟從清解所見甚超而洄溪反以不用柴胡屢肆詆訾食古不化徐公且然況其下乎噫辛老長餘九歲與余交最深品學兼優真古君子也嘗為余校溫熱經緯而家貧無子今墓草宿矣遺稿未梓偶於拙草中檢得數條附録於此亦可以見其讀書具眼立言忠厚也七下焦篇之定風珠一派腥濁濃膩無病人胃弱者亦難下咽如果厥噦欲脫而進此藥是速其危矣八二十四至二十六條皆冬寒內伏春溫初發之治乃妄謂溫熱溫疫自上中傳下之治豈非夢囈九四十二條自注謂宋元以來不明仲景一書專為傷寒而設吳氏直未讀傷寒論也注傷寒者無慮數十家皆以為專論傷寒之書故恆覺支離附會考論中風寒溫暍濕五氣為病古人皆曰傷寒故難經云傷寒有五而仲聖以傷寒名其書也此等大綱不清豈可率爾著書十五十一條痰濕阻氣之陰吹證實前人所未道及十一五十五條發明蠶砂功用何其精切故余治霍亂以為主藥也十二吳氏此書不過將指南溫熱暑濕條案穿插而成惜未將內經難經傷寒論諸書溯本窮源即葉氏溫熱論幼科要略亦不匯參故雖曰發明葉氏而實未得其精奧也至採附各方不但剪裁未善去取亦有未當此余不得已而有溫熱經緯之纂也十三後三卷雜説解産難解兒難等篇皆可傳之作遠勝三焦條辨多矣雜説中惟霍亂不得吐瀉治以苦辛芳熱一語為可議條辨中可議處甚多姑舉大略如上庶讀者勿隨波而逐流也第二章分論一考證溫熱名義經云冬傷於寒春必病溫又曰冬不藏精春必病溫同一病溫耳而必別之曰是為傷於寒是為不藏精其義何居曰此皆伏氣之為病也傷寒甚者冬時即病微者不即病其氣伏匿於肌腠及少陰至春陽氣開泄觸動伏氣而為病此一例也西洋醫謂潛伏期不過十四日無冬傷寒至春乃病之理不思痘疹麻疹為先天之毒有潛伏至十餘年二三十年者由冬及春一剎那間耳能決其必無是病乎不藏精之説注家謂不專主陰精而言如冬應寒不寒桃李反花之類夫氣候不寒陽邪早發消鑠陰液腎精內虧至春陽氣舒張或新邪引觸伏邪為病人與天地同一氣耳氣候不和感觸蘊藏日積月纍而病以生此又一例也經又曰先夏至日為病溫後夏至日為病暑暑即熱也夏至以前氣候和煦故感之者隨時令而病溫夏至以後氣候酷熱故感之者隨時令而病暑溫者較熱為微熱者較溫為重此又一例也溫熱雖隨時令而變遷究之病重於溫則為熱又不可謂夏至以前必無熱病也東洋醫學謂人為溫血動物以熱度表測算通常在攝氏寒溫計三十六五度與三十七五度之間溫特爾里希氏以三十七度五分乃至三十八度名為次熱三十八度乃至三十八度五分名為輕熱三十八度五分乃至三十九度五分名為中熱三十九度五分乃至四十度五分名為高熱四十度五分以上名為劇熱但至四十度以上患者必無生望其以華氏熱度表九十八度起算者規例亦同夫次熱輕熱即溫病之類也高熱劇熱即熱病之類也觀此而溫與熱之名義渙然冰釋矣二論傷寒成溫之理夫傷寒之病醫者多不審察病之本源但只云病傷寒即不知其始自陽氣內鬱結而後為熱病矣自冬至之後一陽漸生陽氣微弱猶未能上行易曰潛龍勿用是也至小寒之後立春以前寒毒殺厲之氣大行時中於人則傳在臟腑其內伏之陽被寒毒所折深浹於骨髓之間應時不得宣暢所感寒氣淺者至春之時伏陽早得發泄則其病輕名曰溫病感寒重者至夏至之後真陰漸發其伏陽不得停留或遇風寒或因飲食沐浴所傷其骨髓間鬱結者陽氣為外邪所引方得發泄伏陽既出肌膚而遇天氣炎熱兩熱相干即病證多變名曰熱病按素問生氣通天論云冬傷於寒注云冬寒且凝春陽氣發寒不為釋陽怫於中與寒相持故病溫又熱論云人之傷於寒也則病熱注云寒毒薄於肌膚陽氣不得散發而內怫結故傷寒者反為熱病也以此證之即傷寒之病本於內伏之陽為患也三論葉派治溫熱之誤魏晉六朝隋唐五季以逮宋金元明固無人不知仲師傷寒論為通治四時而設獨至康雍以降別創溫熱之論而傳足傳手六經三焦妄生畛域遂致後人之讀其書者誤信首先創議之人大名炫赫無不一例盲從乃使世人之病溫熱者皆不得一嘗仲聖方藥以致於危殆何莫非妄分溫熱傷寒為兩事者有以殺之嗚呼自葉香岩溫熱一論盛行於時而後賢繼起互有發明間亦可以少補仲師傷寒論所未備而初不料首先提倡之葉老及首先著書之鞠通屏絶仲師成法謬制新方滋膩戀邪有百害而無一利舉世不察相沿成俗誤盡蒼生而終其身不一覺悟則香岩一人實為溫熱病中功之首而罪之魁然究其貽禍之源皆由於誤認傷寒論一書為專治冬傷於寒之一念有以成此厲階而殺人遂不可勝數是誠二百年之浩劫也哀哉至用犀角地黃玄參麥冬諸物最是葉老慣伎臨證指南及顧氏所述之溫熱論同符合轍所見一誤而其禍蔓延遍於全國流毒至今作俑二字斷不容為此老諱彼吳子音之偽撰三家醫案醫效祕傳溫熱贅言及吳鞠通之條辨則皆奉行此催命靈符而充作鉤魂之大使者也近賢王氏孟英治案能不受葉派拘束不愧一大方家然溫熱經緯猶於葉氏作應聲之蟲模模糊糊汨沒真性且有溫熱亦傳足經而手經先受之語亦隱隱為此老魔力吸住不能自脫則此老誤人之罪那不上通於天耶又按葉氏所以倡為三焦之論者蓋亦明知溫病熱病必多陽明在經在腑之症無如既經一口咬定溫熱傳手不傳足則胃是足經必不能自圓其説於是無聊極思提出三焦二字冀與六經之説互為雄長而又恐本作自造無以取信於天下乃更信口雌黃偽託河間先有此説隱隱然以自己所提之肺病心病歸於上焦而即以世間恆有之陽明胃病歸之中焦掩耳盜鈴其計不可謂不狡然自欺欺人終不能使天下後世不一讀河間之書則河間三焦之語果何所本臆説那不立窮作偽而敢於厚誣古人直是栽臟陷害手段陸九芝謂嘉言論溫三篇可剮可殺愚謂亦當移贈葉老鞠通不學竟以讕言作為鴻祕尤其可笑然耳食之徒皆奉此兩家寶若兔園册子而所謂葉派者遍於中國此溫熱之病在陽明者所以一病一死十病十死而幾於百不一愈也哀哉四溫邪上受解溫熱論曰溫邪上受首先犯肺逆傳心包華岫云曰風溫濕溫之時感者邪從口鼻而入故曰上受若春溫之由冬時伏寒藏於少陰者又非上受也按傷寒從毛竅而入溫病從口鼻而入二語世莫不奉為定案矣其實二者亦皆互有而總以從毛竅入者為多南人中焦濕熱素盛一感溫邪即表裡合一遂似全從口鼻而入亦不察之甚也若果盡從口鼻而入何以治法中有汗法乎本文上受二字即內經邪氣在上之義附時人陸平一語外邪傷人或襲皮毛或入口鼻皆受自表也近人強指溫病必從口鼻入一若分疆劃界溫氣必不許從皮毛從者未免可笑五溫熱久在一經解溫熱論曰傷寒多有變證溫熱雖久總在一經為辨此義世皆以手足經釋之非也傷寒亦有不傳經者但傳經者多溫病傳經者少所以然者寒邪為斂其入以漸進一境即轉一象故變證多溫邪為開重門洞闢初病即常兼二三經再傳而六經已畢故變證少也六論吳氏溫病條辨之誤吳鞠通本顧景文溫邪上受首先犯肺逆傳心包之十二字而為溫病條辨自條自辨可發一笑者也開卷捏造溫病以桂枝湯主之為仲景原文繼復承臨證指南暑病門楊姓案云仲景傷寒先分六經河間溫熱須究三焦之訛以喻西昌治瘟之法謂是劉河間之所以治溫夫河間治法亦惟六經是言而三焦二字始終不見於六書此其兩失已不待言乃以溫病之本在中焦者先移之於上焦謂切不可用中焦藥痛哉中焦之芩連而其下即云熱邪久羈劫鑠真陰邪熱久羈肌膚甲錯皆鞠通所自言皆鞠通自己所告人者先是自制銀翹散連翹薄荷芥穗銀花竹葉淡豆豉桔梗甘草牛子桑菊飲杏仁連翹薄荷桑葉菊花桔梗甘草葦根兩方即顧景文之辛涼輕劑不名一藥而鞠通為之引申者也嗣是方名安宮用犀角牛黃即安宮牛黃丸用牛黃鬱金犀角黃連硃砂梅片麝香珍珠山梔雄黃金箔黃芩又清宮湯用玄參心蓮子心竹葉捲心連翹心犀角尖連心麥冬方名增液用玄參麥冬即增液湯用玄參麥冬鮮生地以及一甲二甲三甲之復脈湯加減復脈湯用炙草乾地白芍麥冬阿膠麻仁一甲復脈湯即於加減復脈湯內去麻仁加牡蠣二甲復脈湯即於加減復脈湯內加牡蠣鱉甲三甲復脈湯即於二甲復脈湯內加龜板小定風珠雞子黃阿膠龜板童便淡菜大定風珠白芍阿膠龜板乾地麻仁五味子牡蠣麥冬炙草雞子黃鱉甲無非滋膩傷陰引邪內陷病至此不可為矣而因其中焦篇亦或有偶用芩連膏黃時凡溫病之一用芩連膏黃無不可去邪撤熱者鞠通又若未嘗不知然苟非布置上焦則熱邪未必久羈真陰即未定劫鑠苟非訶斥芩連則邪熱未必久羈肌膚又未定甲錯顧景文延之數日鞠通再加緩緩二字何以必緩緩也不可解而實可解也此所以後乎鞠通者亦萬不肯不用其法也以滋膩留邪之藥緩緩延之熱邪方盛之時陰無不傷病無不死陶節庵之一提金殺車錘截江網書名之惡極者也此之一甲二甲三甲定風珠方名之惡極者也病何等事醫何等人顧可兒戲若斯乎七溫熱病説溫熱之屢變而亂其真也由於傷寒之一變而失其傳風寒諸病由太陽入陽明者有傷寒論在尚且各自為説至溫熱而漫以為仲景所未言更不妨別出己見每先將溫病移入他經或且移作他證如奕棋然直無一局之同者若喻嘉言移其病於少陰腎周禹載移其病於少陽膽舒馳遠移其病於太陰脾顧景文移其病於太陰肺遂移其病於厥陰心包秦皇士移其病於南方吳鞠通移其病於上焦陳素中楊栗山移其病為雜氣章虛谷王孟英移其病為外感尤其甚者則張介賓張石頑以及戴天章輩皆移其病為瘟疫而石頑又移其病為夾陰娓娓動聽亦若各有一理也者而不知陽明為成溫之藪古來皆無異説皆以傷寒論陽明方為治自夫人欲廢陽明方故必先將陽明病移出陽明外非余之故為訾議也苟其不然則東扯西拽者何以必將千古相傳之定法辨髦棄之哉禹謨曰宥過無大刑故無小不知而移之出於無心也過也猶可恕也知而移之出於有心也故也不可言也潛窺其隱恐尚不僅為明昧之分後有作者或更別有移法總欲令世人不知有仲景而樂就其簡便之門新奇之説耳然此皆將溫病移出陽明者更有明知其在陽明亦必謂不可用傷寒方而自制一二味藥以為此非仲景所知其實除此一二味則仍不離傷寒論之葛根膏黃試一問黃坤載楊栗山輩於青萍蠶蟬外所用何藥即可見矣此則暗襲傷寒方而即明斥傷寒論又以不移為移者也吾願任斯道之君子毋為移字訣所誤看得仲景書只宜於寒而疑傷寒之方真不可用於溫熱之病則吾道之幸亦病家之幸也八伏溫論伏溫之病隨經可發經訓昭垂已無疑義乃張石頑謂溫邪之發必由少陽陸九芝謂溫熱病必發於陽明陳平伯則以肺胃為溫邪必犯之地吳又可又以膜原為溫疫伏邪之所諸家所論雖亦各有所見但只舉溫病之一端而不可以概溫病之全體至吳鞠通條辨橫分三焦謂凡病溫者必始於上焦手太陰是以時感風溫之證指為伏氣發溫之病彼此混而不分其背謬為尤甚學者當本古聖經文悉心參究確知溫病之發隨經可動臨證時始有真知灼見而不至有他歧之惑也九傷寒溫熱疫邪傳入不同傷寒之邪自表傳裡里證皆表證所侵入溫熱之邪自里達表表證皆里證所浮越惟疫邪由膜絡中道隨表裡虛實乘隙而發不循經絡傳次亦不能一發便盡吳又可發明九傳及熱結旁流膠閉而非燥結皆為特識且傷寒由氣分陷入血分溫熱由血分轉出氣分故傷寒多始於太陽溫熱多始自陽明或始自少陰此即熱歸於氣或歸於血之明辨也十辨傷寒溫病熱病並無傳染之理按素問熱論傷寒曰人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死又曰凡病傷寒而成溫病者先夏至日為病溫後夏至日為病暑又曰藏於精者春不病溫初無傳染之説張仲景曰陰陽大論云冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而病者名曰傷寒不即病者寒毒藏於肌膚孫真人作肌骨之中至春變為溫病至夏變為暑病熱極重於溫也是以辛苦之人春夏多為溫熱病皆由冬時觸寒所致又曰十一月十二月寒冽已嚴為病則重迥考素問仲景及諸家之論皆云冬時觸冒寒毒所致非是猝然傳染也十一辨景嶽混瘟溫為傷寒之誤景嶽曰近或有以溫病熱病謂非真傷寒者在未達其義耳又曰瘟疫本即傷寒無非外邪之病但染時氣而病無少長率相似者是即瘟疫之謂內經以溫暑病有類傷寒故曰傷寒之類既明言傷寒之類不竟言傷寒何不竟言傷寒而曰病溫病熱景嶽於經義尚未詳悉抑有意欲毀河間故將經義塗抹耶又瘟疫乃時行傳染不正之氣為病何得云本即傷寒無非外邪之病既云傷寒乃外之寒邪所襲而病自表傳裡既云但染時氣而病則非傷寒也此言殊謬春溫之病冬令寒邪鬱伏火氣至春得風寒所觸自內而發外從春令故曰溫病瘟疫病乃感受時行不正之氣而病所以傳染少長相似者不論四時皆有之景嶽於瘟疫傷寒溫病熱病尚未清爽用藥惟投溫散發表出汗治法大謬十二論溫熱四時皆有溫熱伏氣病也通稱伏邪病之作往往因新感而發所謂新邪引動伏邪也因風邪引動而發者曰風溫或曰風火因寒邪引動而發者曰冷溫或曰客寒包火因暑邪引動而發者曰暑溫或曰暑熱因濕邪引動而發者曰濕溫或曰濕遏熱伏若兼穢毒者曰溫毒其症有二一為風溫時毒一為濕溫時毒此以兼症別其病名也其發於春者曰春溫或曰春時晚發發於夏者曰夏熱或曰熱病發於秋者曰秋溫或曰秋時晚發或曰伏暑發於冬者曰冬溫或曰伏暑冬發此以時令別其病名也其病萌於春盛於夏極於秋衰於冬間亦有盛發於春冬者然總以盛發於夏秋為多何則春冬空氣清潔輕氣多而炭氣少故其為病亦清邪多而濁邪少除新感症外即有因伏邪而病純熱無寒者但為溫病而已兼寒者但為冷溫而已兼風者但為風溫而已雖間有時行溫毒然亦以風毒居多夏秋空氣最濁水土鬱蒸之氣每被日光吸引而蒸發發於首夏者曰黴雨蒸發於仲夏者曰桂花蒸其為病也皆水土穢氣雜合而成人但以暑濕賅其病之本貪涼飲冷賅其病之標而不知夏秋水土鬱蒸濕中有熱熱中有濕濁熱黏膩化生黴菌故謂之濕溫按此非時令病之濕溫乃濕溫時疫也即西醫所謂之傷寒亦曰腸熱症又曰腸窒扶斯亦謂之濕熱西醫謂之黴毒氣害人最廣變症最繁較之風溫冷溫暑溫三症尤多而難治英醫合信氏云空氣乾熱不傷人惟濕熱最傷人因低窪地土或蘊有死水之潛熱或積有腐爛之草木此即水土穢氣化生黴菌之原因後得六十度熱表之日光接連曬之其黴毒氣乃勃發故在東南熱地夏秋之交其毒尤甚可見濕溫濕熱為有形黏膩之邪西醫不為無見嗚呼人在氣交之中一身生氣終日與穢氣相爭戰實則與微生物相爭戰不知不覺中伏許多危險之機可不驚且懼哉十三論伏氣春溫春溫一症由冬令收藏未固昔人以冬寒內伏藏於少陰入春發於少陽以春木內應肝膽也寒邪深伏已經化熱昔賢以黃芩湯為主方苦寒直清裡熱熱伏於陰苦味堅陰乃正治也知溫邪忌散不與暴感門同法若因外邪先受引動在裡伏熱必先辛涼以解新邪繼進苦寒以清裡熱十四春溫有二春溫病有兩種冬受寒邪不即病至春而伏氣化熱外發者名曰春溫若春令太熱外受時邪而病者此感而即發之春溫也辨症之法伏氣春溫初起但熱不寒而口渴此自內而發出於外也感而即發之春溫初起微寒後則但熱不寒此外犯肺衛者也附時人陸平一語五氣皆有新感伏邪惟寒邪獨化熱而出餘邪皆仍本氣發出此為異耳十五溫熱提要俞東扶曰今之所謂傷寒者大概皆溫熱病耳仲景云太陽病發熱而渴不惡寒者為溫病在太陽已現熱象則麻桂二湯必不可用與傷寒迥別內經云熱病者皆傷寒之類也是指諸凡驟熱之病當從傷寒例觀二説似乎不同因審其義蓋不同者在太陽其餘則無不同也溫熱病只究三焦不講六經此是妄言仲景之六經百病不出其範圍豈以傷寒之類反與傷寒截然兩途乎葉案云溫邪吸自口鼻此亦未確仲景明云伏氣之發李明之王安道俱言冬傷於寒伏邪自內而發奈何以吳又可溫疫論牽混耶惟傷寒則足經為主溫熱則手經病多如風溫之咳嗽息鼾熱病之神昏譫語或溏瀉黏垢皆手太陰肺手厥陰心包絡手陽明大腸現證甚者喉腫肢掣昏蒙如醉躁擾不寧齒焦舌燥發斑發頤等症其邪分布充斥無復六經可考故不以六經法治耳就豫生平所驗初時兼挾表邪者最多仍宜發散如防葛豉薄牛蒡杏仁滑石連翹等以得汗為病輕無汗為病重如有斑則參入蟬蛻桔梗蘆根西河柳之類如有痰則參入土貝殭蠶栝蔞橘紅之類如現陽明證則白虎承氣生石膏大黃知母甘草鮮荷葉芒硝少陽證則小柴胡柴胡半夏人參甘草黃芩生薑大棗去參半加花粉知母璜按少陽證因於溫暑者雷少逸清營捍瘧法連翹竹葉扁豆衣青蒿木賊黃芩青皮西瓜翠衣較穩少陰證則黃連阿膠湯黃連茯苓阿膠豬苓湯豬苓茯苓澤瀉滑石阿膠豬膚湯豬膚白粉即粉錫一名鉛粉白蜜俱宗仲景六經成法有效但溫熱病之三陰證多死不比傷寒蓋冬不藏精者東垣所謂腎水內竭孰為滋養也惟大劑養陰佐以清熱或可救之養陰如二地二冬阿膠丹皮玄參人乳蔗漿梨汁清熱如三黃黃連黃芩大黃石膏犀角大青知母蘆根茅根金汁雪水西瓜銀花露絲瓜汁隨其對證者選用若三陰經之溫藥與溫熱病非宜亦間有用真武附子白朮茯苓白芍生薑理中白朮人參乾薑甘草者百中之一二而已大抵溫熱病最怕發熱不退及痙厥昏蒙更有無端而發暈及神清而忽間以狂言者往往變生不測遇此等症最能惑人不比陽證陰脈陽縮舌卷撮空見鬼者易燭其危也要訣在辨明虛實辨得真方可下手然必非劉河間吳又可之法所能救平素精研仲景傷寒論者庶有妙旨至如葉案之論溫熱有邪傳心包震動君主神明欲迷瀰漫之邪攻之不解清竅既蒙絡內亦閉豁痰降火無效者用局方至寶丹犀屑玳瑁屑琥珀硃砂雄黃龍腦麝香牛黃安息香銀箔金箔或紫雪黃金寒水石石膏滑石磁石犀角羚羊沉香木香升麻玄參公丁香甘草朴硝硝石麝香辰砂或牛黃丸牛黃黃連大黃麥冬硃砂麝香梔子牙硝川芎黃芩甘草宗喻氏芳香逐穢宣竅之説真足超越前賢且不蹈用重藥者一匙偶誤覆水難收之弊也璜按俞氏此論確切不移其間有云無端發暈神清而忽間以狂言者往往變生不測因此症神氣半明半昧察其舌色淡紅而近紫苔甚薄或無苔死期每在五日之間余於臨證見之屢矣此症在西醫為延髓神經被細菌所侵害也十六溫暑提綱夫六氣傷人為病各異必辨其為何氣之邪治之方無錯誤如寒為陰邪傷人之陽熱為陽邪傷人之陰二者冰炭尤當辨別是以溫病初起治法與傷寒迥異傷寒傳裡變為熱邪則治法與溫病大同茲細詳溫病源流當辨別而分治者有五一曰春溫二曰風溫三曰暑溫四曰濕溫五曰瘟疫春溫者經曰冬傷於寒春必溫病又曰冬不藏精春必病溫此因伏氣之邪發為春溫病也王叔和傷寒例曰冬傷寒邪藏於肌膚至春發為溫病至夏發為熱病熱病重於溫也是故辛苦之人春夏多溫熱病者因冬傷寒邪所致也乃吳又可溫疫論云世所稱溫病即屬瘟疫古無瘟字後世以溫去水加疒為瘟不可以字異而謂別有溫病也溫者融和之氣長育萬物豈能為病且言冬傷寒邪藏於肌膚人身氣血流行稍有窒礙即為不安豈有邪藏肌膚全然不覺至春至夏始得發病耶余按叔和之言原本經旨並非臆説而又可之論似乎近理而實不明六氣陰陽變化之道直闢經文為非謬指溫病為瘟疫殊欠究心故也夫經言冬傷於寒春必病溫春傷於風夏為飧泄夏傷於暑秋為痎瘧秋傷於燥冬生咳嗽統論四時皆有伏氣之邪發病若謂冬傷寒而春發病為非則春傷風夏飧泄夏傷暑秋痎瘧等豈皆非歟每見秋冬時伏暑邪發為瘧痢等病者比比皆是又可豈未之見耶又如素問論溫瘧云得之冬中於風邪藏骨髓至夏受暑邪發為溫瘧靈樞歲露編云冬至中虛風賊邪入客於骨而不發至立春陽氣發腠理開又中虛風民多病暴死若此論伏邪者非獨一端又可豈未讀耶何不思之甚也又如人之痘毒未發時毫無影響一旦觸發勢多凶暴往往損命可見人身臟腑經絡雖氣血周流當其邪伏全然不覺其理有難究詰者又可執區區淺見安可論內經奧旨哉譬猶匪類匿人間暫不為惡莫知其為匪也然其狼子野心終至擾害閭閻必俟殲除淨盡而後良民始安耳今試論春溫之理以質之蓋冬為太陽寒水司令故傷風寒者多從太陽經始太陽主一身之表與肺同為皮毛之合邪由皮毛而入故身熱頭痛者太陽經證也鼻鳴乾嘔或喘者肺氣被遏也但人體質有強弱受邪有重輕凡邪重而體強者則傷太陽經為麻黃桂枝湯證體弱者邪從太陽直入少陰為四逆白通湯證以二經為表裡經脈連接故也如體弱而邪輕者以外衛不固邪亦入陰仲景曰少陰之為病脈微細但欲寐也或其邪輕止見脈微細欲寐而無吐利厥逆等重證內氣既和飲食或亦如常不但傷邪者不覺即延醫視之審無他故惟脈弱欲寐必認作疲倦助其元氣而已又當冬令歸藏之候其邪從經入絡經直絡橫氣血流轉於經邪伏於絡則不覺也即經所謂邪藏肌膚者耳且如風為陽邪性動而疏泄如桂枝湯證以風重於寒故脈緩而有汗豈非風性疏泄乎寒為陰邪性靜而凝斂如麻黃湯證以寒重於風故脈緊而無汗豈非寒性凝斂乎若但傷於寒而無風以冬令之收藏受陰邪之凝斂則伏而不顯必待春陽鼓動而後發如冰之凝非陽不化由是推之不獨體弱邪輕者為然凡貧苦力食之人衣單耐寒日逐積蓄其臟氣固密邪不能幹則伏於脈絡至其發病熱勢倍重為因邪與元氣究非同類伏於少陰與腎陽鬱蒸寒化為熱至春少陽氣升熱邪隨發或云春必病溫其蓄之愈久則熱發愈重理勢必然叔和云辛苦之人春夏多溫熱病者因冬傷寒邪所致良非虛語也其冬不藏精之人本體陰傷至春陽旺陰不勝陽必致溫病類乎內傷若兼伏邪其病尤重然皆為春發之病均名春溫也風溫者冬至一陽來復則陽進陰退立春以後陽氣漸旺由溫而熱若又可所言溫和之氣原不病人殊不思靈樞經云虛風賊邪四時皆有人感虛風而當溫暖之候即成溫病故方書稱為風溫經曰風者百病之長也善行而數變至其變化乃為他病也由是見外邪為病常二三氣雜合而成多因於邪風風氣鼓蕩衆氣隨之而傷人故風為諸邪領袖而稱百病之長然風即陰陽之化氣故溫和之陽風則生物殺厲之陰風則戕物而有時令方位之宜否若非其時令方位而來者雖非殺厲亦為虛風賊邪傷人致病故四時皆有邪風而春令溫暖又為風木主令故風溫之病較三時為多若方書所稱溫熱冬溫等名皆可以風溫二字賅之蓋冬令溫和未必為病必中邪風而成溫病溫重即成熱病是以不須另分名目也暑溫者素問熱論篇曰凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑暑當與汗皆出勿止此雖同論伏氣之病但自夏至一陰來姤陽氣漸退長夏濕土司令濕土與相火合氣乃名為暑暑者陽盛於外而陰長於內若姤卦而至遁至否陰長之象也如人本有伏氣之邪蓄熱已深而發病於暑濕之令熱自內出蒸汗外流清其內熱則汗自止若止其汗則熱反不泄故不可止而內熱亦隨汗解若無伏氣而但感暑令熱邪體質多火者熱從火熾濕隨汗去是暑而偏於火盛皆名暑溫也兼伏氣者病必倍重嘗見有發病一二日即昏狂大渴吐血衄血者若僅感時令之熱而非蓄邪深重何至如此迅暴即叔和所云冬傷寒邪至夏變為熱病熱病重於溫者是也濕溫者夏感暑濕及四時溫病而體質陽虛多濕者則熱為濕遏不能宣達濕因熱蒸蘊釀膠黏故最淹纏難愈或胸腹滿悶或體重痠痛或為瘧疾或為瀉痢或為黃疸或為痹腫變證多端皆濕熱為病是名濕溫也以上四證源流不同各當辨別而治至於瘟疫又屬大異蓋由五運六氣主客流行互相剋制或兼穢汙之氣蘊釀而成故其病邪較風溫等為重考素問六元正紀大論曰辰戌之歲初之氣地乃遷氣乃大溫民乃厲溫病乃作卯酉之歲二之氣陽乃布物乃生榮厲大至民善暴死丑未之歲二之氣大火正物承化溫癘大行遠近咸若濕蒸相薄雨乃時降己亥之歲終之氣流水不冰地氣大發其病溫癘按古無瘟字溫瘟義同所謂厲者狀其氣之暴厲而與尋常有別即後世所稱瘟疫也瘟疫發病往往一方相類如經所云遠近咸若也由是可知瘟疫一證固非吳又可所創論內經已歷歷言之仍不出六氣錯雜所致而與溫病不同者在厲之一字豈可謂溫病即瘟疫乎又可復言風寒暑濕等為天地之常氣瘟疫乃天地別有一種厲氣竟謂瘟疫與六氣無涉者豈天地間六氣以外更有他氣軒歧不知而又可獨知之乎可見不明六氣變化之理遂亦不辨伏氣發病將春溫風溫等概指為瘟疫既悖經旨而誤後學其害多矣可不辨乎方書又有溫毒之名亦即經云溫癘之意曰厲曰毒不過狀其邪之凶暴即瘟疫一類不必另立名目以省繁惑也六氣中惟燥金之氣多由風熱風寒所化或其人陰虛多火易成熱燥如經云秋傷於燥冬生咳嗽肺熱葉焦發為痿躄之類當宜清潤養陰若體質多寒而成寒燥則宜溫潤如麻黃湯中用杏仁以潤肺燥之類也除正傷寒遵仲景成法外其四時雜感或不出如上所敘五證而五證所化之病如瘧痢疸痹痧脹之類不一而足既知病邪源流所自辨六氣變化之理氣血虛實之殊則權衡論治自不至於混淆謬誤管見所及聊陳端緒尚望海內明賢誨正為幸十七論溫熱與風寒各異一辨其氣之異風主疏泄寒主凝澀二氣雖有不同然初皆冷而不熱其中人也鬱而不宣方其初受在表自宜溫散麻黃湯桂枝湯葛根湯蘇羌飲等方皆散寒之劑非解熱之劑也溫熱由伏氣而成熱而不冷其傷人也立蒸而腐敗初起即宜涼解梔豉湯山梔淡豆豉葛根芩連湯葛根黃芩川連炙草麻杏石甘膏麻黃杏仁生石膏炙草黃芩湯葳蕤湯玉竹參麻黃杏仁川芎青木香白薇獨活炙草六神通解散麻黃生石膏蒼朮黃芩滑石甘草淡豆豉蔥白等方皆解熱之劑非散寒之劑也以解熱之劑治風寒輕則寒中嘔利重則陽陷厥逆以散寒之劑治溫熱輕則衄渴譫妄重則枯竭亡陰此氣之不可不辨也二辨其受之異風寒從表入里自皮毛而肌腠而筋骨而胸膈胃腸一層漸深一層不能越此入彼故汗不厭早下不厭遲為散為和淺深毫不可紊以其氣皆屬冷必待寒化為熱邪斂入內方可攻下涼解否則虛其裡氣反引表邪內陷而成結胸痞利諸症濕溫從膜原而發溫熱從血絡而發先踞膜絡之中必內潰而後變九傳由里出表雖出表而里未必全無邪戀經過之半表亦未必不為邪傷故下不厭早汗不厭遲為和為解淺深必不可拘以其氣皆屬熱熱能作蒸不必郁變而此蒸即帶彼熱未出表而誤溫之始則引熱毒燎原而為斑衄狂喘末傳則傷真陰為枯稿沉昏厥逆諸危候矣三辨其傳經之異溫熱傳經與風寒不同風寒從表入里故必從太陽而陽明而少陽而入胃若溫熱則邪從中道而或表或里惟視人何經之強弱為傳變故伏邪之發有先表后里者有先里後表者有但里不表者有表而再表者有里而再里者有表裡偏勝者有表裡分傳者有表裡分傳而再分傳者有表裡三焦齊發者此謂九傳醫必先明九傳之理由而後能治伏邪試言其要風寒從表入里必待漸次閉鬱而傳變故在表時不必兼見里症入里後不必復見表症溫熱本從里出表故見表症時未有不兼見一二里症者亦未有不兼見一二半表半裡症者且溫熱屬蒸氣表而里里而表原是不常有里症下之而其邪不盡仍可出表者有譫妄昏沉之後病愈數日復見頭痛發熱復從汗解者此所謂表而再表風寒必無是也更有下症全具用下藥後裡氣通而表亦達頭痛發熱得汗而解胸悶心煩暫從疹斑而解移時復見舌黑心悶腹痛譫妄仍待大下而後愈者此所謂里而再里風寒必無是也若夫表裡分傳三焦齊發之症風寒十無一二溫熱十有六七但據傳經之專雜為辨初起專見一經症者屬風寒初起雜見二三經症者屬溫熱日久而漸傳者屬風寒一日驟傳一二經或二三經者屬溫熱則雖病有變態而風寒不混於溫熱溫熱不混於風寒施治自無誤矣十八論溫熱症辨似要義凡病俱以虛實寒熱四字為大綱溫熱症何獨不然但虛實寒熱之真者易辨似者難辨有實症似虛虛症似實熱症似寒寒症似熱者不可不細辨也故特逐論而詳述之所謂實症似虛者即以表症論之頭痛發熱邪在表也其脈當浮症當無汗而反自汗脈無力用發表藥而身反疼痛則似虛矣故人惑於多自汗而誤用桂枝湯者有之惑於脈無力而引仲景太陽篇發熱惡寒脈微弱為無陽而誤用小建中湯者有之惑於身疼痛而引仲景若不瘥身體疼痛當溫其里誤用四逆湯者有之不知伏邪之在表其自汗者邪熱自里蒸出於表非表虛也其脈無力者熱主散漫散漫則脈軟非比寒主收斂而脈緊也身體反疼者伏邪自里而漸出於表非比陽虛不任發表也此在表之實症似虛者也又以半表半裡論之寒熱往來胸脅滿邪在半表半裡也其脈當弦其口當渴而脈反沉口不渴則似寒矣故人惑於脈沉而以胸脅滿為太陰口不渴為內寒而誤用理中湯不知伏邪之半表半裡其脈沉者邪伏於膜原而未出表故脈不浮非陽虛也其不渴者邪未傳變未入胃腑故不能消水非內寒也此半表半裡之熱症似寒者也又以里症論之口燥咽乾不得臥邪在裡其脈當洪其身當熱其便當結而脈反沉微澀弱身反四肢厥冷大便自利則全似虛寒矣人惑於脈微澀弱而用參耆者有之惑於厥逆而用桂附者有之惑於自利而用參朮乾薑者有之不知伏邪在裡其脈沉微澀弱者乃邪熱結於腸胃氣不達於營衛也其身反厥冷者邪熱結於裡而不達於外氣結於下而不通於上也其自利者乃熱結旁流也此在裡之實症似虛熱症似寒者也總之溫熱為伏火與風寒之寒因大異故脈症雖有似虛似寒之時而一一辨其為溫熱症則屬邪盛而反見虛寒之假象明眼人不當為其所惑也所謂虛症似實者即以表症論之頭痛發熱身疼痛自汗脈浮大邪在表也而屢用清涼表散其症不減者非藥力之不專乃正氣不能使藥力達表陰液不能隨陽氣作汗也此伏邪在表時虛症之似實者也氣虛者加參耆於表藥中即汗陰虛者加潤劑於表藥中即汗若不知其氣血之兩虧而宣表不已勢必暴厥而脫更以半表半裡論之胸脅滿耳聾嘔吐如瘧狀脈弦邪在半表半裡也而屢用和解消導其症更加者非藥力之不到乃中焦脾胃傷而氣不運肝陰傷而火更燥也此伏邪在半表半裡時虛症之似實者也必合四君六君人參白朮茯苓甘草薑棗為四君子湯加陳皮半夏名六君子湯於和解藥中合四物當歸生地芍藥川芎於清解藥中始能戰汗而解若更消導清解不已必至胃氣絶而死更以里症論之舌苔黃黑裂燥芒刺胸腹脅臍硬痛大小便閉六脈數大邪在裡也而屢用攻利藥或總不得利或利後愈甚乃正氣不能傳送腸胃血液不能滋潤腸胃非藥力之不峻也此伏邪傳裡時虛症之似實者也氣虛者助胃以資傳送血枯者養陰以藉濡滑氣行津化方得通利若不知其虧竭而恣意攻利必昏沉痿頓而死總之藥不中病則傷正氣傷其下則正氣浮越而上逆傷其中則正氣虛散而外越脈症雖有似實似熱之時而一詢其來路若已治之太過則屬氣從內奪正氣奪則虛明眼人當不為其所惑也夫一症而虛實互異用藥稍誤而生死攸分將以何者為辨症之把柄乎曰以下列五辨法辨之則瞭然矣而更以曾經誤治與未經誤治辨其伏邪之為實為虛為實中夾虛為虛中夾實則得其大綱而更得其細目然後似是而非之症斷不能惑矣余於各論條下每症細辨其虛實而此先詳言以通論之者則以散見諸條尚恐略過故首先總論其吃緊處也至若寒極似熱則惟傷寒諸症有之而為溫熱症之所絶無故不論及十九論溫熱五種辨法一辨氣風寒之氣從外收斂入內病無蒸氣觸人間有作蒸氣者必待數日後轉入陽明腑症之時溫熱及濕溫症其氣從中蒸達於外病即有蒸氣觸人輕則盈於床帳重則蒸然一室以人身臟腑氣血津液得寒氣則內斂得火氣則上炎溫熱火氣也人受之自臟腑蒸出於肌表氣血津液逢蒸而敗因敗而溢溢出有盛衰充達有遠近非鼻觀精者不能辨之辨之既明治之毋惑知為溫熱而非傷寒則凡於頭痛發熱諸表症不得誤用辛溫發散於諸里症當清當下者亦不得遲回瞻顧矣二辨色風寒主收斂斂則結面色多繃結而光潔溫熱主蒸散散則緩面色多鬆緩而垢晦人受蒸氣則津液上溢於面頭目之間多垢滯或如油膩或如煙燻望之可憎者皆溫熱之色也一見此色雖頭痛發熱即不得用辛熱發散一見舌黃煩渴諸里症即宜攻下不可拘於下不厭遲之説三辨舌風寒在表舌多無苔即有白苔亦薄而滑漸傳入里方由白而黃轉燥而黑溫熱一見頭痛發熱舌上便有白苔且厚而不滑或色兼淡黃或粗如積粉或兼二三色或白苔即燥又有至黑不燥則以兼濕挾痰之故然必按之粗澀或兼有朱點有罅紋不可誤認為裡寒陰結也治溫熱者能先於表症辨之不用辛溫發散一見里症即用清涼攻下斯得之矣四辨神風寒之中人令人心知所苦而神自清如頭痛寒熱之類皆自知之至傳裡入胃始或有神昏譫語之時緣風寒為病其氣不昏而神清溫熱初起便令人神情異常而不知所苦大概煩躁者居多甚或如癡如醉擾亂驚悸及問其何所苦則不自知即間有神清而能自知者亦多夢寐不安閉目若有所見此即譫語之根也或亦以始初不急從涼散遷延時日故使然耳五辨脈溫熱之脈傳變後與風寒頗同初起時與風寒迥別風寒從皮毛而入一二日脈多浮或兼緊兼緩兼洪無不浮者傳裡始不見浮脈然其至數亦清楚而不模糊溫熱從中道而出一二日脈多沉逮自里出表脈始不沉而數或兼弦或兼大然總不浮其至數則模糊而不清楚凡初起脈沉遲勿誤作陰症沉者邪在裡遲者邪在臟也脈象同於陰寒而氣色舌苔神情依前諸法辨之自有不同者或數而無力亦勿作虛視因其熱蒸氣散脈自不能鼓指但當解熱不當補氣受病之因各殊故同脈而異斷二十溫熱有外感有伏邪太陽病發熱而渴為溫病是少陰伏邪出於太陽以其熱從內發故渴而不惡寒若外感溫病初起卻有微惡寒者以風邪在表也亦不渴以內無熱也似傷寒而實非傷寒如辨別不清多致誤治二十一論溫病與傷寒病情不同治法各異冬月傷寒邪由皮毛而入從表入里初見三陽經證如太陽病則頭項強痛而惡寒之類三陽不解漸次傳入三陰其中有留於三陽而不入三陰者有結於胃腑而不涉他經者亦有不必假道三陽而直中三陰者凡此傷寒之證初起悉系寒邪見象逮發作之後漸次化熱內傳始有熱象故初起治法必以通陽祛寒為主及化熱之後始有泄熱之法此傷寒病之大較也若夫溫病乃冬時寒邪伏於少陰逮春夏陽氣內動伏邪化而為熱由少陰而外出如邪出太陽亦見太陽經證其頭項強痛等象亦與傷寒同但傷寒里無鬱熱故惡寒不渴溲清無內熱溫邪則標見於外而熱鬱於內雖外有表證而裡熱先盛口渴溲黃尺膚熱骨節疼種種內熱之象皆非傷寒所有其見陽明少陽見症亦然初起治法即以清泄裡熱導邪外達為主與傷寒用藥一溫一涼恰為對待蓋感寒隨時即發則為傷寒其病由表而漸傳入里寒邪郁久化熱而發則為溫病其病由里而鬱蒸外達傷寒初起決無裡熱見證溫邪初起無不見裡熱之證此傷寒溫病分證用藥之大關鍵臨證時能從此推想自然頭頭是道矣二十二論伏氣發溫與暴感風溫病源不同治法各異冬時伏邪鬱伏至春夏陽氣內動化熱外達此伏氣所發之溫病也內經云冬傷於寒春必病溫又云凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑難經云傷寒有五有溫病有熱病傷寒論云太陽病發熱而渴不惡寒者為溫病凡此皆指伏邪所發之溫病言也另有一種風溫之邪當春夏間感受溫風邪鬱於肺咳嗽發熱甚則發為痧疹內經所謂風淫於內治以辛涼葉氏溫熱論所謂溫邪上受首先犯肺者皆指此一種暴感風溫而言也伏氣由內而發治之者以清泄裡熱為主其見證至繁且雜須兼視六經形證乃可隨機立法暴感風溫其邪專在於肺以辛涼清散為主熱重者兼用甘寒清化其病與伏溫病之表裡出入路徑各殊其治法之輕重深淺亦屬迥異近人專宗葉氏將伏氣發溫之病置而不講每遇溫邪無論暴感伏氣概用葉氏辛涼輕淺之法銀翹桑菊隨手立方醫家病家取其簡便無不樂從設有以伏氣之説進者彼且視為異説茫然不知伏溫為何病嗟乎伏溫是外感中常有之病南方尤多非怪證也其病載在內經難經傷寒論諸書非異説也臨證者竟至茫然莫辨門徑全無醫事尚堪問哉二十三論伏邪外發須辨六經形證傷寒緒論曰初發病時頭項痛腰脊強惡寒足太陽也發熱面赤惡風手太陽也目疼鼻乾不得臥足陽明也蒸熱而渴手陽明也胸脅滿痛口苦足少陽也耳聾及病寒熱往來手少陽也腹滿自利而吐足太陰也口乾津不到咽手太陰也脈沉細口燥渴足少陰也舌乾不得臥手少陰也耳聾囊縮不知人事足厥陰也煩滿厥逆手厥陰也醫略曰太陽之脈上連風府循腰脊故頭項痛腰脊強陽明之脈挾鼻絡於目故身熱目疼鼻乾不得臥少陽之脈循脅絡於耳故胸脅痛而耳聾太陰脈布胃中絡於嗌故腹滿而嗌乾少陰脈貫腎絡於肺系舌本故口燥舌乾而渴厥陰脈循陰器而絡於肝故煩滿而囊縮凡外感病無論暴感伏氣或由外而入內則由三陽而傳入三陰或由內而達外則由三陰而外出三陽六經各有見證即各有界限可憑治病者指其見證即可知其病之淺深問其前見何證今見何證即可知病之傳變傷寒如此溫病何獨不然素問熱病篇仲景傷寒論均以此立法聖人復起莫此易也近賢葉氏始有傷寒分六經溫病分三焦之論謂出河間其實溫熱病之法至河間始詳至溫病分三焦之論河間並無此説其書具在可覆按也厥後吳鞠通著溫病條辨遂專主三焦廢六經而不論殊不知人身經絡有內外淺深之別而不欲使上下之截然不通也其上焦篇提綱云凡溫病者始於上焦在手太陰試觀溫邪初發者其果悉見上焦肺經之見證乎即或見上焦之證其果中下焦能絲毫無病乎鞠通苟虛心診視應亦自知其説之不可通矣況傷寒溫熱為病不同而六經之見證則同用藥不同而六經之立法則同治溫病者烏可舍六經而不講者哉二十四論溫熱伏氣與新感不同新感溫熱邪從上受必先由氣分陷入血分里症皆表症侵入於內也伏氣溫熱邪從里發必先由血分轉出氣分表症皆里症浮越於外也新感輕而易治伏氣重而難療此其大要也謂豫不信請述陸氏九芝評孟英之言曰仲景所論溫熱是伏氣天士所論溫熱是外感故以溫邪上受首先犯肺逆傳心包十二字揭之篇首以自別異果如其説則所稱溫熱者即俗所謂小風溫小風熱如目赤頤腫喉梗牙疼之類卻只須辛涼輕劑其病立愈更述薛瘦吟之言曰凡病內無伏氣縱感風寒暑濕之邪病必不重重病皆新邪引發伏邪者也但伏氣有二傷寒伏氣即春溫夏熱病也傷暑伏氣即秋溫冬溫病也邪伏既久血氣必傷故治法與傷寒傷暑正法大異且其氣血亦鈍而不靈故靈其氣機清其血熱為治伏邪第一要義第其間所伏之邪有微甚有淺深人之性質有陰陽有強弱故其中又有輕重之分焉醫必識得伏氣方不至見病治病能握機於病象之先然非熟於亢害承製之理亦豈能測未來之病乎然非謂司天運氣也雨暘寒燠在在留心久當自悟耳由是觀之同一溫熱症而新感之與伏氣病所之淺深不同病情之輕重不同病機之安危不同故其療法亦因之而不同二十五溫熱暑各伏氣有兼邪伏氣溫病有兼風兼寒兼濕兼毒之不同伏氣熱病有兼暑兼濕兼燥之不同惟伏暑之邪古無是説至深秋而發者始見於葉氏指南霜未降者輕霜既降者重冬至尤重然竟有伏至來春始發者由於秋暑過酷冬令仍溫收藏之令不行中氣因太泄而傷邪熱因中虛而伏其綿延淹滯較指南所論更甚調治之法則尤難非參耆所能托非芩連所能清惟藉輕清靈通之品緩緩撥醒其氣機疏通其血絡始可十救一二若稍一呆鈍則非火閉即氣脫矣二十六溫暑伏氣證狀伏氣溫病自里出表乃先從血分而後達於氣分故起病之初往往舌潤而無苔垢但察其脈軟而或弦或微數口未渴而心煩惡熱即宜投以清解營陰之藥逮邪從氣分而化苔始漸布然後再清其氣分可也伏邪重者初起即舌絳咽乾甚有肢冷脈伏之假象亟宜大清陰分伏邪繼必厚膩黃濁之苔漸生此伏邪與新邪先後不同處更有伏邪深沉不能一齊外出者雖治之得法而苔退舌淡之後逾一二日舌復干絳苔復黃燥正如抽蕉剝繭層出不窮不比外感溫邪由衛及氣自營而血也秋月伏暑證輕淺者邪伏膜原深沉者亦多如此苟閲歷不多未必知其曲折乃爾也二十七伏氣溫病論伏氣溫病本冬傷於寒後人論傷寒由表入里溫病自上而下欲撇去傷寒獨開生面以論溫而不自知其無知妄作不但於仲景經文未明經旨並於內難二經所論溫病概不符合此乃無根之學説不足道也仲景論傷寒有寒邪傷經由經傳經者有寒邪傷表由表入里者寒邪入里先入胸為胸滿由心而入心下為心下痞由心下而入腹中為脹滿其病皆自上而下伏氣溫病本冬傷於寒寒邪伏於骨與肩背之膂筋至春病隨氣化由筋骨而出走肌肉化為溫病由肌肉外達皮毛發為熱病伏寒化溫自里出表乃人身之氣隨時變化使然所謂自上而下者乃人之胃氣不能使邪氣外解則邪氣入里由上焦而入中焦甚則深入下焦其病由衛入營由表入里也夫病之所以由表入里自上而下者皆人之氣化使然非病能使然寒邪從毛竅入溫邪亦從毛竅入不得以溫邪為從口鼻入不能從毛竅入也何也人之口鼻呼吸毛竅亦呼吸病氣隨呼吸入人身固無分乎寒與溫也惟瘟疫傳染地氣為病穢濁氣味由口鼻入耳伏氣者正邪也冬以寒為正邪春以風為正邪夏以暑為正邪長夏新秋以濕為正邪正邪能伏虛邪實邪微邪賊邪皆不能伏也六氣傷人合於四時只論風寒暑濕而不及燥火何也以燥火二氣不能伏故燥為秋之正邪而置之不論喻嘉言未明經旨為補秋燥一條不知燥傷肺金其病即發為燥咳不能伏至冬令而後咳嗽也按燥氣有二有火燥有寒燥火燥傷人其氣不能伏寒燥傷人結為癥瘕為疝氣日久不愈亦伏氣病也嘉言欲補秋燥一條當言疝瘕不當言咳嗽也二十八伏邪病名解感六淫而即發病者輕者謂之傷重者謂之中感六淫而不即病過後方發者總謂之曰伏邪已發者而治不得法病情隱伏亦謂之曰伏邪有初感治不得法正氣內傷邪氣內陷暫時假愈後乃復作者亦謂之曰伏邪有已發治愈而未能除盡病根遺邪內伏後又復發亦謂之曰伏邪夫伏邪有伏燥有伏寒有伏風有伏濕有伏暑有伏熱二十九五氣皆從火化四時之序春為風夏為暑長夏為濕秋為燥冬為寒皆有外因火則本無外因然內經言百病之生皆生於風寒暑濕燥火則並及於火為六病則名曰六淫蓋以風暑濕燥寒感於外火即應之於內則在內之火即此在外之五氣有以致之故火但曰遊行其間後賢所以有五氣皆從火化之説也三十論溫熱即是伏火凡伏氣溫熱皆是伏火雖其初感受之氣有傷寒傷暑之不同而潛伏既久蘊釀蒸變逾時而發無一不同歸火化中醫所謂伏火症即西醫所謂內炎症也王秉衡曰風寒暑濕悉能化火血氣鬱蒸無不生火所以人之火症獨多焉朱心農曰東南方天時多熱地氣多濕最多濕熱濕溫之症正傷寒症極少即云冬月多正傷寒症亦不盡然歷症以來恆見大江以南每逢冬令太溫一遇感冒表分雖有外寒內則竟多伏火悉以伏火治之絲毫不爽故魏柳州曰壯火為萬病之賊嘉約翰曰炎症為百病之源中醫西醫其揆一也雖然同一伏火而濕火與燥火判然不同以治燥火之法治濕火則濕欲遏而熱愈伏勢必為痞滿為嘔厄為形寒熱不揚為腸鳴泄瀉甚則蒙閉清竅譫語神昏自汗肢厥或口噤不語或手足拘攣以治濕火之法治燥火則以燥濟燥猶撥火使揚勢必為灼熱為消渴為熱盛昏狂為風動痙厥甚則鼻煽音啞舌卷囊縮陰竭陽越內閉外脫是以對症發藥必據燥火濕火之現症為憑分際自清誤治自少三十一暑痎熱與火而言風暑濕燥寒乃天地之氣行於四時者也惟夏令屬火日光最烈內經云歲火太過炎暑流行明指烈日之火而言然春秋冬三時之暖燠無非離照之光熱因皆不可以暑稱故軒岐於五氣之下贅一火字且其言暑明曰在天為熱在地為火其性為暑是暑痎熱與火二者而已經旨已深切著明矣而人之火病獨多者以風寒暑濕悉能化火五志過動無不生火則又天氣與人性交合化火之大源也三十二暍暑命名之別暍即暑也變暑言暍者以暑病屬諸伏寒至夏至後發病之名故曰中暍使不相混此仲師法也三十三寒溫暑濕汗解不同傷寒非汗不解最喜發汗傷風亦非汗不解最忌發汗只宜解肌此麻桂之異其治即異其法也溫病亦喜汗解最忌發汗只許辛涼解肌辛溫又不可用妙在導邪外出俾營衛氣血調和自然得汗不必強責其汗也若暑溫濕溫則又不然暑非汗不解可用香薷發之發汗之後大汗不止仍歸白虎法固不比傷寒傷風汗漏不止而必欲桂附護陽實表亦不可屢虛其表致令厥脫也觀古人暑門有生脈散人參麥冬五味子法其義自見三十四風溫濕溫勿用發表攻裡外感不外六淫民病當分四氣治傷寒家徒守發表攻裡之成方不計辛熱苦寒之貽害遂使溫熱之旨矇昧不明僕不敏博覽群書恍然於溫熱病之不可不講也內經云冬不藏精春必病溫蓋謂冬時嚴寒陽氣內斂人能順天時而固密則腎氣內充命門為三焦之別使亦得固腠理而護皮毛雖當春令升泄之時而我身之真氣內外彌淪不隨升令之泄而告匱縱有客邪安能內侵是內經所以明致病之原也然但云冬不藏精而不及他時者以冬為水旺之時屬北方寒水之化於時為冬於人為腎井水溫而堅冰至陰外陽內有習坎之義故立言歸重於冬非謂冬宜藏而他時可不藏精也即春必病溫之語亦是就近指點總見裡虛者表不固一切時邪皆易感受學者可因此而悟及四時六氣之為病矣難經云傷寒有五有傷寒有中風有風溫有熱病有濕溫夫統此風寒濕熱之邪而皆名之曰傷寒者亦早鑑於寒臟受傷外邪得入故探其本而皆謂之傷寒也大致西北風高土燥風寒之為病居多東南地界水濕濕熱之傷人獨甚從來風寒傷形傷形者定從表入濕熱傷氣傷氣者不盡從表入風邪外束則曰風溫濕邪內侵則曰濕溫縱有微寒之兼襲不同栗冽之嚴威是以發表宜辛涼不宜辛熱清裡宜泄熱不宜逐熱使概投以發表不遠熱攻裡不遠寒諸法則死亡接踵矣三十五溫熱燥證宜保津液夫春溫夏熱秋燥所傷皆陰液也苟能時時預護處處堤防豈復有精竭人亡之慮傷寒所傷者陽氣也誠能保護得法自無寒化熱而傷陰水負火而難救之虞即使有受傷處臨證者知何者當護陽何者當救陰何者當先護陽何者當先救陰因端竟委可備知終始而超妙道之神三十六濕證非易治之病濕傷脾陽在中則不運痞滿傳下則洞泄腹痛傷胃陽則嘔逆不食膈脹胸痛兩傷脾胃既有脾證又有胃證也其傷脾胃之陰若何濕久生熱熱必傷陰古稱濕火者是也傷胃陰則口渴不飢傷脾陰則舌先灰滑後反黃燥大便堅結濕為陰邪其傷人之陽也得理之正故多而常見其傷人之陰也乃勢之變故罕而少見治濕必須審在何經何臟兼寒兼熱氣分血分而出辛涼辛溫甘溫苦溫淡滲苦滲之治否則籠統混治將見腫脹黃疸洞泄衄血便血諸症蜂起矣蓋土為雜氣兼證甚多最難分析豈可泛論濕氣而已哉三十七濕溫變證極多濕溫一證蓋土為雜氣寄旺四時藏垢納汙無所不受其間錯綜變化不可枚舉其在上焦也如傷寒其在下焦也如內傷其在中焦也如外感或如內傷至人之受病也亦有外感亦有內傷使人心搖目眩無從捉摸其變證也則有濕痹水氣咳嗽痰飲黃汗黃疸腫脹瘧痢淋帶便血痔瘡疝氣癰膿等證較之風火燥寒四門之中倍而又倍苟非條分縷析體貼入微未有不張冠李戴者三十八太陰陽明之表受邪濕熱居多濕熱之邪從表傷者十之一二由口鼻入者十之八九陽明為水穀之海太陰為濕土之臟故多陽明太陰受病太陰之表四肢也陽明也陽明之表肌肉也胸中也故胸痞為濕熱必有之證四肢倦怠肌肉煩疼亦必並見三十九濕邪從膜原而入膜原者外通肌肉內近胃腑即三焦之門戶實一身之半表半裡也邪由上受直趨中道故病多歸膜原要之濕熱之病不獨與傷寒不同且與溫病大異溫病乃少陰太陽同病濕熱乃陽明太陰同病也言證而不言脈者以濕熱之候脈無定體或洪或緩或伏或細故難以一定之脈拘定後人眼目也四十濕熱證陽明必兼太陰濕熱之證陽明必兼太陰者徒知臟腑相連濕土同氣而不知當與溫病之必兼少陰比例少陰不藏木火內燔風邪外襲表裡相應故為溫病太陰內傷濕飲停聚客邪再至內外相引故病濕熱此皆先由內傷再感客邪非由腑及臟之謂若濕熱之證不挾內傷中氣實者其病必微或有先因於濕再因飢勞而病者亦屬內傷挾濕標本同病然勞倦傷脾為不足濕飲停聚為有餘所以內傷外感孰多孰少孰虛孰實又在臨證時權衡矣四十一暑濕穢合邪凡暑月霪雨之後日氣煦照濕濁上蒸人在濕熱蒸騰中感之則暑濕交受兼溷穢濁之氣人中之即痧毒也夫人之正氣一虛暑濕穢濁之邪俱從口鼻吸入流布三焦上乘於心為中痧中入於胃為霍亂踞於募原為寒熱歸於腸胃為泄瀉蓋暑熱之邪驟發而重者為濕溫遲發而輕者為寒熱如瘧為伏暑晚發觸邪隨時即發者為寒熱為泄瀉伏邪遇秋始發者則為瘧為痢矣一邪之染為病非一臨證者可不探本窮源以治哉四十二秋燥證治按古方書無秋燥之病近代以來惟喻嘉言始補燥氣論其方用甘潤微寒葉氏亦有燥氣化火之論其方用辛涼甘潤乃素問所謂燥化於天熱反勝之治以辛涼佐以苦甘法也四十三秋燥證治論春月地氣動而濕勝故春分以後風濕暑濕之證多秋月天氣肅而燥勝故秋分以後風燥涼燥之證多若天氣晴暖秋陽以曝溫燥之證反多於涼燥前哲沈氏目南謂性理大全燥屬次寒感其氣者遵內經燥淫所勝平以苦溫佐以辛甘之法主用香蘇散香附紫蘇陳皮甘草加味此治秋傷涼燥之方法也喻氏嘉言謂生氣通天論秋傷於燥上逆而咳發為痿厥燥病之要一言而終即諸氣膹郁皆屬於肺諸痿喘嘔皆屬於上二條指燥病言明甚更多屬於肺之燥至左胠脅痛不能轉側嗌乾面塵身無膏澤足外反熱腰痛筋攣驚駭丈夫㿗疝婦人少腹痛目眯眥瘡則又燥病之本於肝而散見不一者也而要皆秋傷於燥之徵也故治秋燥病須分肺肝二臟遵內經燥化於天熱反勝之之旨一以甘寒為主發明內經燥者潤之之法自制清燥救肺湯用桑葉石膏甘草人參胡麻仁真阿膠麥門冬杏仁枇杷葉痰多加貝母栝蔞血枯加生地黃熱甚加犀角羚羊角或牛黃隨證加藥此治秋傷溫燥之方法也四十四新感秋燥説凡治燥病先辨涼溫王孟英曰以五氣而論則燥為涼邪陰凝則燥乃其本氣但秋承夏後火之餘炎未息若火既就之陰竭則燥是其標氣治分溫潤涼潤二法費晉卿曰燥者干也對濕言之也立秋以後濕氣去而燥氣來初秋尚熱則燥而熱深秋既涼則燥而涼以燥為全體而以熱與涼為之用兼此二義方見燥字圓相法當清潤溫潤次辨虛實葉香岩曰秋燥一證頗似春月風溫溫自上受燥自上傷均是肺先受病但春月為病猶是冬令固密之餘秋令感傷恰值夏月發泄之後其體質之虛實不同初起治肺為急當以辛涼甘潤之方氣燥自平而愈若果有暴涼外束只宜蔥豉湯蔥白香豉服時加童便加杏仁蘇梗前胡桔梗之屬延綿日久病必入血分須審體質證候總之上燥治氣下燥治血慎勿用苦燥劫爍胃汁也又次辨燥濕石芾南曰病有燥濕藥有潤燥病有風燥涼燥暑燥燥火燥郁夾濕之分藥有辛潤溫潤清潤咸潤潤燥兼施之別燥邪初傷肺氣氣為邪阻不能布津外通毛竅故身無汗寒熱疼痛又不能布津上濡清竅下潤胃腸故口乾舌燥喉癢乾咳胸悶氣逆二便不調治者當辨燥濕二氣孰輕孰重所兼何邪如兼風兼寒兼伏暑之類所化何邪如化火未化火之分所夾何邪如夾水夾痰夾食夾內傷之類對病發藥使之開通開是由肺外達皮毛與升散之直向上行者不同通是由肺下達胃腸通潤通利皆謂之通非專指攻下言雖然燥病夾濕用藥最要靈活專潤燥須防其滯濕專滲濕須防其益燥必先詰其已往以治其現在治其現在須顧其將來第三章辨脈一辨脈提綱脈浮緊惡寒謂之傷寒脈數寒少熱多謂之溫病脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑醫者不可不辨二溫病辨脈凡溫病脈不浮不沉中按洪長滑數右手反盛於左手總由怫熱鬱滯脈結於中故也若左手脈盛或浮而緊自是感冒風寒之病非溫病也凡溫病脈怫熱在中多見於肌肉之分而不甚浮若熱鬱少陰則脈沉伏欲絶非陰脈也陽邪閉脈也凡傷寒自外之內從氣分入始病發熱惡寒一二日不作煩渴脈多浮緊不傳三陰脈不見沉溫病由內達外從血分出始病不惡寒而發熱一熱即口燥咽乾而渴楊如候曰此論伏氣若外感溫病亦有微惡寒者脈多洪滑甚則沉伏此發表清裡之所以異也凡浮診中診浮大有力浮長有力傷寒得此脈自當發汗此麻黃桂枝證也溫病始發雖有此脈切不可發汗乃白虎瀉心證也死生關頭全於此分凡溫病內外有熱其脈沉伏不洪不數但指下沉伏而小急斷不可誤為虛寒若以辛溫之藥治之反益其熱也所以傷寒多從脈溫病多從證蓋傷寒風寒外入循經傳也溫病怫熱內熾溢於經也凡傷寒始本太陽發熱頭痛而脈反沉者雖曰太陽實見少陰之脈故用四逆湯溫之若溫病始發未嘗不發熱頭痛而見脈沉澀而小急此伏熱之毒滯於少陰不能發出陽分所以身大熱而四肢不熱者此名厥正雜氣怫鬱火邪閉脈而伏也急以鹹寒大苦之味大清大瀉之斷不可誤為傷寒太陽始病反見少陰脈沉而用四逆湯溫之溫之則壞事矣又不可誤為傷寒陽厥慎不可下而用四逆散和之和之則病甚也蓋熱鬱亢閉陽氣不能交接於四肢故脈沉而澀甚至六脈俱絶此脈厥也手足厥冷甚至通身冰涼此體厥也即仲景所謂陽厥厥淺熱亦淺厥深熱亦深是也下之斷不可遲非見真守定通權達變者不足以語此吳錫璜曰王士雄説謂沉細之脈亦有因熱邪閉塞使然形症實者下之可生未可概以陰脈見而斷其必死凡熱邪壅遏脈多細實遲澀按證清解自形滑數不比內傷病服涼藥而脈加數為虛也又馬元儀謂三陽症亦有脈微弱不起者以邪熱抑遏不得外達待清其熱則脈自起勿謂陽衰脈微也二公論脈與栗山前説均合乃經驗日久確切不易之理解為醫者當切記之凡溫病脈中診洪長滑數者輕重則脈沉甚則閉絶此辨溫病與傷寒脈浮脈沉異治之要訣也凡溫病脈洪長滑數兼緩者易治兼弦者難治凡溫病脈沉澀小急四肢厥逆通身如冰者危凡溫病脈兩手閉絶或一手閉絶者危凡溫病脈沉澀而微狀如屋漏者死凡溫病脈浮大而散狀若釜沸者死按傷寒溫病必須診脈施治有脈與證相應者則易於識別若脈與證不相應卻宜審察緩急或該從脈或該從證務要脈證兩得即如表證脈不浮者可汗而解里證脈不沉者可下而解以邪氣微不能牽引抑鬱正氣故脈不應下利脈實有病愈者但得證減復有實脈乃天年脈也又脈法之辨以洪滑者為陽為實以微弱者為陰為虛不待問也然仲景曰若脈浮大者氣實血虛也內經曰脈大四倍以上為關格皆為真虛陶氏曰不論浮沉大小但指下無力重按全無便是陰脈此洪滑之未必盡為陽也實也景嶽曰其脈如有如無附骨乃見沉微細脫乃陰陽潛伏閉塞之候陶氏曰凡內外有熱其脈沉伏不洪不滑指下沉澀而小急是為伏熱此微弱之未必盡為陰也虛也三熱病辨脈熱病之脈亦隨其經而取之發於太陽脈浮緊發於陽明脈浮長發於少陽脈弦數大率發於三陽者多發於三陰者少亦有所因也治依溫病條下若表邪傳進三陰者治法與傷寒條內下證同若脈沉小足冷者亦發於陰則難治也大抵熱病比溫病尤加熱也脈得洪大有力或滑數有力乃為病脈相應謂之可治若細小無力謂之難醫人虛脈弱者主扶元氣兼解邪熱不可峻攻治表證在者治例與溫病同若夾暑夾內傷生冷飲食停滯隨證施治之中暑與熱病外證相似但熱病者脈盛中暑者脈虛以此別之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛此辨暑熱有暴感伏氣而脈之盛虛異焉暑暍皆脈虛面垢自汗煩渴靜而熱傷心脾為中暑與夏熱病相似但熱病脈洪緊中暑脈細數而沉動而熱傷太陽為中暍脈浮似夏傷風但汗出惡風身熱而不渴者傷風也身熱而渴者中暍也後人所謂中暑多指夏月陰證而言夏月有四證傷寒傷風脈證互見中暑熱病疑似難明若脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑以此別之也熱病一二日瀉利腹滿熱甚者死三四日目昏譫語熱甚脈小者死五六日舌本焦黑燥渴者死七八日衄血吐血下血燥熱脈大者死八九日發痙兼昏沉者死凡熱病脈促結伏沉小皆難治熱不得汗脈躁急亦難治已得汗而熱反盛脈躁急者死也四暑病辨脈仲景曰傷暑脈虛又曰脈虛身熱得之傷暑脈訣曰暑傷於氣所以脈虛弦細芤遲體狀無餘三因曰中暑之脈陽弱陰虛微遲似芤本事曰暑脈弦細芤遲何也蓋寒傷形熱傷氣氣傷則氣消而脈虛弱所以弦細芤遲皆虛脈也正傳曰暑脈虛而微弱或浮大而散或隱而不見夫微弱隱伏皆虛類也活人書曰中暑與熱病相似但熱病脈盛中暑脈虛以此辨之張鳳逵曰脈理論劉復真云暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆暑脈也脈虛身熱得之傷暑中暍脈虛而微者是也寒病傳經故脈日變溫熱不傳經故不變寒病浮洪有力易治芤細無力難治無脈不治溫熱不然溫有一二部無脈者暑熱有三四部無脈者被火所逼而伏非絶無也於病無妨攻之亦易照經用辛寒火散脈起病愈矣蓋溫熱病發在一二經始終在此更不傳遞別經者其一二經或洪數則別經弱且伏依經絡調之伏者起洪者平乃愈徵也鰲按此篇言熱病即指暑病而言非謂伏寒夏發之熱病也五濕病辨脈脈沉而緩沉而細微緩者皆中濕脈浮風濕脈浮虛而澀者寒濕脈來滑疾身熱煩喘胸滿口燥發黃者濕熱脈洪而緩陰陽兩虛濕熱自甚脈洪而動濕熱為痛也脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相搏也六燥病辨脈脈緊而澀燥金主於收斂其脈緊澀或浮而弦或芤而虛又脈弦風燥也脈洪熱燥也脈緩土燥也脈澀血燥也脈遲寒燥也第四章分症一春溫一伏氣春溫症雷少逸曰經謂冬傷於寒春必病溫是訓人有伏氣之為病也夫冬傷於寒甚者即病則為傷寒微者即不病其氣伏藏於肌膚或伏藏於少陰至春陽氣開泄忽因外邪乘之觸動伏氣乃發又不因外邪而觸發者偶亦有之其藏肌膚者都是冬令勞苦動作汗出之人其藏少陰者都是冬不藏精腎臟內虧之輩此即古人所謂最虛之處便是容邪之處何劉松峰陳平伯諸公皆謂並無伏氣悖經之罪其可逭乎又曰嘗讀介賓之書謂溫病即傷寒又可之書謂溫病即瘟疫殊不知傷寒乃感冬時之寒邪瘟疫仍感天地之厲氣較之伏氣溫病大相徑庭豈可同日而語哉推溫病之原究因冬受寒氣伏而不發又化為熱必待來年春分之後天令溫暖陽氣弛張伏氣自內而動一達於外表裡皆熱也其證口渴引飲不惡寒而惡熱脈形愈按愈盛者是也此病表無風寒不宜辛散切忌辛溫辛涼之法若誤散之則變證蜂起矣如初起無汗者只宜清涼透邪法有汗者清熱保津法如脈象洪大而數壯熱譫語此熱在三焦也宜以清涼蕩熱法倘脈沉實而有口渴譫語舌苔乾燥此熱在胃腑也宜用潤下救津法凡溫病最戒辛溫發汗汗之則狂言脈躁不可治也然大熱無汗則死得汗後而反熱脈躁盛者亦死又有大熱脈反細小手足逆冷者亦死或見痙搐昏亂脈來促結沉代者皆死醫者不可不知程曦曰推松峰與平伯皆謂並無伏氣有由來也一執云笈七藏冬傷於汗之句一執錢氏冬傷寒水之臟之文殊不知兩家只顧一面文章全不顧春傷夏傷秋傷之訓作何等解思二先生天資高邁亦受其蒙不正其訛反助其説毋怪後之醫者統稱暴感恣用發散羌防麻桂逼汗劫津誤人性命固所不免此不得不歸咎於作俑之人也陳蓮舫曰汗出則腠理疏寒邪即因汗而入則仍是冬傷於寒也何必改寒為汗哉金鑑曰內經言熱病皆傷寒之類也非謂類乎傷寒乃謂與傷寒同乎一類之病也蓋傷寒因傷時令之寒而得名也溫病熱病亦隨時而易其名耳經曰冬傷於寒則為病熱此即時而病者也經曰冬傷於寒春必病溫此過時而病者也經曰凡病傷寒而成溫者先夏至為病溫後夏至為病暑暑即熱之謂也此隨時而病者也是則秋分以前皆得以熱病名之秋分以後皆得以傷寒名之矣此軒岐仲景立傷寒溫病熱病之名義也經又云藏於精者春不病溫此明過時不病之原也經曰冬不藏精春必病溫此明過時必病之故也於此可知傷寒為病不在精之藏與不藏而但有觸犯即得為病非若溫病熱病藏精則不病不藏精則必病也但能藏精者縱偶感於邪或溫或暑其病自輕不藏精者雖微感其邪或溫或暑其病必重差為稍異耳若專以冬不藏精毫無外感為少陰本病熱從內生則悖仲景溫病之旨矣仲景論中但言太陽初病發熱而渴不惡寒者為溫病辨其非傷寒非謂太陽之寒不由表入竟從少陰之熱內生為病也又曰所謂伏氣之病即四時令氣正病非四時不正之邪與非常異氣之疫邪也所為伏氣者如感冬令之風寒其重者傷於營衛即時而發者名為中風傷寒是也其感之輕者伏藏於肌膚過時而發名為溫病是也故時氣伏氣之為病二者不可不辨焉楊如侯曰仲景著傷寒論提出溫病與風寒鼎峙而立實三大綱也細玩仲景文法已於傷寒中風之外示人以辨別溫病之法曰發熱是指明邪在肌肉也曰不惡寒是指明邪不在皮毛也曰口渴即是指明熱自內發因冬月感寒不即病至春變而為溫既變以後寒已化熱不得復言為寒矣仲景因自解之曰此為溫病凡是熱由內發者皆以為溫病三字括之矣此溫熱之真面目不由外至者也就仲景文法細玩之已將溫病之來歷露出而其示人以異於傷寒中風之處皆在言外周禹載曰溫病無陰陽之分故病惟有陽而無陰藥必用寒而遠熱柯韻伯曰凡病傷寒而成溫者雖由於冬時之傷寒而根實種於其人之鬱火又曰肝膽為發溫之源陽明為成溫之藪楊栗山曰風寒之邪始中太陽者十八九溫病之邪直行中道而起陽明者十八九又曰傷寒自表傳裡里證皆表證侵入於內也溫病由里達表表證皆里證浮越於外也又曰溫病與傷寒雖曰不同而或清或攻後一節治法原無大異惟初病散表前一節治法則有天淵之別又曰傷寒一發汗而外邪即解溫病一發汗而里邪愈熾麻桂青龍用治傷寒未有不生者用治溫病未有不死者二伏溫兼新感症雷少逸曰考諸大家論春溫者惟嘉言與遠公精且密矣嘉言以冬傷於寒春必病溫為一例冬不藏精春必病溫又為一例既傷於寒且不藏精至春同時併發又為一例舉此三例以論溫病而詳其治遠公所論都是春月傷風之見證分出三陽若何證治三陰若何證治觀二家之論可謂明如指掌然宗嘉言不合遠公宗遠公不合嘉言反使後人無從執法其實嘉言之論遵經訓分為三例意在伏氣遠公之論皆系傷風見證意在新感總之春溫之病因於冬受微寒伏於肌膚而不即發或因冬不藏精伏於少陰而不即發皆待來春加感外寒觸動伏氣乃發焉即經所謂冬傷於寒春必病溫冬不藏精春必病溫是也其初起之證頭身皆痛寒熱無汗咳嗽口渴舌苔浮白脈息舉之有餘或弦或緊尋之或滑或數此宜辛溫解表法為先倘或舌苔化燥或黃或焦是溫熱已抵於胃即用涼解裡熱法如舌絳齒燥譫語神昏是溫熱深踞陽明營分即宜清熱解毒法以保其津液也如有手足瘈瘲脈來弦數是為熱極生風即宜祛熱息風法如或昏瞶不知人不語如尸厥此邪竄入心包即宜祛熱宣竅法春溫變幻不一而足務在臨機應變可也陳蓮舫曰此因新感之寒邪觸動伏氣而病春溫也春溫初起寒熱無汗此表有寒邪也故可用辛溫解表法否則切忌溫散幸勿嘗試以傷其津液春溫變證可畏治之者當慎於初病之時楊如侯曰太陰之為病脈不緩不緊而動數或兩寸獨大尺膚熱頭痛身熱口渴午後熱甚名曰溫病如惡寒無汗此係春月因寒觸動伏氣而發也如惡風或不惡風自汗咳嗽此係春月因風觸動伏氣而發也仲景論溫病屬之太陽者指伏氣而言謂冬傷於寒寒邪伏於少陰逮至來春寒化為熱由里達表而浮越於太陽也後人論溫病屬之太陰者指新邪引動伏氣而言謂溫邪由口鼻而入自上而下鼻通於肺凡病溫者始於上焦在手太陰也故曰太陰之為病脈不緩不緊而動數脈不緩則知非太陽中風矣脈不緊則知非太陽傷寒矣然頭痛身熱微惡風寒猶有與傷寒中風相混之處於何辨之於脈動數口渴尺膚熱午後熱甚辨之蓋冬月伏寒至春已變為溫或因春感於寒觸發裡氣而病焉或因春感於風觸發裡氣而病焉此乃新邪引動伏邪新邪在表伏邪在裡必先辛涼以解表邪繼進苦寒以清裡熱不得認為風寒而恣用辛溫以煽其火而助之焰也三新感春溫症楊如侯曰頭痛惡寒發熱喘促鼻塞身重脈浮無汗此春月時行病也一曰春溫此屬於春月之暴感者既系暴感原可表散但春令溫舒辛溫須當少用陽經表藥最忌混亂況口鼻吸入之邪直行中道未必恰在足太陽經矣雖因外邪亦是表中之裡設徒發散陽經雖汗不解日期多延病變叢生不可不慎也葉天士曰春月暴暖忽冷先受溫邪繼為冷束咳嗽痰喘為多何廉臣曰春溫兼寒往往新感多伏氣少每由春令天氣過暖吸受溫邪先伏於肺猝感暴寒而發葉先生所謂溫邪上受首先犯肺是也其證初起頭痛身熱微惡寒而無汗宋愛人曰春溫之發源由於皮毛啓閉不慎驟然感受寒暖空氣使皮毛起有反應作用者其所以然乃因冬月嚴寒毛孔汗腺不期然而然的自會緊張以防禦外寒之侵襲保守體內果有之體溫惟一至春氣轉動氣候乍冷乍暖冷則毛孔閉暖則毛孔開熱則汗腺輕啓調節體溫此是人類自然的良知良能惟是冬寒未消春暖忽至於此乍冷乍暖之時其有毛孔啓閉倏忽之間不易應付豫如故空氣之乍冷乍暖均足以致毛孔啓閉不靈而為形寒發熱等證也但此種病理完全由於感冒性故為病猶輕惟亦有因此感冒而引動本有伏邪者為病亦重謝利恆曰邪從口鼻而入初起發熱頭昏口燥肢軟嘔惡胸滿舌微白苔而兼淡黃者宜芳香解穢用淡豉蘇梗藿香薄荷鬱金橘紅甘草桔梗通草之屬用鮮薑汁少許為引兼暑濕者加滑石香薷咽喉不利者加牛蒡子邪從皮毛而入初起發熱頭昏口燥肢軟脈浮滑舌淡微苔者宜辛涼透表用蘇梗薄荷杏仁桑葉甘草桔梗橘紅豆卷通草之屬兼暑濕及咽喉不利者治同上二風溫一伏氣風溫症雷少逸曰風溫之病發於當春厥陰風木行令之時少陰君火初交之際陳平伯謂春月冬季居多春月風邪用事冬初氣暖多風風溫之病多見於此其實大為不然不知冬月有熱渴咳嗽等證便是冬溫豈可以風溫名之即按六氣而論冬令如有風溫亦在大寒一節冬初二字大為不妥推風溫為病之原與春溫倣佛亦由冬令受寒當時未發腎虛之體其氣伏藏於少陰勞苦之人伏藏於肌腠必待來春感受乎風觸動伏氣而發也其證頭痛惡風身熱自汗咳嗽口渴舌苔微白脈浮而數者當用辛涼解表法倘或舌絳苔黃神昏譫語以及手足瘛瘲等證之變皆可仿春溫變證之法治之又或問曰因寒觸動伏氣為春溫初起惡寒無汗因風觸動為風溫初起惡風有汗二病自是兩途豈可仿前治法答曰新感之邪雖殊伏藏之氣則一是故種種變證可同一治必須辨其孰為勞苦之輩孰為冬不藏精之人最為切要試觀病勢由漸而加其因於勞苦者可知一病津液即傷變證疊出其因於冬不藏精者又可知凡有一切溫熱總宜刻刻顧其津液在陰虛者更兼滋補為要耳又問曰風溫之病曷不遵仲景之訓為圭臬今觀是論並未有脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出等證豈非悖仲景之旨以為醫乎曰此仲景論風溫誤治之變證也非常證也曰常證何曰太陽病發熱而渴不惡寒者為溫病此常證也又問曰平伯論風溫十二條總稱暴感時氣肺胃為病鞠通雜於諸溫條中分治三焦誠問以平伯為然抑亦以鞠通為然曰總宜遵內經冬傷於寒春必病溫之論庶乎宜古宜今見肺胃之證即為肺胃之病見三焦之證即為三焦之病弗宜印定可也又問曰春溫風溫皆有伏氣為病今時醫每逢春令見有寒熱咳嗽並無口渴之證便言風溫可乎曰可蓋春令之風從東方而來乃解凍之溫風也謂風溫者未嘗不可耳其初起治法仍不出辛涼解表之範圍也陳蓮舫曰冬初即病便是冬溫何得因氣暖多風謂為風溫之病乎又曰風為陽邪初起即有汗與春溫有表寒者不同故不用辛溫解表而即用辛涼也否則變證百出矣又曰勞苦者邪在表而里不虛也精不藏者邪入而里已虛也故當細辨其病因又曰仲景之訓不過設言一風溫病狀以例其餘耳若膠執論中之言是守經而不能通變也又曰時醫能不用溫散之劑如羌防麻桂等藥從溫字上著想已屬高明楊如侯曰太陽病發熱而渴不惡寒為溫病若發汗已身灼熱者曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期此乃標示溫病誤治變為風溫之提綱也夫仲景提出溫病即復申言溫病誤治之變證曰若發汗已身灼熱者名曰風溫是仍太陽病溫誤發其汗與更感於風者自是不同然亦名風溫何也既曰太陽不即顯少陰證惟誤汗則其證本溫復以辛熱之藥汗之則陰津外出表裡增熱脈必尺寸俱浮正以風與溫混腎水不能獨沉其證自汗身重腎有病也多眠睡鼻息鼾語言難腎有病也始先太陽因汗使少陰之候同時薦至危且殆矣古律垂戒云風溫治在少陰不可發汗發汗者死豈知太陽亦不可發汗發汗則亦同於風溫之少陰乎緣醫者誤認為傷寒而用正汗藥也若不發汗而誤下者傷膀胱之氣化小便不利津液大傷直視失溲一臟一腑同時兩絶矣至誤被火劫者則熱傷營氣而熱瘀發黃劇則熱甚風生而驚癇瘈瘲蓋因亂其神明擾其筋脈也然則於三者之中一逆已待斃再犯則立危矣方中行曰風溫謂於溫有風也陳平伯曰風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出凡此皆誤汗劫液後變見之證非溫病固有此證也王孟英曰冬溫春溫之先犯手太陰者皆曰風溫乃吸受之溫風也此伏邪內發誤汗致逆者亦曰風溫乃內動之虛風也然風溫在肺只宜清解若誤以辛熱之藥汗之亦有自汗多眠鼻鼾難語之變二新感風溫症楊如侯曰頭痛或惡風或不惡風身熱煩渴脈浮數有汗此春月時行病也一曰風溫風溫傳變甚速劫液傷津是所大戒不可不慎也喻嘉言曰春月厥陰風木主事與時令之溫不得分而為兩凡病溫者皆為風溫之病也即如初春之時地氣未上升無濕之可言也天氣尚微寒無毒之可言也時令正和煦無疫之可言也而所以主病者全繫於風試觀仲景於冬月正病以寒統之則春月正病定當以風統之矣葉天士曰風溫者春月受風其氣已溫經謂春氣病在頭治在上焦肺位最高邪必先傷故手太陰氣分先病失治則入手厥陰心包絡血分亦傷故足經順傳如足太陽傳陽明人皆知之肺病失治逆傳心包絡人多不知醫見身熱咳嗽不知肺病在上之旨妄投羌防柴葛輒云解肌或見痞悶便用大黃大便數行上熱愈結表裡苦辛化燥胃汁大傷致多變矣凌嘉六曰春溫者伏氣也風溫者發汗已而灼熱者也古人論之詳矣近有感冒春之溫氣隨感而發其邪每有口鼻吸受先傷肺衛肺中邪郁必從熱化脈數發熱或肺痹咳嗽或胸滿煩渴或氣窒不舒外寒如戰栗或邪郁不宣二便不爽利皆溫邪鬱蒸時證現象今人亦謂之春溫又謂之風溫此隨俗命名而治法亦不必泥執古方也凡遇此證用藥總以辛涼輕劑清理肺胃為主加梔子淡豆豉連翹黃芩杏仁桔梗薄荷蘇梗牛蒡子玄參馬勃知母天花粉橘紅枳殼桑葉竹茹貝母石斛茯苓米仁冬瓜子蘆根竹葉枇杷葉燈心通草甜白梨等輕藥皆可選用初起證輕施治如是然肺熱每易及胃溫邪不解必劫爍津液或口糜或舌絳或骨節疼痛或口渴引飲或夜煩不寐是氣分熱熾矣當於上之辛涼藥中加入石膏生地知母丹皮滑石生甘草寒水石黃連阿膠等藥以育陰退熱或熱邪傳入心包脈數舌絳唇焦鼻煤耳聾者此溫邪已入營分當用犀角鮮生地玄參連翹羚羊角丹皮川貝母竹捲心石菖蒲佐以知母赤芍鮮石斛天花粉蘆根白茅根銀花露方諸水金汁竹瀝野薔薇等藥以清解營分伏熱若神昏譫語者再衝入至寶丹是治時證之大略也然而溫邪吸入每易由肺直走膜原以致五六日以外不大便而舌絳苔焦如熱邪陷入心包之象則但憑其舌苔或黃或焦或黑是陽明胃實下證非熱邪陷入心包也可與承氣湯下之虛羸老年用大黃露穩當是時即有抽掣瘈瘲神昏譫語現象亦急下之下後無他證則以沙參麥冬石斛川貝母茯神甜白梨等類以清養胃液自然見效凡下之後不可即補補則恐其復結也或下後熱仍不解然後以犀角生地至寶丹之類清涼解毒必能獲安或心液熱傷驚悸不安者以辰砂染麥冬茯神燈心石決明石斛川貝竹心等藥養液安神若舌苔厚白中有灰色舌尖舌邊色暗不鮮此又是濕溫之邪伏於膜原也脈必細澀不數而口渴便祕雖轉矢氣胸不滿痛當用達原飲加減宣達其伏邪倘病經日久正氣衰者除去檳榔厚朴以羚羊角殭蠶土貝母生草果生甘草滑石鉤藤青蒿黃芩知母木通通草石菖蒲佩蘭葉等類出入用之凡此皆治時證之大綱而細目不止於此全在臨證者留心加察焉陳平伯曰風邪屬陽陽邪從陽必傷衛氣人身之中肺主衛又胃為衛之本是以風溫外薄肺胃內應風溫內襲肺胃受病其溫邪之內外有異形而肺胃之專司無二致故惡風為或有之證而熱渴咳嗽為必有之證也又曰風溫為燥熱之邪燥令從金化燥熱歸陽明故肺胃為溫邪必犯之地又曰風溫為燥熱之病燥則傷陰熱則傷津泄熱和陰為風溫一定之治法三熱病一伏氣熱病雷少逸曰金鑑云經曰冬傷於寒春必病溫至夏為熱病熱病者乃冬傷正令之微寒未即病也倪氏謂交立夏以來久伏之氣隨時令之熱而觸發故初病即發熱汗出口渴心煩不惡寒而反惡熱脈來脈大之象是為熱病也醫通曰邪非外來故但熱而不惡寒熱自內發故口燥渴而多引飲其邪既郁為熱不得復言為寒合而觀之熱病因伏氣者瞭然然較晚發更發於晚比諸溫更伏於深初起之時宜用清涼透邪法熱勢不衰繼用清涼蕩熱法倘有惡寒相兼脈象舉取浮緊是有夏時暴寒所加寒在外而熱在裡先用辛溫解表法以透其外外邪得透再用清涼之劑以蕩其裡熱也設無浮緊之脈又無惡寒之證誤用辛溫之方耗傷津液者宜用清熱保津法加西洋參石膏治之倘或兼之惡風微微汗出脈象舉取浮緩此表有風邪所加風在外而熱在裡當用辛涼解表法先解其外也至於舌苔化燥譫語昏狂急用清涼蕩熱法加紫雪丹治之發斑者加黃連梔子發疹者加荷葉牛蒡須知熱病最易傷陰當刻刻保陰為要辛溫劫液之劑勿浪用也楊如侯曰夏至以後炎暑司令相火用事人有發熱身疼不惡寒但大熱而大渴者為熱病內經熱論曰凡傷寒而成溫者先夏至為病溫後夏至為病暑暑病即熱病也夏至以前氣候不熱為春之暖故病發猶名曰溫溫者熱之漸也及夏至以後氣候漸熱為夏之暑故病發則名曰熱傷寒序例云暑病者熱極重於溫是暑病實熱病也伏氣鬱久而後發發即大熱大渴仲景立白虎湯實治熱病之主方也熱病由下發上由內發外必經陽明故無論三陽總以石膏之辛涼乘勢升散知母之苦寒靖少陰伏邪之源甘草粳米維持中氣為一了百當楊上善曰冬傷於寒輕者夏至以前發為溫病重者夏至以後發為暑病沈宗淦曰此言其常也然春時亦有熱病夏日亦有溫病溫熱之輕者也熱溫之重者也故古人往往互稱二伏熱兼新感症楊如侯曰夏日熱病因外感而發者不外二端一因外感風寒而發一因外感暑暍而發其因風寒而發者脈必浮緊蓋風脈浮寒脈緊也熱病之脈者洪大若見浮緊可知其夏日之傷於風寒若輕舉之脈見浮緊略按之脈仍洪盛即可知其新感風寒之邪外束於表而內伏之熱已發於里矣至因暑暍而發者則病勢之來尤速且劇蓋風寒之邪從皮膚入由外入內勢猶較緩暑暍之邪從口鼻入直行中道內外熱邪交煽匪由肺逆傳心包即歸併胃腑此譫語遺溺等證所由來也醫者對此二因宜明辨之周禹載曰熱病之脈本洪大若兼浮緊是又感夏時暴寒又曰凡溫病之發因暴寒者居多熱病之發兼暑暍者為盛四暑病一冒暑雷少逸曰冒暑者偶然感冒暑邪較傷暑之證稍為輕淺耳夫暑熱之邪初冒於肌表者即有頭暈寒熱汗出咳嗽等證宜以清涼滌暑法加杏仁蔞殼治之其證雖較傷暑為輕然失治入里此又不可以不知也如入於肉分者則周身煩躁頭脹體燒或身如針刺或有赤腫等證宜以祛暑解毒法治之如入於腸胃者則有腹痛水瀉小便短赤口渴欲飲嘔逆等證宜以增損胃苓法佐黃連治之然冒暑之證雖謂為輕亦必須防微杜漸耳陳蓮舫曰夏時冒暑猶之春令冒風略用表散即愈若失治而由表入里則變證作矣二傷暑雷少逸曰長夏傷暑有陰陽之別焉夫陰暑之為病因於天氣炎蒸納涼於深堂大廈大扇風車得之者是靜而得之之陰證也其脈浮弦有力或浮緊頭痛惡寒身形拘急肢節疼痛而心煩肌膚大熱而無汗此為陰寒所逼使周身陽氣不得伸越宜用辛溫解表法減去防風益以香薷藿香治之嘔逆加茯苓半夏便瀉加厚朴木香又有陽暑之病緣於行旅長途務農田野烈日下逼得之者是動而得之之陽證也其脈浮洪有力或洪數面垢喘咳壯熱心煩口渴欲飲蒸蒸自汗此為炎熱所蒸使周身中外皆熱宜以清涼滌暑法去扁豆通草加石膏洋參治之嘔逆加竹茹黃連便瀉加葛根荷葉更宜審其體實體虛而藥之自無不當耳張介賓曰陰暑證或在於表或在於里惟富貴安逸之人多有之總由恣情任性不慎風寒所致也陽暑證惟辛苦勞役之人多有之由乎觸冒暑熱有勢所不容已也然暑熱逼人者畏而可避可避則犯之者少陰寒襲人者快而莫知莫知則犯之者多故凡有病暑者陽暑多不見而陰暑居其八九今之人治暑者但見發熱頭痛等證則必曰此中暑也而所用無非寒涼其不達也亦甚矣江誠曰介賓先生謂陰暑多於陽暑最為確切今人治暑不別陰陽一見發燒遂投涼藥若此貿貿則害人匪淺矣王安道曰暑熱之氣一也皆夏月中傷其邪而為病豈以一暑熱分為陰陽二證而名之邪其避暑於深堂大廈及恣食藏冰瓜果寒涼之物正經所謂口得寒物身犯寒氣之病自當同秋冬即病陰證傷寒處治不可名為中暑也沈堯封曰暑也熱也暍也皆夏令一氣之名也後人不察妄騰口説其實與病情無涉於醫理反混淆也楊如侯曰頭痛惡寒身形拘急肢體疼痛心煩肌膚大熱無汗此暑月為寒所傷也頭痛發燥熱肌膚大熱大渴引飲汗大泄無氣以動此暑月為熱所傷也經云炎火太過炎暑流行是暑即火也熱也後人以靜而得之為中暑動而得之為中熱將暑熱分為陰陽二證命名與古義不合甚有立陰暑陽暑之名者亦屬徒亂人意此以暑月傷寒暑月傷熱別之三中暑雷少逸曰潔古云靜而得之為中暑東垣云避暑乘涼得之者名曰中暑其實二説皆是陰暑之證而無中字情形似不可以中暑名之考中暑即系中暍中暍之證可以不必另分蓋中暑忽然而發如矢石之中人也不似傷暑初則寒熱無汗或壯熱蒸汗之可比是病忽然悶倒昏不知人軀熱汗微氣喘不語牙關微緊亦或口開狀若中風但無口眼喎斜之別其脈洪濡或滑而數緣其人不辭勞苦赤日中行酷暑之氣鼓動其痰痰阻心包所致宜清暑開痰法治之如果手足厥冷名曰暑厥宜蘇合香丸化開灌之或以來復丹研末白湯灌之或以蒜水灌之或剝蒜肉入鼻中皆取其通竅也俟其人事稍蘇繼進祛暑調元法為治楊如侯曰太陽中熱者暍是也其人汗也惡寒身熱而渴也素問在天為熱在地為火熱者火之氣也故熱乃五氣之一而熱病即傷寒有五之一傷寒論以難經熱字恐與下文溫字相混故特出曰暍是也感烈日之氣而病即經所謂在天為熱在地為火其性為暑也故暑字從日曰炎暑曰酷暑皆指烈日之氣而言也古人曰暑曰熱曰暍其義一也或曰暍是陽邪暑是陰邪土潤溽暑熱兼濕言也似與暍有異不知寒暑本是對待之名詞暑非專言熱而何若濕熱並至之病難經名曰濕溫不名為暑自隋唐後皆指濕熱為暑於是暑之名失而暍之名更不知為何病矣王安道曰暑熱者夏之令也大行於天地之間人受傷而為病名曰中暑亦曰中熱一也趙以德曰汗出惡寒身熱而不渴者中風也渴者中暍也周禹載曰冬月有寒則能傷人名中寒夏月有熱亦能傷人名中熱此外來之熱故曰中非即伏寒發出夏必病熱之熱也葉天士曰熱地如爐傷人最易四暑濕楊如侯曰兩脛逆冷胸滿頭目痛妄言多汗此先傷於濕又中於暑濕得暑邪遏抑陽氣而病也頭痛妄言多汗脈陽濡而弱陰小而急此先受暑後受濕暑挾濕邪鬱蒸為熱而病也朱南陽許學士均名為濕溫雷少逸以濕溫當以夏末秋初為界限方與內經秋傷於濕之訓不相齟齬亦與四時之氣大暑至白露濕土用事若合符節茲於上所列二證病在夏月故不以濕溫名而以暑濕稱之周禹載曰濕病緩暑病速沈堯封曰難經所謂濕溫指濕熱並至之病不名為暑五伏暑楊如侯曰冬月頭痛微惡寒面赤煩渴舌白脈濡而數此冬月觸動伏暑之邪而病者也按雖在冬月獨太陰伏暑不得誤作傷寒蓋頭痛惡寒內傷寒無異而面赤煩渴則非傷寒矣然猶似傷寒陽明證至脈濡而數則斷非傷寒矣蓋寒脈緊風脈緩暑脈弱濡則弱之象弱則濡之體也濡即離中虛火之象也緊即坎中滿水之象也火之性熱水之性寒象各不同性則各異故曰雖在冬月定非傷寒而為伏暑也冬月猶為伏暑秋日可知伏暑之與傷寒猶男女之別一則外實中虛一則外虛中實安得混而同之又曰伏暑有九似頭疼壯熱似傷寒往來寒熱似瘧疾翻胃吐食似膈氣大便下血似腸風小便不利似淋瀝飲食無度似消渴四肢困倦似虛癆眼睛黃赤似酒疸遍身黃腫似食黃皆伏暑變象也雷少逸曰伏天所受之暑者其邪盛患於當時其邪微發於秋後時賢謂秋時晚發即伏暑之病也是時涼風颯颯侵襲肌膚新邪欲入伏氣欲出以致寒熱如瘧或微寒或微熱不能如瘧分清其脈必滯其舌必膩脘痞氣塞渴悶煩冤每到午後則甚入暮更劇熱至天明得汗則諸恙稍緩日日如是必要二三候外方得全解倘調理非法不治者甚多不比風寒之邪一汗而解溫熱之氣投涼則安擬用清宣溫化法使其氣分開則新邪先解而伏氣亦隨解也然是證變易為多其初起如瘧先服清宣溫化法倘畏寒已解獨發熱淹綿可加蘆竹連翹本法內之半夏陳皮乃可刪去恐其溫燥之品傷津液也其舌苔本膩倘漸黃漸燥漸黑漸焦是伏暑之熱已傷其陰於本法內可加洋參麥冬玄參細地治之倘神色昏蒙者是邪逼近心包益元散紫雪丹量其證之輕重而用倘壯熱舌焦神昏譫語脈實不虛是邪熱歸併陽明宜用潤下救津法治之如年壯體強以生軍易熟軍更為有力種種變證務在臨證之時細審病之新久體之虛實按法用之庶無差忒耳又或問曰曾見禹載書中論伏暑謂三伏之時以書曬曝烈日之中隨即收藏於笥火氣未散冬時啓笥觸之遂病今是論中全未言及得毋遺漏乎答曰子誠刻舟求劍也此不過偶一有之之證若此論之則伏暑之證專病曬書之家而無書曬者則不病專病在冬而三秋則不病可發一笑六濕溫楊如候曰身熱有汗舌苔黃而滑煩渴溺赤脈洪數此濕熱也頭痛惡寒身重疼痛汗出胸滿不飢舌苔黃或白口渴不引飲脈弦細而濡面色淡黃午後身熱狀若陰虛病難速已此濕溫也遍身拘急而痛不能轉側近之則痛劇頭汗出脈緩近遲小便清白此寒濕也蓋夏末秋初濕土主氣余暑猶熾新涼又加其時暑濕寒三氣最為混雜有感之而成濕熱者有感之而成濕溫者有感之而成寒濕者寒濕可以溫解濕熱可以清通惟濕溫不寒不熱最為難治其性黏膩故病難速已世醫不知為濕溫見其頭痛惡寒身重疼痛也以為傷寒而汗之則濕感辛溫發表之藥蒸騰上逆矇蔽內外諸竅有神昏耳聾目瞑不欲言者矣見其胸滿不飢以為停滯而下之則脾陽下陷濕邪乘勢內潰有洞泄不已者矣見其午後身熱以為陰虛而用柔藥潤之濕為膏滯陰邪再加柔潤陰藥遂有錮結不可解之勢矣蓋濕溫較諸溫勢雖緩而實重上焦最少病勢不甚顯張惟中焦病最多朱丹溪曰六氣之內濕熱為病十居八九朱南陽曰濕溫與中暑同但身涼不渴為異蔡宗玉曰身冷自汗四肢沉重即系濕溫又曰凡陰病脛冷兩臂亦冷濕溫脛冷臂不冷非下厥上行陽微寒厥也雷少逸曰濕溫之病議論紛紛後學幾無成法可遵有言溫病復感乎濕名曰濕溫據此而論是病乃在乎春有言素傷於濕因而中暑暑濕相搏名曰濕溫據此而論是病又在乎夏有言長夏初秋濕中生熱即暑病之偏於濕者名曰濕溫據此而論是病又在乎夏末秋初細揆三論論濕溫在夏末秋初者與內經秋傷於濕之訓頗不齟齬又與四時之氣大暑至白露濕土主氣亦屬符節當宗夏末秋初為界限也所有前言溫病復感於濕蓋溫病在春當云溫病夾濕言素傷於濕因而中暑暑病在夏當雲中暑夾濕皆不可以濕溫名之考其致病之因良由濕邪踞於氣分醞釀成溫尚未化熱不比寒濕之病辛散可瘳濕熱之病清利乃解耳是病之脈脈無定體或洪或緩或伏或細故難以一定之脈印定眼目也其證始惡寒後但熱不寒汗出胸痞舌苔白或黃口渴不引飲宜用清宣溫化法去連翹加厚朴豆卷治之倘頭痛無汗惡寒身重有邪在表宜用宣疏表濕法加葛羌神麯治之倘口渴自利是濕流下焦宜本法內去半夏加生米仁澤瀉治之倘有脛冷腹滿是濕邪抑遏陽氣宜用宣陽透伏法去草果蜀漆加陳皮腹毛治之如果寒熱似瘧舌苔白滑是為邪遏膜原宜用宣透膜原法治之如或失治變為神昏譫語或笑或痙是為邪逼心包營分被擾宜用祛熱宣竅法加羚羊鉤藤玄參生地治之如撮空理線苔黃起刺或轉黑色大便不通此濕熱化燥閉結胃腑宜用潤下救津法以生軍易熟軍更加枳殼庶幾攻下有力耳倘苔不起刺不焦黃此法不可亂投濕溫之病變證最多殊難罄述宜臨證時活法可也七燥病一秋燥雷少逸曰推六氣之中燥金主氣自秋分而至立冬喻嘉言以燥令行於秋分之後所以謂秋不遽燥確與氣運相合也沈目南云性理大全謂燥屬次寒奈後賢悉謂屬熱大相徑庭如盛夏暑熱炎蒸汗出濈濈肌肉潮潤而不燥也深秋燥令氣行人體肺金應之肌膚乾稿而燥乃火令無權故燥屬涼謂屬熱者非矣豐細玩之誠非謬也凡治初患之燥氣當宗屬涼擬法夫秋燥之氣始客於表頭微痛畏寒咳嗽無汗鼻塞舌苔白薄者宜用苦溫平燥法治之若熱渴有汗咽喉作痛是燥之涼氣已化為火宜本法內除去蘇荊桂芍加玄參麥冬牛蒡象貝治之如咳逆胸疼痰中兼血是肺絡被燥火所劫宜用金水相生法去東參五味加西洋參旱蓮草治之如諸證一無惟腹作脹大便不行此燥結盤踞於裡宜用松柏通幽法治之總而言之燥氣侵表病在乎肺入里病在腸胃其餘肝燥腎燥血枯虛燥皆屬內傷之病茲不立論又或問曰先生遵喻氏秋燥論中秋不遽燥燥氣行於秋分以後之説殊未見醫醇剩義中論之最詳又明出喻氏之謬既謂燥氣行於秋分以後而秋分以前四十五日全不關於秋燥矣故云初秋尚熱則燥而熱深秋既涼則燥而涼此誠是振聾發瞶之語先生曷不遵之為龜鑑耶答曰子不知六氣循環亦疑喻氏之謬不察大寒至驚蟄主氣風木春分至立夏主氣君火小滿至小暑主氣相火大暑至白露主氣濕土秋分至立冬主氣燥金小雪至小寒主氣寒水此年年之主氣千古不易由是而推則燥金之令確在乎秋分而至立冬而秋分以前之白露處暑立秋四十五日猶是濕土主氣豈可誤為燥金乎子以為然否或唯唯而退程曦曰論燥氣者首推嘉言其次目南與鞠通也嘉言論燥引大易水流濕火就燥各從其類乃論燥之復氣也目南所論燥病屬涼謂之次寒乃論燥之勝氣也至鞠通論燥有勝氣復氣與正化對化從本從標之説可為定論乃曰如仲景用麻桂薑附治寒之勝氣也治寒之正化也治寒之本病也白虎承氣治寒之復氣也治寒之對化也治寒之標病也能於此理悟通則燥氣之勝復正對本標亦皆瞭然於胸中矣江誠曰人皆知溫為熱而不知燥為涼以燥為熱者蓋因燥字從火之弊耳試問既以燥為熱曷不以溫字從水而為寒乎不知四時之令由春溫而後夏熱由秋涼而後冬寒目南先生引性理大全之説謂燥屬涼真所謂千載迷津一朝點破耳楊如侯曰秋燥之為病右脈數大頭微痛畏寒咳嗽無汗此燥從寒化也發熱口渴咽喉痛有汗此燥從火化也按六氣之中燥金主氣自秋分而至立冬其有感燥氣而為病者輕則為燥重則為寒化氣為濕復氣為火前人有云六氣之中惟燥不為病者非也彼蓋以內經少秋燥一層故有此議耳如陽明司天之年豈遂為無燥金之病乎大抵春秋二令氣候較夏冬之偏熱偏寒為平和其由於冬夏之伏氣為病者多其由於本氣自病者少其由於伏氣而病者重其由於本氣自病者輕蓋秋燥一證略如春溫但正秋之時有伏暑內發新涼外加之證有伏暑兼濕之證燥有從寒化者燥有從火化者此中暑濕燥火雜氣混淆辨之不可不詳慎也又曰燥有內外之分燥由外因者時值陽明燥令久晴不雨黃埃蔽空令人狂惑皮膚乾枯屑起此燥由於天氣不正而得之者也燥由於內因者七情火燥或大便不利亡津或金石燥血或房勞竭精或飢飽勞逸損胃或炙煿酒漿厚味皆能偏助火邪消爍血液此燥由於人事不慎而得之者也又曰燥有表裡之別六氣風熱火屬陽寒燥濕屬陰但燥雖屬於秋陰而反同於風熱蓋火盛則金被熱傷以致木無所制而生風風勝濕熱傷津此燥從火化故反同風熱也風熱燥甚怫鬱在表而裡氣平者善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而弦若風熱燥並鬱於其里則必為煩滿必為悶結故燥有表裡氣血之分也以上所述燥證表裡之辨乃屬於燥從火化者但燥從火化亦從寒化經曰清氣大來燥之勝也風木受邪肝病生焉此中風之屬也蓋燥勝則陰虛陰虛則血少所以或為牽引或為拘急或為皮腠風消或為臟腑乾結此燥從陽化營氣不足而傷乎內者也治當以養營補陰為主若秋令太過金氣勝而風從之則肺先受病此傷風之屬也蓋風寒外束氣應皮毛或為身熱無汗或為咳嗽喘滿或鼻塞聲啞或咽喉乾燥此燥以陰生衛氣受邪而傷乎表者也治當以輕揚溫散之劑暖肺去寒為主燥證雖亦外邪之類然有陰陽從陽者因於火從陰者發於寒熱則傷陰必連於臟寒則傷陽必連於經此所以有表裡必須辨明而治之又曰燥化有足與不足之異燥與濕對易曰水流濕火就燥是燥之與濕有別濕為水火相交而化者也燥者水火不交之氣也火不蒸水則雲雨不生水不濟火則露澤不降而燥於是乎成矣水不潤則木氣不滋而草木黃落火不蒸則土氣不發而膏脈枯竭究水火之所以不交則由於金性之收收止水火故申曰蓐收草木枯稿土泉涸竭是為燥金用事之驗也人秉燥金之氣者為陽明經屬胃與大腸胃雖屬土而以燥為主故與大腸統稱燥金金收而水火不交是為燥則燥者水火消耗之氣也腸胃所以化飲食皆以其燥能消耗之也西人言飲食之消化有種種作用而亦必有賴於溫度此即中國之所謂燥氣也燥化不足則不消水而為嘔吐瀉利是為燥氣不足之濕病內經陽明司天燥淫所勝條下所謂大涼革候腹中鳴注泄鶩溏是也經旨謂夏秋之交變炎暑而清涼腹中鳴注泄騖溏寒清於中也若燥氣有餘之證又有寒燥火燥之迥乎不同總之燥是水火不交之耗氣也故有寒燥有熱燥而熱燥尤多則以火就燥也張汝偉曰秋燥之病人多忽之燥上何以必冠秋字豈一至秋而即燥乎內經有消症而無燥症有痿痹之名而無秋燥之名燥病之狀同乎消而類似痿痹耳自喻嘉言發明長夏勝於濕秋傷於燥改內經秋傷於濕之濕字為燥字立清燥救肺湯一方而秋燥之症遂議論紛紛莫衷一是矣按説文燥者干也由干而堅由堅而果燥字從火從木中含兩重火也故每至由結而枯則燥之症於是為尤烈矣然秋承暑後中挾濕氣所以秋分之前所患之症仍屬濕溫之類必待至秋分以後風高氣爽濕氣已盡燥氣乃得而乘之其為狀也灑灑惡寒翕翕發熱乾咳無痰鼻中火發甚至下衄唇枯口燥咽乾而痛此為上部之燥治宜甘涼滋肺亦猶熯物之必以水潤也又有一種手足心熱溲短便堅每便必血此肺與大腸相表裡肺熱移於大腸而為脾約之症亦秋燥之所致治宜咸潤下行使大腸一潤而營分得通亦猶咸能潰堅之義也今試以物喻之如以極堅硬之鋼鐵置於鹹鹵之中不半年而鋼鐵剝蝕以盡是鹽能潰堅鹽能潤燥之明證也如以極易腐朽之魚類浸之以鹽滷置以風中吹之而魚反堅硬矣人多食鹹則口渴不止是鹽又能化燥之明證也人身燥病第一須分寒燥與濕燥濕燥如魚雖乾硬中含水質得熱氣即軟得風氣即干用藥即不可偏於甘寒甘潤宜服微辛微溫之品內經所謂風能燥濕是也寒燥則氣增而變完全有火之性無火之質故宜甘寒滋降人能辨此二者則於治秋燥之理思過半矣二伏燥楊如侯曰伏火感冒一證近來盛行人每認識不清多致輕轉重重轉危此證古人未有另立明條而混於傷寒溫熱之類是以後人往往誤治今不得不重申其義秋燥之氣由呼吸吸入肺中傳於血脈火毒內蘊流行血中一入冬令大氣寒肅將火毒遏抑於內血脈為寒束縛以致汗血管閉血度高升則寒熱交作頭暈或痛口苦舌燥胸滿身痛人多不察動用羌柴芷葛細辛荊防辛燥風藥風煽火勢益增烈炎故熱血火毒逼迫妄行速度愈加變證百出以致皮膚微焦血管破裂為痧斑疹瘄喉痹等危險之證輕者屢月不瘥重者便成不起八冬溫楊如侯曰冬溫脈寸洪尺數或實大心煩嘔逆身熱不惡寒或頭痛身重面腫咳嗽咽痛下利此冬感非節之暖而病溫也冬溫發熱而微畏寒汗不出而煩擾此冬先感溫氣即被嚴寒遏抑而病溫也按第一條謂冬時有非節之暖未至而至即為不正之氣獨冬不藏精之人腎氣先泄腠理不固溫氣襲人感之而病第二條謂先感溫氣即被嚴寒遏抑而病者此因暴冷折陽表有寒邪故有微惡寒之見證與上條但發熱者不同此皆屬於冬溫表邪若涉一二裡熱必兼八九斯癮疹丹痧相繼而作矣況冬月兼有伏暑伏燥之證不得以時在冬月認作傷寒遽以麻桂羌柴荊防之屬鼓風煽火而增其烈炎之焰也周禹載曰冬溫與春溫無異而時令不同葉天士曰入冬以來暴冷折陽外感發熱頭痛身痛嘔惡必從太陽若渴能飲水即是裡熱見證不得純以表散又曰若冬令應寒氣候溫暖陽氣不潛當藏反泄即能致病名曰冬溫陸九芝曰冬月病熱即是冬溫不可用正傷寒之桂麻則亦有須用膏梔芩連者雷少逸曰昔賢謂冬應寒而反溫非其時而有其氣人感之而即病者名曰冬溫是也其勞力辛苦之人動作汗出溫氣乘襲多在於表其冬不藏精之人腎經不足溫氣乘襲多在於里冬溫雖發於冬時然用藥之法與傷寒迥別蓋溫則氣泄寒則氣斂二氣本屬相反誤用辛溫變證疊出矣其證頭痛有汗咳嗽口渴不惡寒而惡熱或面浮或咽痛或胸疼陽脈浮滑有力者乃溫邪竄入肺經也宜用辛涼解表法加連翹象貝治之口渴甚者溫邪入胃腑也再加蘆根花粉治之如或下利陰脈不浮而滑溫邪已陷於裡也宜以清涼透邪法加葛根黃芩治之倘熱勢轉劇神氣昏憒譫語錯亂舌苔轉黑者不易治也勉以祛熱宣竅法治之紫雪丹亦可用之種種變證不能盡述須仿諸溫門中之法可也又或問曰冬溫發熱而不惡寒倘惡寒者為何病也答曰冬溫惡寒偶亦有之良由先感溫氣即被嚴寒所侵寒在外而溫在裡宜用辛溫解表法先去寒邪繼用涼解裡熱法而清溫氣又問曰傷寒冒寒皆惡寒何以別之曰傷寒冒寒初起無口渴以此別之曰溫邪當發為冬溫倘其微者伏而不發為何病也曰伏而不發來春必變為溫毒也凡治時病者新邪伏氣切要分明庶不至千里毫釐之失陳蓮舫曰冬溫乃屬新感伏而不發來春必成溫毒附方一清涼透邪法治溫病無汗溫瘧渴飲冬溫之邪內陷鮮蘆根五錢生石膏六錢連翹三錢竹葉一錢五分淡豆豉三錢緑豆衣三錢水煎服此治溫病無汗之主方其伏氣雖不因風寒所觸而發然亦有有汗無汗之分無汗者宜透邪有汗者宜保津一定之理也凡清涼之劑涼而不透者居多惟此法清涼且透蘆根中空透藥也石膏氣輕透藥也連翹之性升浮竹葉生於枝上淡豆豉之宣解緑豆衣之輕清皆透藥也伏邪得透汗出微微溫熱自然達解耳二清熱保津法治溫熱有汗風熱化火熱病傷津溫瘧舌苔變黑連翹三錢天花粉二錢鮮石斛三錢鮮生地四錢麥冬四錢去心參葉八分水煎服此治溫熱有汗之主方汗多者因於裡熱薰蒸恐其傷津損液故用連翹花粉清其上中之熱鮮斛鮮地保其中下之陰麥冬退熱除煩參葉生津降火也三清涼蕩熱法治三焦溫熱脈洪大而數熱渴譫妄連翹四錢西洋參二錢生石膏五錢甘草八分知母二錢鹽水炒鮮生地五錢加粳米一撮煎服是法以仲聖白虎湯為主治其三焦之溫熱也連翹洋參清上焦之熱以保津膏甘粳米清中焦之熱以養胃知母生地瀉下焦之熱以養陰四潤下救津法治熱在胃腑脈沉實有力壯熱口渴舌苔黃燥熟大黃四錢玄明粉二錢粉甘草八分玄參三錢麥冬四錢去心鮮生地五錢流水煎服陽明實熱之證當用大小承氣急下以存津液但受溫熱之病弱體居多雖有是證不能遽用是藥故以仲聖調胃承氣為穩且芒硝改為玄明粉取其性稍緩耳合用鞠通增液湯方更在存陰養液耳五辛溫解表法治春溫初起風寒寒疫暑為寒遏及秋涼等證防風一錢五分桔梗一錢五分杏仁一錢五分廣皮一錢淡豆豉三錢加蔥白五寸煎是法以防風桔梗祛其在表之寒邪杏子陳皮開其上中之氣分淡豉蔥白即蔥豉湯乃肘後之良方用代麻黃通治寒傷於表表邪得解即有伏氣亦可隨解惟暑為寒遏去蔥豉防風加西香薷一錢可也六涼解裡熱法治溫熱內熾外無風寒及暑熱冬溫等證鮮蘆根五錢大豆卷三錢天花粉二錢生石膏四錢生甘草六分新汲水煎服溫熱邪初入胃者宜此法蓋胃為陽土得涼則安故以蘆根為君味甘性涼而中空不但能去胃中之熱抑且能透肌表之邪誠涼而不滯之妙品大勝尋常寒藥佐豆卷之甘平花粉之甘涼並能清胃除熱更佐石膏涼而不苦甘草瀉而能和景嶽名為玉泉飲以其善治陽明胃熱也凡寒涼之藥每多敗胃惟此法則不然七清熱解毒法治溫毒深入陽明劫傷津液舌絳齒燥西洋參三錢大麥冬三錢鮮生地三錢玄參一錢五分金銀花二錢連翹二錢加緑豆三錢煎服此法治溫熱成毒毒即火邪也溫熱既化為火火未有不傷津液者故用銀翹緑豆以清火而解毒洋參麥冬以保津玄參細地以增液也八祛熱息風法治溫熱不解劫液動風手足瘛瘲大麥冬五錢鮮生地四錢滁菊花一錢羚羊角二錢鉤藤鉤五錢先將羚羊角煎一炷香再入諸藥煎凡溫熱病動肝風者此法最宜首用麥冬生地清其熱以滋津液菊花羚角定其風而寧抽搐佐鉤藤者取其舒筋以定瘈瘲也九祛熱宣竅法治溫熱濕溫冬溫邪竄心包神昏譫語甚或不語舌苔焦黑或笑或痙連翹三錢犀角一錢川貝母三錢鮮石菖蒲一錢加牛黃至寶丹一顆去蠟殼化沖是法治邪入心包之證連翹苦寒苦入心寒勝熱故瀉心經之火邪經曰火淫於內治以鹹寒故兼犀角鹹寒之品亦能瀉心經之火邪凡邪入心包者每有痰隨火升蒙其清竅故用貝母清心化痰菖蒲入心開竅更用牛黃至寶之大力以期救急扶危於俄頃耳若胃熱蒸心神煩昏譫口燥渴而便閉者宜用涼膈散加石菖蒲遠志始能奏效十辛涼解表法治風溫初起風熱新感冬溫襲肺咳嗽薄荷一錢五分蟬蛻一錢前胡一錢五分淡豆豉四錢栝蔞殼二錢牛蒡子一錢五分煎服如有口渴再加花粉此法專取辛涼以治風溫初起無論有無伏氣皆可先施用薄荷蟬蛻輕透其表前胡淡豉宣解其風葉香岩云溫邪上受首先犯肺故佐蔞皮牛蒡開其肺氣氣分舒暢則新邪伏氣均透達矣十一至寶丹治中風卒倒中惡氣絶痰飲不語神魂恍惚頭目昏眩眠睡不安唇口乾燥傷寒譫語心肺積熱伏熱嘔吐邪氣攻心大腸風祕血氣不通寒熱交錯暗風中熱疫毒陰陽二毒山嵐瘴毒水毒蠱毒中一切物毒婦人難産悶亂胎死不下産後血暈口鼻出血惡血攻心煩躁氣喘吐逆小兒諸癇急驚心熱卒中客忤煩躁不眠風涎搐搦生烏犀角一兩硃砂一兩雄黃一兩生玳瑁一兩琥珀一兩麝香一錢龍腦一錢金箔五十片銀箔五十片西牛黃五錢安息香一兩五錢制丸如梧桐子大用蠟護之每服三丸至五丸小兒二歲每服二丸此治心臟神昏從表透里之方黃犀瑁珀以有靈之物內通心竅朱雄二箔以重墜之品安鎮心神佐以腦麝安息搜剔幽隱諸竅故熱入心包絡舌絳神昏者以此丹入寒涼湯藥中用之有祛陰起陽立展神明之效若病因頭痛而即神昏不語者此肝虛魂升於頂當用牡蠣救逆以降之又非此丹之所宜也十二大承氣湯治陽明實熱證腸中燥屎堅結腹中滿痛者芒硝三兩大黃四兩枳實五枚厚朴八兩腸中穢滯不去由於氣不能送液不能滋方中以大黃清其熱芒硝潤其燥厚朴行其氣枳實攻其堅宜於熱邪傳裡痞滿燥實堅全見之證若表邪未解或心下硬滿或面合赤色或平素食少或嘔多或脈遲或津液內竭或小便少皆不可用所謂承氣湯八禁也十三達原飲治時疫邪氣初犯募原及疫瘧壯熱多汗而渴者黃芩一錢五分甘草一錢白芍一錢厚朴一錢草果一錢知母二錢檳榔二錢加大棗一枚生薑七片清水煎此為疫邪初犯募原之主方蓋募原雖附軀殼貼近於里為經絡臟腑之交界濕土之邪從竅而入以類橫連未有不入犯中土者所以用檳榔草果厚朴清理腸胃為先非若傷寒傳次表證未罷誤用里藥則有結胸傳裡之變也即尚未離表有薑棗佐芩芍甘草以和之亦足若見少陽陽明太陽之證則加柴胡葛根羌活以開泄之設裡氣不通勢必盤錯於中而內陷則加大黃以攻下之其殿後則有白虎涼膈為鼎足之任以此推原其他變證則三黃雙解清熱解毒人中黃丸等方可默識其微而用之必當矣若以此治疫瘧時瘧靡不應手獲效總藉以分解中外寒熱諸邪之力耳十四紫雪丹治腳氣毒遍內外煩熱不解口舌生瘡狂越躁亂瘴疫毒癘卒死溫瘧五尸五疰邪熱卒黃蠱毒鬼魅心腹療痛一切實火閉結小兒驚癇百病解熱藥毒發黃金六斤四兩石膏三斤寒水石三斤磁石三斤滑石三斤犀角屑五兩羚羊角屑五兩青木香五兩沉香五兩玄參一斤升麻一斤甘草八兩炙丁香一兩朴硝十斤消石四升當門子一兩二錢五分硃砂三兩每服三四分至一二錢杵細食後新汲水或薄荷湯調下大人小兒臨時以意加減此即千金玄霜局方於方中參入甘草丁香硃砂遂用紫雪之名凡邪火毒火穿經入臟無藥可治此能消解其致如神十五白虎湯治陽明證汗水渴欲飲水脈洪大浮滑不惡寒反惡熱及中暍煩熱而渴生石膏一斤知母六兩甘草二兩炙粳米六合陽明邪熱外越故熱汗自出熱爍胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖有大熱而未成實終非苦寒之味所能治方中石膏辛寒辛能解肌熱寒能勝胃火寒性沉降辛能走外兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故以為臣用甘草粳米調和於中宮且能土中瀉火作甘稼穡寒劑得之緩其寒苦藥得之化其苦使沉降之性皆得留連於胃也得二味為佐庶大寒之品無傷損脾胃之慮煮湯入胃輸脾歸肺水精四布而大煩大渴可除名之曰白虎者取西方金水之義謂其能止熱邪之陽亢也十六清涼滌暑法治暑溫暑熱暑瀉秋暑滑石三錢生甘草八分青蒿一錢五分通草一錢白扁豆一錢連翹三錢白茯苓三錢加西瓜翠衣一片入煎滑石甘草即河間之天水散以滌其暑熱也恐其力之不及故加蒿扁瓜衣以清暑又恐其干犯乎心更佐連翹以清心夫小暑之節在乎相火之後大暑之令在乎濕土之先故先賢所謂暑不離濕也兼用通苓意在滲濕耳十七祛暑解毒法治暑毒煩熱赤腫身如針刺茯苓三錢製半夏一錢五分滑石三錢銀花三分參葉六分黃連八分連翹三錢粉草五分加緑豆衣三錢煎服凡暑熱成毒者此法最宜苓夏偕甘即海藏消暑方也滑石偕甘即河間清暑方也更佐參葉以卻暑黃連以清心銀翹緑豆以解毒也十八增損胃苓法治暑濕內襲腹痛水瀉小便熱赤蒼朮一錢米泔炒厚朴一錢薑汁炒廣陳皮一錢五分滑石三錢豬苓一錢五分白茯苓三錢澤瀉一錢五分藿香一錢五分水煎溫服蒼朴陳皮以化濕即平胃散損甘草也二苓澤瀉以利濕即五苓散損桂術也增滑石清暑滲濕增藿香止瀉和中凡因暑濕而致瀉者是法最為合拍耳十九清暑開痰法治中暑神昏不語身熱汗微氣喘等證黃連一錢二分香薷一錢扁豆衣三錢制夏一錢五分厚朴一錢薑汁炒杏仁二錢陳皮一錢五分益元散三錢入煎加荷葉梗七寸為引汗多除去香薷連薷扁朴清熱祛暑杏仁陳夏順氣開痰益元散清暑寧心荷葉梗透邪宣竅二十蘇合香丸治傳尸骨蒸殗殜肺痿疰杵狐鬼邪祟驚癇中風痰厥心腹猝痛昏迷僵仆寒證氣閉寒霍亂吐利時氣瘴瘧赤白暴痢婦人瘀血經閉小兒驚搐吐乳療痃瘕疔腫蘇合香油五錢丁香一兩安息香一兩青木香一兩白檀香一兩沉香一兩蓽茇一兩香附子一兩訶黎勒一兩烏犀角屑一兩硃砂一兩薰陸香五錢龍腦五錢麝香七錢五分白蜜和丸如芡實大每服一丸此方取諸香以開寒閉與牛黃丸皆為中風門中奪門開關之將然牛黃丸開熱阻關竅此則開寒阻關竅方中用犀角為寒因寒用之嚮導與至寶中用龍腦桂心無異若夫口開手撒眼合聲鼾自汗遺尿等虛脫證急用參附峻補庶或可救若用牛黃蘇合之藥入口即斃矣二十一來復丹治上盛下虛裡寒外熱及痰飲伏暑霍亂泄瀉如水婦人産後敗血沖胃硝石一兩硫黃一兩太陰玄精石一兩五靈脂二兩青皮二兩陳皮二兩醋煮米糊和丸如梧桐子大每服三十丸米湯送下此方本二氣丹而立以硝黃二味大理中宮寒涎宿垢更以玄精石清鎮肺金使氣化下行歸就膀胱兼二皮五靈以破食積痰血之滯雖大理腸胃而不礙乎陽虛故為治伏暑水瀉之聖藥但小便赤澀不利者禁用又此方古法以醋糊和丸米飲下然醋性易壞不若但用米飲糊丸醋湯送下為妥二十二祛暑調元法治暑熱盛極元氣受傷生石膏四錢滑石三錢白茯苓三錢麥門冬二錢製半夏一錢東洋參二錢或用西洋參粉甘草六分加粳米一撮為引石膏滑石祛暑瀉火為君茯苓半夏消暑調中為臣暑熱刑金故以人參麥冬保肺為佐暑熱傷氣故以甘草粳米調元為使二十三清宣溫化法治秋時晚發之伏暑並治濕溫初起連翹三錢杏仁二錢栝蔞皮三錢陳皮一錢五分茯苓三錢製半夏一錢甘草五分佩蘭葉一錢加荷葉二錢為引連翹寒而不滯取其清宣杏仁溫而不燥取其溫化蔞皮宣氣於上陳皮化氣於中上中氣分得其宣化則新涼伏氣皆不能留茯苓夏草消伏暑於內佩蘭荷葉解新邪於外也二十四益元散止渴除煩降火利竅清暑熱利小便催生下乳治暑傷元氣表裡俱熱面赤氣粗煩渴引飲小便短赤霍亂吐瀉下利腸澼及積聚水蓄裡急後重暴注下迫石淋等證婦人暑搏血崩妊娠霍亂産難桂府滑石六兩甘草炙六錢生四錢加辰砂三錢新汲水調下元氣為暑熱所傷既不能用參耆以補氣致邪愈甚亦不能用芩連以清熱致氣更傷惟滑石稟土中衝和之氣寒能勝熱甘不傷脾含天乙之精而具流走之性能上清水源下通水道蕩滌六腑之邪俾暑熱從小便而泄甘草稟草中衝和之性調和內外止渴生津用以為佐保元氣而瀉虛火則五臟自和矣然心為五臟主暑熱擾中神明不安必得硃砂以鎮之則神氣方可遽復涼水以滋之則邪熱方可急除也並治熱痢初起裡急後重者以滑可去著也催生下乳積聚蓄水等證亦同此義惟老人虛人及病後傷津小便不利者均忌之二十五宣疏表濕法治冒濕證首如裹遍體不舒四肢懈怠蒼朮一錢土炒防風一錢五分秦艽一錢五分藿香一錢陳皮一錢五分砂殼八分生甘草五分加生薑三片煎服此治冒濕之法也君以蒼朮防秦宣疏肌表之濕被濕所冒則氣機遂滯故臣以藿陳砂殼通暢不舒之氣濕藥頗燥佐以甘草潤之濕體本寒使以生薑溫之二十六宣陽透伏法治牝瘧寒甚熱微或獨寒無熱淡乾薑一錢淡附片一錢厚朴一錢薑製蒼朮一錢土炒草果仁一錢煨蜀漆一錢五分加白豆蔻三顆去殼細研分沖乾薑宣其陽氣附子制其陰勝厚朴開其滯氣蒼朮化其陰濕草果治獨勝之寒蜀漆逐盤結之瘧佐以豆蔻不惟透伏有功抑且散寒化濕施於牝瘧豈不宜乎二十七宣透膜原法治濕瘧寒甚熱微身痛有汗肢重脘悶厚朴一錢薑製檳榔一錢五分草果仁八分煨黃芩一錢酒炒藿香葉一錢半夏一錢五分薑製粉甘草五分加生薑三片為引此師又可達原飲之法也方中去知母之苦寒及白芍之酸斂仍用朴檳草果達其膜原祛其盤結之邪黃芩清燥熱之餘甘草為和中之用擬加藿夏暢氣調脾生薑破陰化濕濕穢乘入膜原而作瘧者此法屢效二十八苦溫平燥法治燥氣侵表頭微痛畏寒無汗鼻塞咳嗽杏仁三錢陳橘皮一錢五分紫蘇葉一錢桔梗一錢五分荊芥穗一錢五分桂枝一錢蜜水炒白芍一錢酒炒微焦前胡一錢五分凡感燥之勝氣者宜苦溫為主故用橘杏蘇荊以解之加白芍之酸桂枝之辛是遵聖訓燥淫所勝平以苦溫佐以酸辛是也秋燥之證每多咳嗽故佐前桔以宣其肺肺得宣暢則燥氣自解耳二十九金水相生法治疰夏眩暈神倦呵欠煩汗及久咳肺腎並虧東洋參三錢麥冬三錢去心五味子三分知母一錢五分玄參一錢五分炙甘草五分法內人參補肺麥冬清肺五味斂肺此千金生脈飲也主治熱傷元氣氣短倦怠口渴汗多等證今以此方治疰夏真為合拍加色白之知母清其肺復清其腎色黑之玄參滋其腎兼滋其肺更以甘草協和諸藥俾金能生水水能潤金之妙耳三十松柏通幽法治燥結盤踞於裡腹脹便閉松子仁四錢柏子仁三錢冬葵子三錢火麻仁三錢苦桔梗一錢栝蔞仁三錢薤白頭八分大腹皮一錢酒洗加白蜂蜜一調羹沖服此仿古人五仁丸之法也松柏葵麻皆滑利之品潤腸之功非小較硝黃之推蕩尤穩耳丹溪治脾痹每每開提上竅故以桔梗蔞薤開其上復潤其下更加大腹寬其腸白蜜潤其燥幽門得寬得潤何慮其不通哉三十一清燥救肺湯治諸氣膹郁諸痿喘嘔桑葉三錢生石膏二錢五分甘草一錢胡麻仁一錢阿膠八分麥門冬一錢二分杏仁七分人參七分枇杷葉一升諸氣膹郁之屬於肺者屬於肺之燥也而古來治氣鬱之方多用辛香行氣絶無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古來治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而惟喘屬上矣所以亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即泄氣間有一二用潤劑者又不得其肯綮今此方名之為清燥救肺大約以胃為主用人參甘草甘溫以補氣氣壯火自消佐以石膏麥冬桑葉阿膠胡麻仁輩使清肅令行而壯火亦化又佐以杏仁枇杷葉之苦以降氣氣降火亦降而制節有權氣行則不郁諸痿喘嘔自除矣要知諸氣膹郁則肺必大虛若泥於肺熱傷肺之説而不用人參郁必不開而火愈熾皮聚毛落咳不休而死矣此名之救肺涼而能補之謂也若謂實火可瀉而久服芩連苦從火化亡可立待耳
